<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Easy Pro 2008 · con autocompletado y visor de errores</title>
    <style>
        /* ===== ESTÉTICA 2008 (con algunos ajustes) ===== */
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: #1f3a5f;
            font-family: 'Tahoma', 'Verdana', 'Arial', sans-serif;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .computer {
            width: 1100px;
            background: #d0d0d0;
            border: 5px ridge #e0e0e0;
            border-radius: 12px 12px 8px 8px;
            padding: 20px 20px 15px 20px;
            box-shadow: 8px 8px 0px #0a1e30, inset 2px 2px 5px #f0f0f0;
        }

        .top-bar {
            background: linear-gradient(180deg, #1040a0, #002070);
            border: 3px ridge #3070d0;
            padding: 8px 20px;
            margin-bottom: 20px;
            box-shadow: inset 2px 2px 8px #80a0ff, inset -2px -2px 5px #001030;
            color: white;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }
        .title {
            font-size: 58px;
            font-weight: bold;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0px #0f0f0f, 6px 6px 0px #303030;
            color: #ffffb0;
            line-height: 1;
        }
        .year {
            font-size: 28px;
            background: #c0c000;
            color: #202020;
            border: 3px inset #f0f000;
            padding: 5px 15px;
            font-weight: bold;
            font-style: italic;
            box-shadow: 0 0 0 2px #808080;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
        }

        .workspace {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .code-panel {
            flex: 1;
            background: #bebebe;
            border: 4px inset #fcfcfc;
            padding: 15px;
            box-shadow: inset 3px 3px 8px #707070, inset -3px -3px 8px #e0e0e0;
        }

        .panel-label {
            font-weight: bold;
            font-size: 20px;
            color: #202020;
            background: linear-gradient(90deg, #c0c0c0, #a0a0a0);
            padding: 5px 15px;
            border: 3px outset #e0e0e0;
            margin-bottom: 15px;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Contenedor del editor con autocompletado */
        .editor-container {
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            height: 260px;
            background: #ffffcc;
            border: 4px inset #8a8a8a;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            color: #001080;
            padding: 12px;
            line-height: 1.4;
            resize: vertical;
            box-shadow: inset 2px 2px 10px #404040;
            outline: none;
        }

        /* Lista de autocompletado estilo Godot/2008 */
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 10px;
            right: 10px;
            background: #e0e0e0;
            border: 4px ridge #a0a0a0;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            box-shadow: 4px 4px 0px #404040;
        }
        .autocomplete-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 2px outset #b0b0b0;
            color: #202020;
            font-weight: bold;
        }
        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: #1040a0;
            color: #ffffb0;
            border-bottom: 2px inset #3070d0;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(180deg, #f0f0f0, #b0b0b0);
            border: 4px outset #ffffff;
            color: #101010;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 24px;
            cursor: pointer;
            font-family: 'Tahoma', sans-serif;
            box-shadow: 3px 3px 0px #404040;
            transition: 0.05s linear;
        }
        .btn:hover {
            background: linear-gradient(180deg, #ffffe0, #c0c0c0);
            border-color: #fffff0;
        }
        .btn:active {
            border: 4px inset #808080;
            box-shadow: 1px 1px 0px #202020;
            transform: translate(2px, 2px);
        }

        .stage-panel {
            flex: 1;
            background: #bebebe;
            border: 4px inset #fcfcfc;
            padding: 15px;
            box-shadow: inset 3px 3px 8px #707070, inset -3px -3px 8px #e0e0e0;
        }

        .canvas-wrapper {
            background: #8f8f8f;
            border: 6px inset #5a5a5a;
            padding: 8px;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 400px;
            height: 400px;
            background: #ffffff;
            border: 2px solid #303030;
            display: block;
            image-rendering: crisp-edges;
        }

        .object-panel {
            margin-top: 20px;
            background: #c8c8c8;
            border: 4px inset #ececec;
            padding: 10px;
            max-height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #000000;
        }

        .object-title {
            background: #a0a0a0;
            border: 2px outset #d0d0d0;
            padding: 4px 10px;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: center;
            color: #202020;
        }

        .object-list {
            list-style: none;
            padding: 2px;
        }
        .object-list li {
            border-bottom: 1px dashed #404040;
            padding: 5px 0px 5px 10px;
            background: #e0e0e0;
            margin-bottom: 3px;
            border-left: 6px solid #202020;
        }

        /* Panel de errores */
        .error-panel {
            background: #400000;
            border: 5px inset #a00000;
            color: #ffb0b0;
            font-family: 'Courier New', monospace;
            padding: 8px;
            margin-top: 15px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 14px;
            font-weight: bold;
            box-shadow: inset 0 0 15px #ff0000;
        }
        .error-item {
            border-bottom: 1px dashed #ff8080;
            padding: 4px;
        }

        .log-console {
            background: #1a1a1a;
            color: #3aff99;
            font-family: 'Courier New', monospace;
            border: 5px inset #707070;
            padding: 10px;
            margin-top: 15px;
            height: 80px;
            overflow-y: auto;
            font-size: 15px;
            font-weight: bold;
            box-shadow: inset 0 0 15px #00cc66;
            border-radius: 0px;
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            color: #dfdfdf;
            text-shadow: 2px 2px 0 #0a1e30;
            font-size: 16px;
            font-weight: bold;
            border-top: 2px groove #a0a0a0;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="computer">
    <div class="top-bar">
        <span class="title">EASY PRO</span>
        <span class="year">est. 2008</span>
    </div>

    <div class="workspace">
        <div class="code-panel">
            <div class="panel-label">✎ editar código</div>
            <div class="editor-container">
                <textarea id="codeArea" spellcheck="false"></textarea>
                <div id="autocompleteBox" class="autocomplete-list"></div>
            </div>
            <div class="button-group">
                <button class="btn" id="runBtn">▶ ejecutar (reinicia y corre)</button>
                <button class="btn" id="resetBtn">⟲ reiniciar manual</button>
                <button class="btn" id="exampleBtn">📁 ejemplos</button>
            </div>
            <div class="error-panel" id="errorPanel">
                <div>✅ Sin errores</div>
            </div>
            <div class="log-console" id="logConsole">
                > Easy Pro 2008 listo.
            </div>
        </div>

        <div class="stage-panel">
            <div class="panel-label">🎬 escenario</div>
            <div class="canvas-wrapper">
                <canvas id="stageCanvas" width="400" height="400"></canvas>
            </div>
            <div class="object-panel">
                <div class="object-title">📦 objetos activos</div>
                <ul class="object-list" id="objectList">
                    <li style="color:#404040;">(ningún objeto)</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="footer-note">
        ⚡ comandos: varcreate · varset · if/else · rotate · input · finish · autocompletado con TAB
    </div>
</div>

<script>
    (function() {
        // ========== MOTOR EASY PRO 2008 ==========
        let objetos = [];
        let variables = {};
        let keyActions = {};

        // Flags para if/else
        let ifActive = false;
        let ifResult = false;
        let elsePending = false;
        let elseActive = false;
        let elseResult = false;

        // Almacén de errores (por línea)
        let errores = [];  // array de objetos {linea: n, mensaje: string}

        const canvas = document.getElementById('stageCanvas');
        const ctx = canvas.getContext('2d');
        const codeArea = document.getElementById('codeArea');
        const logDiv = document.getElementById('logConsole');
        const objectList = document.getElementById('objectList');
        const errorPanel = document.getElementById('errorPanel');

        // ========== AUTOCOMPLETADO ==========
        const comandosConocidos = [
            'varcreate', 'varset', 'if', 'else', 'createobj', 'mov', 'tp', 'rotate', 'input', 'finish'
        ];

        let autocompleteBox = document.getElementById('autocompleteBox');
        let currentSuggestions = [];
        let selectedSuggestionIndex = -1;
        let ignoreNextKeyDown = false;  // para evitar conflicto con TAB

        function mostrarAutocompletado(sugerencias) {
            if (sugerencias.length === 0) {
                autocompleteBox.style.display = 'none';
                return;
            }
            autocompleteBox.innerHTML = '';
            sugerencias.forEach((sug, index) => {
                let item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.textContent = sug;
                item.onclick = () => {
                    insertarSugerencia(sug);
                    autocompleteBox.style.display = 'none';
                };
                autocompleteBox.appendChild(item);
            });
            selectedSuggestionIndex = 0;
            actualizarSeleccion();
            autocompleteBox.style.display = 'block';
        }

        function actualizarSeleccion() {
            let items = autocompleteBox.children;
            for (let i = 0; i < items.length; i++) {
                if (i === selectedSuggestionIndex) {
                    items[i].classList.add('selected');
                } else {
                    items[i].classList.remove('selected');
                }
            }
        }

        function insertarSugerencia(sug) {
            let texto = codeArea.value;
            let pos = codeArea.selectionStart;
            // Encontrar el inicio de la palabra actual
            let start = pos;
            while (start > 0 && texto[start-1] !== ' ' && texto[start-1] !== '\n') {
                start--;
            }
            let end = pos;
            while (end < texto.length && texto[end] !== ' ' && texto[end] !== '\n') {
                end++;
            }
            let nuevaTexto = texto.substring(0, start) + sug + texto.substring(end);
            codeArea.value = nuevaTexto;
            codeArea.setSelectionRange(start + sug.length, start + sug.length);
            codeArea.focus();
        }

        function actualizarAutocompletado() {
            let texto = codeArea.value;
            let pos = codeArea.selectionStart;
            // Encontrar la palabra actual
            let start = pos;
            while (start > 0 && texto[start-1] !== ' ' && texto[start-1] !== '\n') {
                start--;
            }
            let palabraActual = texto.substring(start, pos);
            if (palabraActual.length === 0) {
                autocompleteBox.style.display = 'none';
                return;
            }
            let sugerencias = comandosConocidos.filter(cmd => cmd.startsWith(palabraActual));
            // También podríamos agregar nombres de objetos y variables si queremos más adelante
            mostrarAutocompletado(sugerencias);
        }

        codeArea.addEventListener('input', () => {
            actualizarAutocompletado();
        });

        codeArea.addEventListener('keydown', (e) => {
            if (autocompleteBox.style.display === 'block') {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedSuggestionIndex = (selectedSuggestionIndex + 1) % autocompleteBox.children.length;
                    actualizarSeleccion();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedSuggestionIndex = (selectedSuggestionIndex - 1 + autocompleteBox.children.length) % autocompleteBox.children.length;
                    actualizarSeleccion();
                } else if (e.key === 'Enter' || e.key === 'Tab') {
                    if (selectedSuggestionIndex >= 0 && autocompleteBox.children[selectedSuggestionIndex]) {
                        e.preventDefault();
                        let sug = autocompleteBox.children[selectedSuggestionIndex].textContent;
                        insertarSugerencia(sug);
                        autocompleteBox.style.display = 'none';
                    }
                } else if (e.key === 'Escape') {
                    autocompleteBox.style.display = 'none';
                }
            }
        });

        // Cerrar autocompletado al hacer clic fuera
        document.addEventListener('click', (e) => {
            if (!autocompleteBox.contains(e.target) && e.target !== codeArea) {
                autocompleteBox.style.display = 'none';
            }
        });

        // ========== TECLADO: Solo capturar teclas si NO estamos escribiendo en el textarea ==========
        document.addEventListener('keydown', (e) => {
            // Si el textarea está enfocado, no activamos los inputs
            if (document.activeElement === codeArea) {
                return;
            }
            let tecla = e.key.toLowerCase();
            if (keyActions[tecla]) {
                e.preventDefault();
                keyActions[tecla]();
            }
        });

        // ========== FUNCIONES DEL MOTOR ==========
        function logMessage(msg) {
            const p = document.createElement('div');
            p.textContent = '> ' + msg;
            logDiv.appendChild(p);
            if (logDiv.children.length > 8) {
                logDiv.removeChild(logDiv.children[0]);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function actualizarListaObjetos() {
            if (objetos.length === 0) {
                objectList.innerHTML = '<li style="color:#404040;">(ningún objeto)</li>';
                return;
            }
            let html = '';
            objetos.forEach(obj => {
                html += `<li style="border-left-color: ${obj.color};">${obj.name} · ${obj.shape} · rot:${obj.rotation || 0}° · (${obj.x},${obj.y})</li>`;
            });
            objectList.innerHTML = html;
        }

        function renderizar() {
            ctx.clearRect(0, 0, 400, 400);
            objetos.forEach(obj => {
                ctx.save();
                ctx.translate(obj.x, obj.y);
                if (obj.rotation) {
                    ctx.rotate(obj.rotation * Math.PI / 180);
                }
                ctx.fillStyle = obj.color;
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2.5;

                if (obj.shape === 'Cubo') {
                    ctx.fillRect(-20, -20, 40, 40);
                    ctx.strokeRect(-20, -20, 40, 40);
                } else if (obj.shape === 'Circulo') {
                    ctx.beginPath();
                    ctx.arc(0, 0, 20, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();

                ctx.font = 'bold 11px "Courier New", monospace';
                ctx.fillStyle = '#111111';
                ctx.fillText(obj.name, obj.x - 15, obj.y - 25);
                ctx.fillStyle = '#FFFFF0';
                ctx.fillText(obj.name, obj.x - 16, obj.y - 26);
            });
            actualizarListaObjetos();
        }

        function encontrarObj(nombre) {
            return objetos.find(obj => obj.name === nombre);
        }

        function resetTotal() {
            objetos = [];
            variables = {};
            keyActions = {};
            ifActive = false;
            ifResult = false;
            elsePending = false;
            elseActive = false;
            elseResult = false;
            renderizar();
            logMessage('🔄 Escenario reiniciado.');
        }

        // ========== VISOR DE ERRORES ==========
        function mostrarErrores() {
            if (errores.length === 0) {
                errorPanel.innerHTML = '<div style="color:#b0ffb0;">✅ Sin errores</div>';
                return;
            }
            let html = '';
            errores.forEach(err => {
                html += `<div class="error-item">Línea ${err.linea}: ${err.mensaje}</div>`;
            });
            errorPanel.innerHTML = html;
        }

        // ========== PARSER Y EJECUCIÓN CON REGISTRO DE ERRORES ==========
        function parsearComando(linea) {
            linea = linea.trim();
            if (linea === '' || linea.startsWith('//')) return null;
            let partes = linea.split(/\s+/);
            if (partes.length === 0) return null;
            let comando = partes[0].toLowerCase();
            let argumentos = partes.slice(1);
            return { comando, argumentos };
        }

        function evaluarCondicion(argumentos, lineaNum) {
            if (argumentos.length < 3) {
                errores.push({ linea: lineaNum, mensaje: 'if: necesita variable operador valor' });
                return null;
            }
            let varName = argumentos[0];
            let operador = argumentos[1];
            let valorStr = argumentos[2];

            if (!(varName in variables)) {
                errores.push({ linea: lineaNum, mensaje: `if: variable "${varName}" no existe` });
                return null;
            }
            let varVal = variables[varName];
            let valorNum = parseFloat(valorStr);
            if (isNaN(valorNum)) {
                if (valorStr in variables) {
                    valorNum = variables[valorStr];
                } else {
                    errores.push({ linea: lineaNum, mensaje: `if: valor no numérico ni variable: ${valorStr}` });
                    return null;
                }
            }

            switch (operador) {
                case '=': return varVal === valorNum;
                case '<': return varVal < valorNum;
                case '>': return varVal > valorNum;
                case '<=': return varVal <= valorNum;
                case '>=': return varVal >= valorNum;
                case '<>': return varVal !== valorNum;
                default:
                    errores.push({ linea: lineaNum, mensaje: `if: operador desconocido "${operador}"` });
                    return null;
            }
        }

        function ejecutarComando(parsed, lineaNum) {
            if (!parsed) return false;
            const { comando, argumentos } = parsed;

            // Manejo de if/else (con flags)
            if (comando === 'if') {
                let cond = evaluarCondicion(argumentos, lineaNum);
                if (cond === null) return false;
                ifActive = true;
                ifResult = cond;
                elsePending = false;
                elseActive = false;
                logMessage(`🔍 if: ${cond ? 'verdadero' : 'falso'}`);
                return true;
            }

            if (ifActive) {
                ifActive = false;
                if (ifResult) {
                    logMessage('  → then ejecutado');
                    ejecutarComandoNormal(parsed, lineaNum);
                } else {
                    logMessage('  → then omitido');
                }
                elsePending = true;
                return true;
            }

            if (elsePending) {
                elsePending = false;
                if (comando === 'else') {
                    elseActive = true;
                    elseResult = !ifResult;
                    logMessage('  → else detectado');
                    return true;
                } else {
                    logMessage('  → (sin else)');
                    ejecutarComandoNormal(parsed, lineaNum);
                    return true;
                }
            }

            if (elseActive) {
                elseActive = false;
                if (elseResult) {
                    logMessage('  → else ejecutado');
                    ejecutarComandoNormal(parsed, lineaNum);
                } else {
                    logMessage('  → else omitido');
                }
                return true;
            }

            ejecutarComandoNormal(parsed, lineaNum);
            return true;
        }

        function ejecutarComandoNormal(parsed, lineaNum) {
            const { comando, argumentos } = parsed;

            if (comando === 'varcreate') {
                if (argumentos.length < 1) {
                    errores.push({ linea: lineaNum, mensaje: 'varcreate: necesita nombre' });
                    return;
                }
                let nombre = argumentos[0];
                if (nombre in variables) {
                    errores.push({ linea: lineaNum, mensaje: `varcreate: variable "${nombre}" ya existe` });
                    return;
                }
                variables[nombre] = 0;
                logMessage(`📊 variable "${nombre}" creada = 0`);
            }
            else if (comando === 'varset') {
                if (argumentos.length < 2) {
                    errores.push({ linea: lineaNum, mensaje: 'varset: necesita nombre y valor' });
                    return;
                }
                let nombre = argumentos[0];
                let valor = parseFloat(argumentos[1]);
                if (isNaN(valor)) {
                    if (argumentos[1] in variables) {
                        valor = variables[argumentos[1]];
                    } else {
                        errores.push({ linea: lineaNum, mensaje: `varset: valor no numérico ni variable: ${argumentos[1]}` });
                        return;
                    }
                }
                if (!(nombre in variables)) {
                    errores.push({ linea: lineaNum, mensaje: `varset: variable "${nombre}" no existe` });
                    return;
                }
                variables[nombre] = valor;
                logMessage(`📊 variable "${nombre}" = ${valor}`);
            }
            else if (comando === 'createobj') {
                if (argumentos.length < 3) {
                    errores.push({ linea: lineaNum, mensaje: 'createobj: necesita: nombre forma color' });
                    return;
                }
                const [nombre, forma, color] = argumentos;
                if (forma !== 'Cubo' && forma !== 'Circulo') {
                    errores.push({ linea: lineaNum, mensaje: `createobj: forma debe ser Cubo o Circulo (recibió: ${forma})` });
                    return;
                }
                if (encontrarObj(nombre)) {
                    errores.push({ linea: lineaNum, mensaje: `createobj: ya existe un objeto "${nombre}"` });
                    return;
                }
                objetos.push({
                    name: nombre,
                    shape: forma,
                    color: color,
                    x: 200,
                    y: 200,
                    rotation: 0
                });
                logMessage(`✅ objeto "${nombre}" creado (${forma}, ${color}) en (200,200)`);
                renderizar();
            }
            else if (comando === 'mov') {
                if (argumentos.length < 3) {
                    errores.push({ linea: lineaNum, mensaje: 'mov: necesita: nombre dx dy' });
                    return;
                }
                const [nombre, dxStr, dyStr] = argumentos;
                const obj = encontrarObj(nombre);
                if (!obj) {
                    errores.push({ linea: lineaNum, mensaje: `mov: objeto "${nombre}" no existe` });
                    return;
                }
                const dx = parseFloat(dxStr);
                const dy = parseFloat(dyStr);
                if (isNaN(dx) || isNaN(dy)) {
                    errores.push({ linea: lineaNum, mensaje: 'mov: dx y dy deben ser números' });
                    return;
                }
                obj.x += dx;
                obj.y += dy;
                logMessage(`🚚 "${nombre}" movido a (${obj.x},${obj.y})`);
                renderizar();
            }
            else if (comando === 'tp') {
                if (argumentos.length < 3) {
                    errores.push({ linea: lineaNum, mensaje: 'tp: necesita: nombre x y' });
                    return;
                }
                const [nombre, xStr, yStr] = argumentos;
                const obj = encontrarObj(nombre);
                if (!obj) {
                    errores.push({ linea: lineaNum, mensaje: `tp: objeto "${nombre}" no existe` });
                    return;
                }
                const x = parseFloat(xStr);
                const y = parseFloat(yStr);
                if (isNaN(x) || isNaN(y)) {
                    errores.push({ linea: lineaNum, mensaje: 'tp: x e y deben ser números' });
                    return;
                }
                obj.x = x;
                obj.y = y;
                logMessage(`📞 "${nombre}" teleportado a (${obj.x},${obj.y})`);
                renderizar();
            }
            else if (comando === 'rotate') {
                if (argumentos.length < 2) {
                    errores.push({ linea: lineaNum, mensaje: 'rotate: necesita objeto y grados' });
                    return;
                }
                let nombre = argumentos[0];
                let grados = parseFloat(argumentos[1]);
                if (isNaN(grados)) {
                    errores.push({ linea: lineaNum, mensaje: 'rotate: grados debe ser número' });
                    return;
                }
                let obj = encontrarObj(nombre);
                if (!obj) {
                    errores.push({ linea: lineaNum, mensaje: `rotate: objeto "${nombre}" no existe` });
                    return;
                }
                obj.rotation = grados;
                logMessage(`🔄 "${nombre}" rotado a ${grados}°`);
                renderizar();
            }
            else if (comando === 'input') {
                if (argumentos.length < 1) {
                    errores.push({ linea: lineaNum, mensaje: 'input: necesita una tecla' });
                    return;
                }
                const tecla = argumentos[0].toLowerCase();
                keyActions[tecla] = () => {
                    logMessage(`⌨️ Tecla "${tecla}" presionada`);
                };
                logMessage(`🎹 Tecla "${tecla}" registrada`);
            }
            else if (comando === 'finish') {
                resetTotal();
            }
            else {
                errores.push({ linea: lineaNum, mensaje: `comando desconocido: "${comando}"` });
            }
        }

        function ejecutarTodo() {
            // Reiniciar todo
            objetos = [];
            variables = {};
            keyActions = {};
            ifActive = false;
            ifResult = false;
            elsePending = false;
            elseActive = false;
            elseResult = false;
            errores = [];

            const codigo = codeArea.value;
            const lineas = codigo.split('\n');
            lineas.forEach((linea, index) => {
                const lineaNum = index + 1;
                const parsed = parsearComando(linea);
                if (parsed) {
                    ejecutarComando(parsed, lineaNum);
                } else {
                    if (linea.trim() !== '' && !linea.trim().startsWith('//')) {
                        // Línea no vacía y no comentario, pero no se pudo parsear? maybe espacios
                        // No generamos error por ahora
                    }
                }
            });
            renderizar();
            mostrarErrores();
            logMessage('📟 Ejecución completada.');
        }

        function cargarEjemplos() {
            codeArea.value = `// Programa de ejemplo
varcreate puntuacion
varset puntuacion 8
createobj nave Cubo #3a6ea5
createobj enemigo Circulo #b0302a
tp enemigo 300 200
rotate nave 30

if puntuacion > 5
  tp nave 100 100
  rotate nave 45
else
  tp nave 300 300
  rotate nave -45

input a
input tab
input espacio
// finish (opcional)`;
            logMessage('📂 Ejemplos cargados.');
        }

        // Demo inicial
        function demoInicial() {
            objetos = [
                { name: 'demoCuad', shape: 'Cubo', color: '#1070c0', x: 150, y: 150, rotation: 15 },
                { name: 'demoCirc', shape: 'Circulo', color: '#c05030', x: 260, y: 280, rotation: 0 }
            ];
            variables = { puntuacion: 5 };
            renderizar();
            logMessage('⚡ Easy Pro 2008 listo. Objetos de demostración.');
        }

        document.getElementById('runBtn').addEventListener('click', () => {
            ejecutarTodo();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetTotal();
            errores = [];
            mostrarErrores();
        });

        document.getElementById('exampleBtn').addEventListener('click', () => {
            cargarEjemplos();
        });

        demoInicial();
    })();
</script>
</body>
</html>
