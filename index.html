<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod P2P Mejorado (Corregido)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 30, 0.85);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 100;
        }
        #ui h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255,170,0,0.5);
        }
        #ui p {
            margin: 5px 0;
            font-size: 16px;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 220px;
            pointer-events: auto;
        }
        #controls input, #controls button {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: none;
            background: #333;
            color: white;
            border: 1px solid #555;
        }
        #controls button {
            background: #2a6f97;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #controls button:hover:not(:disabled) {
            background: #3a8fc7;
        }
        #controls button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #0f0;
            z-index: 100;
        }
        #mode-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffaa00;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            border: 1px solid #ffaa00;
            z-index: 100;
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        .crosshair::before {
            width: 2px;
            height: 10px;
            top: 5px;
            left: 9px;
        }
        .crosshair::after {
            width: 10px;
            height: 2px;
            top: 9px;
            left: 5px;
        }
    </style>
    <!-- Cambio a CDN más fiable para Cannon.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1>🔫 GMod P2P Mejorado</h1>
        <p>🖱️ Clic izquierdo: Crear objeto en el punto de mira</p>
        <p>🔢 Teclas 1,2,3: Cambiar tipo (cubo, esfera, cono)</p>
        <p>🌐 Conéctate con amigos usando el mismo ID</p>
    </div>
    <div id="controls">
        <input type="text" id="roomIdInput" placeholder="ID de sala" />
        <button id="createBtn">🎮 Crear sala (anfitrión)</button>
        <button id="joinBtn">🔌 Unirse a sala</button>
        <button id="disconnectBtn" disabled>❌ Desconectar</button>
    </div>
    <div id="status">Desconectado</div>
    <div id="mode-indicator">Modo: Cubo</div>
    <div class="crosshair"></div>

    <script>
        // Verificar que las librerías se cargaron correctamente
        (function checkLibraries() {
            if (typeof THREE === 'undefined') {
                console.error('Three.js no se cargó');
                document.body.innerHTML += '<div style="color:red; position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px;">Error: Three.js no se cargó. Verifica tu conexión o el CDN.</div>';
                return false;
            }
            if (typeof CANNON === 'undefined') {
                console.error('Cannon.js no se cargó');
                document.body.innerHTML += '<div style="color:red; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px;">Error: Cannon.js no se cargó. Verifica tu conexión o el CDN.</div>';
                return false;
            }
            if (typeof Peer === 'undefined') {
                console.error('PeerJS no se cargó');
                document.body.innerHTML += '<div style="color:red; position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px;">Error: PeerJS no se cargó. Verifica tu conexión o el CDN.</div>';
                return false;
            }
            return true;
        })();

        // --- Configuración principal ---
        const config = {
            spawnDistance: 5,
            objectSize: 0.5,
            colors: [
                0xff5733, 0x33ff57, 0x3357ff, 0xff33f1, 0xffd733, 0x33fff5
            ]
        };

        // --- Clase para manejar objetos del juego ---
        class GameObject {
            constructor(type, position, material, quaternion = null, color = null, id = null) {
                this.type = type;
                this.id = id !== null ? id : this.generateId();
                this.color = color !== null ? color : this.randomColor();

                this.body = this.createBody(position, material, quaternion);
                this.mesh = this.createMesh();
                this.updateMeshFromBody();
            }

            generateId() {
                return Date.now() + Math.random() + performance.now();
            }

            randomColor() {
                return config.colors[Math.floor(Math.random() * config.colors.length)];
            }

            createBody(position, material, quaternion) {
                let shape;
                const size = config.objectSize;
                switch (this.type) {
                    case 'cube':
                        shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
                        break;
                    case 'sphere':
                        shape = new CANNON.Sphere(size/2);
                        break;
                    case 'cone':
                        shape = new CANNON.Cylinder(size/2, size/2, size, 8);
                        break;
                    default:
                        shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
                }

                const body = new CANNON.Body({ mass: 1, material: material });
                body.addShape(shape);
                body.position.set(position.x, position.y, position.z);
                if (quaternion) {
                    body.quaternion.copy(quaternion);
                }
                return body;
            }

            createMesh() {
                let geometry;
                const size = config.objectSize;
                switch (this.type) {
                    case 'cube':
                        geometry = new THREE.BoxGeometry(size, size, size);
                        break;
                    case 'sphere':
                        geometry = new THREE.SphereGeometry(size/2, 32);
                        break;
                    case 'cone':
                        geometry = new THREE.ConeGeometry(size/2, size, 32);
                        break;
                    default:
                        geometry = new THREE.BoxGeometry(size, size, size);
                }
                const material = new THREE.MeshStandardMaterial({ color: this.color, emissive: 0x222222 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                return mesh;
            }

            updateMeshFromBody() {
                this.mesh.position.copy(this.body.position);
                this.mesh.quaternion.copy(this.body.quaternion);
            }

            toJSON() {
                return {
                    id: this.id,
                    type: this.type,
                    x: this.body.position.x,
                    y: this.body.position.y,
                    z: this.body.position.z,
                    qx: this.body.quaternion.x,
                    qy: this.body.quaternion.y,
                    qz: this.body.quaternion.z,
                    qw: this.body.quaternion.w,
                    color: this.color
                };
            }
        }

        // --- Clase principal del juego ---
        class Game {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x111122);
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(8, 6, 12);
                this.camera.lookAt(0, 2, 0);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.body.appendChild(this.renderer.domElement);

                this.world = new CANNON.World();
                this.world.gravity.set(0, -9.82, 0);
                this.world.broadphase = new CANNON.SAPBroadphase(this.world);
                this.world.defaultContactMaterial.restitution = 0.3;

                this.groundMaterial = new CANNON.Material("groundMaterial");
                this.cubeMaterial = new CANNON.Material("cubeMaterial");
                const contactMaterial = new CANNON.ContactMaterial(this.groundMaterial, this.cubeMaterial, {
                    friction: 0.5,
                    restitution: 0.4
                });
                this.world.addContactMaterial(contactMaterial);

                this.objects = [];

                this.initLights();
                this.initMap();

                // Red
                this.peer = null;
                this.connections = [];
                this.isHost = false;
                this.myPeerId = null;
                this.roomId = null;

                this.currentMode = 'cube';

                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2(0, 0);

                // UI
                this.statusDiv = document.getElementById('status');
                this.modeIndicator = document.getElementById('mode-indicator');
                this.roomIdInput = document.getElementById('roomIdInput');
                this.createBtn = document.getElementById('createBtn');
                this.joinBtn = document.getElementById('joinBtn');
                this.disconnectBtn = document.getElementById('disconnectBtn');

                this.initUIEvents();
                this.initKeyboardEvents();
                this.initClickEvents();

                this.animate();
            }

            initLights() {
                const ambientLight = new THREE.AmbientLight(0x404060);
                this.scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
                dirLight.position.set(5, 15, 10);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                const d = 15;
                dirLight.shadow.camera.left = -d;
                dirLight.shadow.camera.right = d;
                dirLight.shadow.camera.top = d;
                dirLight.shadow.camera.bottom = -d;
                dirLight.shadow.camera.near = 1;
                dirLight.shadow.camera.far = 30;
                this.scene.add(dirLight);

                const fillLight = new THREE.PointLight(0x446688, 0.5);
                fillLight.position.set(-5, 5, 5);
                this.scene.add(fillLight);
            }

            initMap() {
                // Suelo con textura
                const groundGeo = new THREE.PlaneGeometry(30, 30);
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#3a5f3a';
                ctx.fillRect(0, 0, 512, 512);
                ctx.strokeStyle = '#2a4a2a';
                ctx.lineWidth = 4;
                for (let i = 0; i <= 512; i += 64) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, 512);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(512, i);
                    ctx.stroke();
                }
                const groundTexture = new THREE.CanvasTexture(canvas);
                groundTexture.wrapS = THREE.RepeatWrapping;
                groundTexture.wrapT = THREE.RepeatWrapping;
                groundTexture.repeat.set(8, 8);

                const groundMat = new THREE.MeshStandardMaterial({ map: groundTexture });
                const groundMesh = new THREE.Mesh(groundGeo, groundMat);
                groundMesh.rotation.x = -Math.PI/2;
                groundMesh.position.y = 0;
                groundMesh.receiveShadow = true;
                this.scene.add(groundMesh);

                const groundShape = new CANNON.Plane();
                const groundBody = new CANNON.Body({ mass: 0, material: this.groundMaterial });
                groundBody.addShape(groundShape);
                groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
                this.world.addBody(groundBody);

                // Obstáculos estáticos
                this.addStaticProp('cube', { x: 2, y: 0.5, z: 2 }, { x:0, y:0, z:0 }, 0x888888, [2, 1, 2]);
                this.addStaticProp('cube', { x: -2, y: 0.5, z: -2 }, { x:0, y:0, z:0 }, 0x888888, [2, 1, 2]);
                this.addStaticProp('cube', { x: 3, y: 0.5, z: -3 }, { x:0, y:0, z:0 }, 0x888888, [1, 1, 3]);
                this.addStaticProp('cylinder', { x: -3, y: 0.5, z: 3 }, { x:0, y:0, z:0 }, 0xaa5533, [1, 1, 1]);
                this.addStaticProp('cylinder', { x: 0, y: 0.5, z: 4 }, { x:0, y:0, z:0 }, 0xaa5533, [1, 1.5, 1]);
            }

            addStaticProp(type, pos, rot, color, size) {
                let geometry;
                if (type === 'cube') {
                    geometry = new THREE.BoxGeometry(size[0], size[1], size[2]);
                } else {
                    geometry = new THREE.CylinderGeometry(size[0], size[0], size[1], 16);
                }
                const material = new THREE.MeshStandardMaterial({ color, emissive: 0x111111 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(pos.x, pos.y, pos.z);
                mesh.rotation.set(rot.x, rot.y, rot.z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                this.scene.add(mesh);

                let shape;
                if (type === 'cube') {
                    shape = new CANNON.Box(new CANNON.Vec3(size[0]/2, size[1]/2, size[2]/2));
                } else {
                    shape = new CANNON.Cylinder(size[0], size[0], size[1], 16);
                }
                const body = new CANNON.Body({ mass: 0, material: this.groundMaterial });
                body.addShape(shape);
                body.position.set(pos.x, pos.y, pos.z);
                body.quaternion.setFromEuler(rot.x, rot.y, rot.z);
                this.world.addBody(body);
            }

            initUIEvents() {
                this.createBtn.addEventListener('click', () => this.setupHost());
                this.joinBtn.addEventListener('click', () => {
                    const hostId = this.roomIdInput.value.trim();
                    if (hostId) this.joinRoom(hostId);
                    else alert('Introduce un ID de sala válido');
                });
                this.disconnectBtn.addEventListener('click', () => this.disconnect());
            }

            initKeyboardEvents() {
                window.addEventListener('keydown', (e) => {
                    if (e.key === '1') {
                        this.currentMode = 'cube';
                        this.modeIndicator.textContent = 'Modo: Cubo';
                    } else if (e.key === '2') {
                        this.currentMode = 'sphere';
                        this.modeIndicator.textContent = 'Modo: Esfera';
                    } else if (e.key === '3') {
                        this.currentMode = 'cone';
                        this.modeIndicator.textContent = 'Modo: Cono';
                    }
                });
            }

            initClickEvents() {
                this.renderer.domElement.addEventListener('click', (e) => {
                    if (!this.peer) {
                        alert('Conéctate a una sala primero');
                        return;
                    }
                    this.createObjectAtCrosshair();
                });
            }

            createObjectAtCrosshair() {
                this.raycaster.setFromCamera(this.mouse, this.camera);
                const intersects = this.raycaster.intersectObjects(this.scene.children, true);

                let targetPos;
                if (intersects.length > 0) {
                    targetPos = intersects[0].point;
                } else {
                    const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
                    targetPos = this.camera.position.clone().add(direction.multiplyScalar(config.spawnDistance));
                }

                const newObj = new GameObject(
                    this.currentMode,
                    targetPos,
                    this.cubeMaterial,
                    null,
                    null,
                    null
                );
                this.addObject(newObj);
                this.sendObjectCreation(newObj);
            }

            addObject(obj) {
                this.objects.push(obj);
                this.world.addBody(obj.body);
                this.scene.add(obj.mesh);
            }

            removeObject(obj) {
                const index = this.objects.indexOf(obj);
                if (index > -1) {
                    this.world.removeBody(obj.body);
                    this.scene.remove(obj.mesh);
                    this.objects.splice(index, 1);
                }
            }

            sendObjectCreation(obj) {
                const msg = {
                    type: 'newObject',
                    data: obj.toJSON()
                };
                if (this.isHost) {
                    this.broadcastToPeers(msg);
                } else {
                    if (this.connections.length > 0 && this.connections[0].open) {
                        this.connections[0].send(msg);
                    }
                }
            }

            // --- Red P2P ---
            async setupHost() {
                if (!this.peer) await this.initPeer();
                this.isHost = true;
                this.roomId = this.myPeerId;
                this.roomIdInput.value = this.roomId;
                this.updateStatus(`Eres el anfitrión. Sala: ${this.roomId}. Esperando jugadores...`);

                this.peer.on('connection', (conn) => {
                    this.updateStatus(`Nuevo jugador conectado: ${conn.peer}`);
                    this.connections.push(conn);

                    conn.on('data', (data) => this.handleMessage(data, conn));
                    conn.on('close', () => {
                        this.updateStatus(`Jugador ${conn.peer} desconectado`);
                        this.connections = this.connections.filter(c => c.peer !== conn.peer);
                    });

                    const objectsData = this.objects.map(obj => obj.toJSON());
                    conn.send({ type: 'init', objects: objectsData });
                });

                this.setUIState(true);
            }

            async joinRoom(hostId) {
                if (!this.peer) await this.initPeer();
                this.isHost = false;
                this.roomId = hostId;
                this.updateStatus(`Conectando a la sala ${hostId}...`);

                const conn = this.peer.connect(hostId);
                conn.on('open', () => {
                    this.updateStatus(`Conectado al anfitrión ${hostId}`);
                    this.connections = [conn];

                    conn.on('data', (data) => this.handleMessage(data, conn));
                    conn.on('close', () => {
                        this.updateStatus('Desconectado del anfitrión');
                        this.connections = [];
                    });
                });
                conn.on('error', (err) => {
                    console.error('Connection error:', err);
                    this.updateStatus('Error al conectar', true);
                });

                this.setUIState(true);
            }

            async initPeer() {
                return new Promise((resolve, reject) => {
                    this.peer = new Peer();
                    this.peer.on('open', (id) => {
                        this.myPeerId = id;
                        this.updateStatus(`Conectado a PeerJS. ID: ${id}`);
                        resolve();
                    });
                    this.peer.on('error', (err) => {
                        console.error('Peer error:', err);
                        this.updateStatus('Error PeerJS', true);
                        reject(err);
                    });
                });
            }

            handleMessage(data, conn) {
                if (data.type === 'init') {
                    this.clearAllObjects();
                    data.objects.forEach(objData => {
                        const pos = new CANNON.Vec3(objData.x, objData.y, objData.z);
                        const quat = new CANNON.Quaternion(objData.qx, objData.qy, objData.qz, objData.qw);
                        const obj = new GameObject(
                            objData.type,
                            pos,
                            this.cubeMaterial,
                            quat,
                            objData.color,
                            objData.id
                        );
                        this.addObject(obj);
                    });
                } else if (data.type === 'newObject') {
                    const d = data.data;
                    const pos = new CANNON.Vec3(d.x, d.y, d.z);
                    const quat = new CANNON.Quaternion(d.qx, d.qy, d.qz, d.qw);
                    const obj = new GameObject(
                        d.type,
                        pos,
                        this.cubeMaterial,
                        quat,
                        d.color,
                        d.id
                    );
                    this.addObject(obj);
                }
            }

            broadcastToPeers(message) {
                this.connections.forEach(conn => {
                    if (conn.open) conn.send(message);
                });
            }

            disconnect() {
                if (this.peer) {
                    this.peer.destroy();
                    this.peer = null;
                }
                this.connections.forEach(conn => conn.close());
                this.connections = [];
                this.isHost = false;
                this.roomId = null;
                this.clearAllObjects();
                this.updateStatus('Desconectado');
                this.setUIState(false);
            }

            clearAllObjects() {
                this.objects.forEach(obj => {
                    this.world.removeBody(obj.body);
                    this.scene.remove(obj.mesh);
                });
                this.objects = [];
            }

            updateStatus(text, isError = false) {
                this.statusDiv.textContent = text;
                this.statusDiv.style.color = isError ? '#f00' : '#0f0';
            }

            setUIState(connected) {
                this.disconnectBtn.disabled = !connected;
                this.createBtn.disabled = connected;
                this.joinBtn.disabled = connected;
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                this.world.step(1/60);
                this.objects.forEach(obj => obj.updateMeshFromBody());

                this.renderer.render(this.scene, this.camera);
            }
        }

        // Inicializar solo si las librerías están cargadas
        window.onload = () => {
            if (typeof CANNON !== 'undefined' && typeof THREE !== 'undefined' && typeof Peer !== 'undefined') {
                try {
                    window.game = new Game();
                    console.log('Juego inicializado correctamente');
                } catch (error) {
                    console.error('Error al inicializar el juego:', error);
                    document.body.innerHTML += `<div style="color:red; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px;">Error: ${error.message}</div>`;
                }
            } else {
                document.body.innerHTML += '<div style="color:red; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px;">Error: No se cargaron todas las librerías necesarias.</div>';
            }
        };
    </script>
</body>
</html>
