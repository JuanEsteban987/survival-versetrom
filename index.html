<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Maker 2008 - Visual Script</title>
    <style>
        /* RESET Y ESTILOS GENERALES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Lucida Console', monospace;
        }

        body {
            background: #26475f; /* azul oscuro GM */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* VENTANA PRINCIPAL - como GM */
        .ventana-gm {
            width: 1100px;
            background: #b0b9c9; /* gris GM */
            border: 4px solid;
            border-color: #f0f0f0 #6a6a6a #6a6a6a #f0f0f0;
            border-radius: 0;
            box-shadow: 4px 4px 8px #1f2f3f;
            padding: 4px;
        }

        /* BARRA DE TÍTULO DE VENTANA (como GM) */
        .titulo-ventana {
            background: linear-gradient(90deg, #0a2c4e, #296c9c);
            color: white;
            font-weight: bold;
            font-size: 18px;
            padding: 6px 12px;
            border: 2px solid;
            border-color: #e0e0e0 #2b2b2b #2b2b2b #e0e0e0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 2px 2px 0 #1a3f5a;
            letter-spacing: 1px;
        }

        .titulo-ventana span {
            background: #f0c060;
            color: #202020;
            font-size: 14px;
            padding: 2px 16px;
            border: 2px solid;
            border-color: #ffffa0 #a0a040 #a0a040 #ffffa0;
        }

        /* CONTENEDOR COLUMNAS */
        .contenedor-columnas {
            display: flex;
            gap: 12px;
            padding: 4px;
        }

        /* PANEL IZQUIERDO: ROOM */
        .panel-room {
            flex: 1;
            background: #8b9bb5;
            border: 4px solid;
            border-color: #e0e8f0 #4f5f77 #4f5f77 #e0e8f0;
            padding: 12px;
        }

        .sub-titulo {
            background: #a0b0c8;
            border: 2px solid;
            border-color: #f0f8ff #5f6f88 #5f6f88 #f0f8ff;
            font-weight: bold;
            font-size: 16px;
            padding: 4px 8px;
            margin-bottom: 12px;
            text-align: center;
            color: #101010;
            text-transform: uppercase;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
            background: #4a607a;
            padding: 12px;
            border: 4px solid;
            border-color: #708090 #2a3a4a #2a3a4a #708090;
        }

        canvas {
            border: 4px solid #2b3f59;
            background: #b7d0e8;
            box-shadow: inset 0 0 0 2px #d0e4ff, 4px 4px 0 #1e2f40;
            image-rendering: pixelated;
        }

        .info-object {
            background: #b0c0d0;
            border: 4px solid;
            border-color: #f0f8ff #5f6f88 #5f6f88 #f0f8ff;
            padding: 8px;
            font-weight: bold;
            color: #1e2f3f;
            display: flex;
            justify-content: space-between;
        }

        /* PANEL DERECHO: SCRIPT VISUAL (estilo GM) */
        .panel-script {
            width: 460px;
            background: #8b9bb5;
            border: 4px solid;
            border-color: #e0e8f0 #4f5f77 #4f5f77 #e0e8f0;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        /* BARRA DE HERRAMIENTAS (iconos de acción) */
        .toolbar-acciones {
            background: #a0b0c8;
            border: 4px solid;
            border-color: #f0f8ff #5f6f88 #5f6f88 #f0f8ff;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .boton-accion {
            width: 80px;
            height: 70px;
            background: #e0e8f0;
            border: 4px solid;
            border-color: #ffffff #8a9ab0 #8a9ab0 #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            color: #101010;
            box-shadow: 2px 2px 0 #3a4a60;
            transition: 0.05s linear;
            user-select: none;
            padding: 4px;
        }

        .boton-accion:active {
            transform: translate(2px, 2px);
            box-shadow: none;
            border-color: #8a9ab0 #ffffff #ffffff #8a9ab0;
        }

        .boton-accion.disabled, .boton-accion:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .icono-accion {
            font-size: 32px;
            line-height: 1;
            filter: drop-shadow(2px 2px 0 #a0b0c0);
        }

        .etiqueta-accion {
            font-size: 12px;
            background: #265987;
            color: white;
            padding: 2px 6px;
            margin-top: 2px;
            border: 2px solid #a0c0e0;
            text-transform: uppercase;
        }

        /* CAJA DE SCRIPT (lista de acciones) */
        .script-container {
            background: #3a4f69;
            border: 4px solid;
            border-color: #708090 #1e2f3f #1e2f3f #708090;
            padding: 10px;
            min-height: 320px;
            max-height: 400px;
            overflow-y: auto;
        }

        .script-lista {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bloque-accion {
            background: #d0d8e8;
            border: 4px solid;
            border-color: #f8fcff #8a98b0 #8a98b0 #f8fcff;
            display: flex;
            align-items: center;
            padding: 4px 8px;
            box-shadow: 2px 2px 0 #1f2f40;
        }

        .bloque-icono {
            font-size: 28px;
            width: 48px;
            text-align: center;
            background: #2f4f6f;
            color: white;
            border: 2px solid #b0d0f0;
            margin-right: 12px;
            padding: 2px;
            text-shadow: 2px 2px 0 #102030;
        }

        .bloque-texto {
            flex: 1;
            font-weight: bold;
            font-size: 16px;
            color: #101820;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bloque-controles {
            display: flex;
            gap: 6px;
        }

        .bloque-controles button {
            background: #c0d0e0;
            border: 4px solid;
            border-color: #f0f8ff #7b8ba3 #7b8ba3 #f0f8ff;
            font-weight: bold;
            font-size: 18px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            line-height: 1;
            color: #101010;
        }

        .bloque-controles button:active {
            transform: translate(2px, 2px);
            border-color: #7b8ba3 #f0f8ff #f0f8ff #7b8ba3;
        }

        .bloque-controles button:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* BOTONES DE CONTROL INFERIORES (estilo GM) */
        .botones-control {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        .btn-gm {
            background: #b0c0d0;
            border: 4px solid;
            border-color: #f0f8ff #6f7f97 #6f7f97 #f0f8ff;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            color: #102030;
            box-shadow: 2px 2px 0 #2a3a4a;
        }

        .btn-gm:active {
            transform: translate(2px, 2px);
            box-shadow: none;
            border-color: #6f7f97 #f0f8ff #f0f8ff #6f7f97;
        }

        .btn-gm:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* mensajes estilo GM */
        .mensaje-gm {
            margin-top: 12px;
            background: #e0e8f0;
            border: 4px solid;
            border-color: #ffffff #7b8ba3 #7b8ba3 #ffffff;
            padding: 8px;
            font-weight: bold;
            color: #102030;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="ventana-gm">
    <!-- Barra de título principal -->
    <div class="titulo-ventana">
        🎮 GameMaker 8.0 - Visual Script 2008
        <span>drag & drop style</span>
    </div>

    <div class="contenedor-columnas">
        <!-- PANEL ROOM (juego) -->
        <div class="panel-room">
            <div class="sub-titulo">📦 room0 - objeto player</div>
            <div class="canvas-container">
                <canvas id="gameCanvas" width="200" height="200"></canvas>
            </div>
            <div class="info-object">
                <span id="posJugador">posición: (0,0)</span>
                <span>✨ meta: (4,4)</span>
            </div>
        </div>

        <!-- PANEL SCRIPT VISUAL (estilo Game Maker) -->
        <div class="panel-script">
            <div class="sub-titulo">🧩 object0 - script (d&d)</div>

            <!-- Barra de herramientas con iconos de acciones -->
            <div class="toolbar-acciones">
                <div class="boton-accion" id="btnAddUp" title="Mover arriba">
                    <div class="icono-accion">⬆️</div>
                    <div class="etiqueta-accion">UP</div>
                </div>
                <div class="boton-accion" id="btnAddDown" title="Mover abajo">
                    <div class="icono-accion">⬇️</div>
                    <div class="etiqueta-accion">DOWN</div>
                </div>
                <div class="boton-accion" id="btnAddLeft" title="Mover izquierda">
                    <div class="icono-accion">⬅️</div>
                    <div class="etiqueta-accion">LEFT</div>
                </div>
                <div class="boton-accion" id="btnAddRight" title="Mover derecha">
                    <div class="icono-accion">➡️</div>
                    <div class="etiqueta-accion">RIGHT</div>
                </div>
            </div>

            <!-- Contenedor de la lista de script (acciones) -->
            <div class="script-container">
                <div id="scriptList" class="script-lista">
                    <!-- Los bloques se generan dinámicamente -->
                </div>
            </div>

            <!-- Botones de control: ejecutar, reset, limpiar -->
            <div class="botones-control">
                <button class="btn-gm" id="btnRun">▶ EJECUTAR</button>
                <button class="btn-gm" id="btnResetRoom">⟲ RESET</button>
                <button class="btn-gm" id="btnClearScript">✖ LIMPIAR</button>
            </div>

            <!-- Área de mensajes -->
            <div id="gmMessage" class="mensaje-gm">
                💾 Arrastra acciones al script (botones)
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- CONFIGURACIÓN ----------
        const GRID_SIZE = 5;
        const CELL_SIZE = 40;
        const META = { x: 4, y: 4 };

        // Estado del juego
        let jugador = { x: 0, y: 0 };

        // Lista de acciones (script visual)
        let acciones = []; // valores: 'up','down','left','right'

        // Control de ejecución
        let ejecutando = false;
        let timeoutId = null;

        // Elementos DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scriptListDiv = document.getElementById('scriptList');
        const mensajeDiv = document.getElementById('gmMessage');
        const posJugadorSpan = document.getElementById('posJugador');

        // Botones de acción
        const btnAddUp = document.getElementById('btnAddUp');
        const btnAddDown = document.getElementById('btnAddDown');
        const btnAddLeft = document.getElementById('btnAddLeft');
        const btnAddRight = document.getElementById('btnAddRight');
        const btnRun = document.getElementById('btnRun');
        const btnResetRoom = document.getElementById('btnResetRoom');
        const btnClearScript = document.getElementById('btnClearScript');

        // Colección para habilitar/deshabilitar
        const todosBotones = [btnAddUp, btnAddDown, btnAddLeft, btnAddRight, btnRun, btnResetRoom, btnClearScript];

        // ---------- DIBUJAR ROOM (estilo GM) ----------
        function dibujarRoom() {
            ctx.clearRect(0, 0, 200, 200);

            // cuadrícula estilo GM
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    let x = i * CELL_SIZE;
                    let y = j * CELL_SIZE;
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#aac6e8' : '#8fb0da';
                    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    ctx.strokeStyle = '#4a6c8f';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                }
            }

            // dibujar meta (GM star)
            let mx = META.x * CELL_SIZE;
            let my = META.y * CELL_SIZE;
            ctx.fillStyle = '#e03a3a';
            ctx.shadowColor = '#f0c060';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(mx + CELL_SIZE/2, my + CELL_SIZE/2, 15, 0, 2*Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffb0';
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⭐', mx + CELL_SIZE/2, my + CELL_SIZE/2 - 2);

            // dibujar jugador (sprite GM: balón sonriente)
            let px = jugador.x * CELL_SIZE;
            let py = jugador.y * CELL_SIZE;
            // cuerpo
            ctx.fillStyle = '#fcdb6a';
            ctx.shadowColor = '#b37b2e';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, 16, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = '#7f5f2a';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // ojos
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(px + 25, py + 15, 3, 0, 2*Math.PI);
            ctx.arc(px + 15, py + 15, 3, 0, 2*Math.PI);
            ctx.fill();
            // boca
            ctx.beginPath();
            ctx.strokeStyle = '#422013';
            ctx.lineWidth = 3;
            ctx.arc(px + 20, py + 27, 6, 0.2, Math.PI - 0.2);
            ctx.stroke();

            // actualizar info
            posJugadorSpan.innerText = `posición: (${jugador.x},${jugador.y})`;
        }

        // ---------- MANIPULACIÓN DE ACCIONES (script) ----------
        function renderizarScript() {
            if (acciones.length === 0) {
                scriptListDiv.innerHTML = '<div style="padding:20px; text-align:center; background:#5a6f8a; border:4px inset #2f405a; color:#ddd; font-weight:bold;">⬅️ Arrastra acciones aquí</div>';
                return;
            }

            let html = '';
            acciones.forEach((acc, index) => {
                let icono = '';
                let texto = '';
                switch(acc) {
                    case 'up': icono = '⬆️'; texto = 'MOVER ARRIBA'; break;
                    case 'down': icono = '⬇️'; texto = 'MOVER ABAJO'; break;
                    case 'left': icono = '⬅️'; texto = 'MOVER IZQUIERDA'; break;
                    case 'right': icono = '➡️'; texto = 'MOVER DERECHA'; break;
                }
                html += `<div class="bloque-accion" data-index="${index}">
                    <div class="bloque-icono">${icono}</div>
                    <div class="bloque-texto">${texto}</div>
                    <div class="bloque-controles">
                        <button class="btn-up" data-index="${index}" ${ejecutando ? 'disabled' : ''}>↑</button>
                        <button class="btn-down" data-index="${index}" ${ejecutando ? 'disabled' : ''}>↓</button>
                        <button class="btn-delete" data-index="${index}" ${ejecutando ? 'disabled' : ''}>✖</button>
                    </div>
                </div>`;
            });
            scriptListDiv.innerHTML = html;
        }

        // Agregar acción
        function agregarAccion(dir) {
            if (ejecutando) return;
            acciones.push(dir);
            renderizarScript();
            mensajeDiv.innerHTML = `➕ Acción añadida: ${dir}`;
        }

        // Eliminar
        function eliminarAccion(index) {
            if (ejecutando) return;
            if (index >= 0 && index < acciones.length) {
                acciones.splice(index, 1);
                renderizarScript();
            }
        }

        // Mover arriba
        function moverArriba(index) {
            if (ejecutando || index <= 0) return;
            [acciones[index-1], acciones[index]] = [acciones[index], acciones[index-1]];
            renderizarScript();
        }

        // Mover abajo
        function moverAbajo(index) {
            if (ejecutando || index >= acciones.length-1) return;
            [acciones[index], acciones[index+1]] = [acciones[index+1], acciones[index]];
            renderizarScript();
        }

        // Limpiar script
        function limpiarScript() {
            if (ejecutando) detenerEjecucion();
            acciones = [];
            renderizarScript();
            mensajeDiv.innerHTML = '🧹 Script limpiado.';
        }

        // Reset jugador
        function resetJugador() {
            if (ejecutando) detenerEjecucion();
            jugador = { x: 0, y: 0 };
            dibujarRoom();
            mensajeDiv.innerHTML = '🔄 Jugador reiniciado a (0,0)';
        }

        // Movimiento con límites
        function moverJugador(dx, dy) {
            let nx = jugador.x + dx;
            let ny = jugador.y + dy;
            if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                jugador.x = nx;
                jugador.y = ny;
            }
            dibujarRoom();
        }

        // Verificar victoria
        function checkVictoria() {
            if (jugador.x === META.x && jugador.y === META.y) {
                mensajeDiv.innerHTML = '🏆 ¡VICTORIA! ¡Has ganado! 🏆';
                return true;
            }
            return false;
        }

        // Detener ejecución
        function detenerEjecucion() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            ejecutando = false;
            habilitarBotones(true);
            renderizarScript(); // rehabilita botones de bloque
        }

        function habilitarBotones(estado) {
            todosBotones.forEach(btn => btn.disabled = !estado);
        }

        // Ejecutar script paso a paso
        function ejecutarScript() {
            if (ejecutando) return;
            if (acciones.length === 0) {
                mensajeDiv.innerHTML = '⚠️ No hay acciones en el script.';
                return;
            }

            ejecutando = true;
            habilitarBotones(false);
            renderizarScript(); // deshabilita controles de bloque
            mensajeDiv.innerHTML = '⚙️ Ejecutando script...';

            let indice = 0;

            function paso() {
                if (!ejecutando) return;

                if (indice >= acciones.length) {
                    mensajeDiv.innerHTML = '✅ Script finalizado.';
                    detenerEjecucion();
                    return;
                }

                const acc = acciones[indice];
                switch(acc) {
                    case 'up': moverJugador(0, -1); break;
                    case 'down': moverJugador(0, 1); break;
                    case 'left': moverJugador(-1, 0); break;
                    case 'right': moverJugador(1, 0); break;
                }

                if (checkVictoria()) {
                    detenerEjecucion();
                    return;
                }

                indice++;
                timeoutId = setTimeout(paso, 400); // velocidad retro
            }

            paso();
        }

        // ---------- EVENTOS ----------
        btnAddUp.addEventListener('click', () => agregarAccion('up'));
        btnAddDown.addEventListener('click', () => agregarAccion('down'));
        btnAddLeft.addEventListener('click', () => agregarAccion('left'));
        btnAddRight.addEventListener('click', () => agregarAccion('right'));
        btnRun.addEventListener('click', ejecutarScript);
        btnResetRoom.addEventListener('click', resetJugador);
        btnClearScript.addEventListener('click', limpiarScript);

        // Delegación para botones de los bloques
        scriptListDiv.addEventListener('click', (e) => {
            if (ejecutando) return;
            const target = e.target;
            if (target.classList.contains('btn-up')) {
                const idx = target.getAttribute('data-index');
                if (idx !== null) moverArriba(parseInt(idx));
            } else if (target.classList.contains('btn-down')) {
                const idx = target.getAttribute('data-index');
                if (idx !== null) moverAbajo(parseInt(idx));
            } else if (target.classList.contains('btn-delete')) {
                const idx = target.getAttribute('data-index');
                if (idx !== null) eliminarAccion(parseInt(idx));
            }
        });

        // Inicializar
        dibujarRoom();
        // precargar algunas acciones para que se vea con contenido
        acciones = ['up', 'right', 'down', 'right', 'up'];
        renderizarScript();
        mensajeDiv.innerHTML = '🎲 Script de demostración. ¡Ejecuta!';
    })();
</script>
</body>
</html>
