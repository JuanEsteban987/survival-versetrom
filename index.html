<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMod 2008 · P2P Sandbox (fijo)</title>
    <style>
        /* Estilo retro 2008 Windows XP / Web 2.0 */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #0a3f5e;
        }
        #panel-superior {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: linear-gradient(180deg, #e8f4ff 0%, #c0dcf0 100%);
            border: 3px solid #2a6f8f;
            border-radius: 15px;
            padding: 12px 20px;
            box-shadow: 0 0 0 2px #c0d4e6, inset 0 0 10px #7ab3c9;
            color: #003366;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            font-size: 14px;
            border-bottom: 4px solid #2f6f9f;
            text-shadow: 1px 1px 0 white;
        }
        .grupo {
            border: 2px solid #2a6f8f;
            border-radius: 8px;
            padding: 5px 12px;
            background: #d7e9ff;
            box-shadow: inset 1px 1px 3px #9bb7d4, 2px 2px 0 #1a4b6b;
        }
        .grupo legend {
            background: #f4c542;
            padding: 2px 12px;
            border-radius: 20px;
            border: 2px solid #b57c1a;
            font-weight: bold;
            color: #1e2f3f;
            box-shadow: 1px 1px 0 white;
        }
        button {
            background: linear-gradient(180deg, #f0f9ff, #b0d4f0);
            border: 3px solid #3a7ca5;
            border-radius: 30px;
            color: #002856;
            font-weight: bold;
            padding: 8px 20px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #1a4b6b, inset -1px -1px 0 #6b9ec0;
            font-size: 1rem;
            transition: 0.1s ease;
            margin: 2px;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #1a4b6b, inset -1px -1px 0 #6b9ec0;
        }
        input {
            background: #fcf9e8;
            border: 3px inset #9bb7d4;
            border-radius: 20px;
            padding: 6px 15px;
            font-weight: bold;
            color: #003366;
            box-shadow: 2px 2px 0 #1a4b6b;
        }
        #peer-id-label {
            background: #1e4f6e;
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #0a2a3a;
            border: 2px solid #ffcc66;
            box-shadow: inset 0 -2px 0 #0b3142;
            font-size: 1.2rem;
        }
        #estado-conexion {
            margin-left: auto;
            font-weight: bold;
            background: #ffffffaa;
            padding: 6px 15px;
            border-radius: 30px;
            border: 2px solid #3a7ca5;
        }
        #chat-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(220, 240, 255, 0.95);
            border: 4px solid #2a6f8f;
            border-radius: 20px;
            padding: 8px;
            box-shadow: 5px 5px 0 #0b3550, inset 0 0 20px #aad0ff;
            backdrop-filter: blur(4px);
            z-index: 200;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
        }
        #chat-header {
            background: linear-gradient(90deg, #f6b83e, #fada5e);
            padding: 5px 10px;
            border-radius: 15px 15px 5px 5px;
            border: 2px solid #b37b2e;
            font-weight: bold;
            color: #1e3400;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #chat-messages {
            height: 150px;
            overflow-y: auto;
            background: #f0f7ff;
            border: 3px inset #9bb7d4;
            border-radius: 12px;
            padding: 8px;
            font-size: 13px;
            color: #001c3d;
            margin-bottom: 8px;
        }
        .chat-msg {
            border-bottom: 1px solid #8fb0cf;
            padding: 4px;
        }
        .chat-user {
            color: #a63c06;
            font-weight: bold;
        }
        #chat-input-area {
            display: flex;
            gap: 5px;
        }
        #chat-input {
            flex: 1;
            border: 3px inset #9bb7d4;
            border-radius: 30px;
            padding: 8px;
            background: white;
        }
        #chat-send {
            background: #f4c542;
            border: 3px solid #b57c1a;
            border-radius: 30px;
            font-weight: bold;
            padding: 8px 15px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #7b4f0e;
        }
        #chat-send:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        #version-badge {
            position: absolute;
            top: 80px;
            left: 20px;
            background: gold;
            border: 3px solid darkgoldenrod;
            padding: 4px 15px;
            transform: rotate(-5deg);
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 4px 4px 0 #7f5f1f;
            z-index: 300;
        }
    </style>
</head>
<body>

    <div id="version-badge">⏥ GMod 2008 · SINGLE/MULTI ⏥</div>

    <div id="panel-superior">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="background: #003c5e; color: white; padding: 6px 18px; border-radius: 40px; border: 2px solid #fc6;">🆔 Tu ID:</span>
            <span id="peer-id-label">cargando...</span>
        </div>
        <fieldset class="grupo">
            <legend>🔌 Multiplayer P2P</legend>
            <input type="text" id="remote-peer-input" placeholder="ID del otro jugador" style="width: 180px;">
            <button id="connect-btn">Conectar</button>
            <button id="disconnect-btn">Desconectar</button>
        </fieldset>
        <fieldset class="grupo">
            <legend>📦 Objetos</legend>
            <button id="spawn-cube">➕ Cubo</button>
            <button id="spawn-sphere">➕ Esfera</button>
        </fieldset>
        <div id="estado-conexion">⚪ Solo (singleplayer)</div>
    </div>

    <div id="chat-panel">
        <div id="chat-header">💬 CHAT 2008</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Mensaje...">
            <button id="chat-send">Enviar</button>
        </div>
    </div>

    <!-- Canvas 3D -->
    <div id="canvas-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        (function() {
            // --- ESCENA VISIBLE GARANTIZADA ---
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Cielo azul claro

            // Cámara
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 8, 15);
            camera.lookAt(0, 2, 0);

            // Renderizador
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Sombras para sensación GMod
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // --- ILUMINACIÓN ROBUSTA ---
            // Luz ambiental suave
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);

            // Luz direccional principal (sol)
            const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
            sunLight.position.set(10, 20, 5);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 1024;
            sunLight.shadow.mapSize.height = 1024;
            const d = 15;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            sunLight.shadow.camera.near = 1;
            sunLight.shadow.camera.far = 30;
            scene.add(sunLight);

            // Luz de relleno desde atrás
            const backLight = new THREE.PointLight(0x4466aa, 0.6);
            backLight.position.set(-5, 10, -10);
            scene.add(backLight);

            // Luz desde abajo para que no queden caras oscuras
            const fillLight = new THREE.PointLight(0x99bbff, 0.4);
            fillLight.position.set(0, 5, 5);
            scene.add(fillLight);

            // --- SUELO Y DECORACIÓN ---
            // Suelo visual con textura de rejilla
            const gridHelper = new THREE.GridHelper(40, 20, 0xaaaaaa, 0x444444);
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            // Suelo sólido (para recibir sombras)
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x557788, roughness: 0.8, metalness: 0.1 });
            const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
            groundPlane.rotation.x = -Math.PI/2;
            groundPlane.position.y = -0.01;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);

            // Unos cubos decorativos para que no se vea vacío
            const decoMat = new THREE.MeshStandardMaterial({ color: 0xccaa88, emissive: 0x221100 });
            const decoCube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), decoMat);
            decoCube.position.set(2, 0.5, 2);
            decoCube.castShadow = true;
            decoCube.receiveShadow = true;
            scene.add(decoCube);

            const decoSphere = new THREE.Mesh(new THREE.SphereGeometry(0.6, 24, 16), decoMat);
            decoSphere.position.set(-2, 0.6, -2);
            decoSphere.castShadow = true;
            decoSphere.receiveShadow = true;
            scene.add(decoSphere);

            // --- MUNDO FÍSICO CANNON ---
            const world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.SAPBroadphase(world);

            // Materiales
            const physMat = new CANNON.Material('propMat');
            const groundPhysMat = new CANNON.Material('groundMat');
            const contactMat = new CANNON.ContactMaterial(physMat, groundPhysMat, { friction: 0.4, restitution: 0.3 });
            world.addContactMaterial(contactMat);
            world.defaultContactMaterial = contactMat;

            // Suelo físico
            const groundBody = new CANNON.Body({ mass: 0, material: groundPhysMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(groundBody);

            // --- ALMACÉN DE OBJETOS SINCRONIZADOS ---
            const objects = new Map(); // id -> { mesh, body, isOwner, shape, ownerPeer }

            // --- PEERJS Y CONEXIÓN ---
            let peer = null;
            let conn = null;
            let myPeerId = 'sin-conexión';

            // Elementos UI
            const peerDisplay = document.getElementById('peer-id-label');
            const estadoSpan = document.getElementById('estado-conexion');
            const remoteInput = document.getElementById('remote-peer-input');
            const connectBtn = document.getElementById('connect-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');
            const spawnCubeBtn = document.getElementById('spawn-cube');
            const spawnSphereBtn = document.getElementById('spawn-sphere');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const chatSend = document.getElementById('chat-send');

            // --- FUNCIONES DE CHAT ---
            function addChatMessage(sender, text, color = '#000') {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg';
                msgDiv.innerHTML = `<span class="chat-user" style="color:${color}">${sender}:</span> ${text}`;
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // --- CREACIÓN DE OBJETOS LOCALES (singleplayer o propietario) ---
            function createLocalObject(shape) {
                const id = (myPeerId !== 'sin-conexión' ? myPeerId : 'local') + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                // Posición aleatoria cerca del centro pero sobre el suelo
                const x = (Math.random() - 0.5) * 6;
                const z = (Math.random() - 0.5) * 6;
                const pos = new CANNON.Vec3(x, 3, z);
                const quat = new CANNON.Quaternion();

                // Visual
                let geometry, mesh;
                const colorLocal = 0x33aaff; // azul claro
                if (shape === 'cube') {
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                } else {
                    geometry = new THREE.SphereGeometry(0.6, 24, 16);
                }
                const material = new THREE.MeshStandardMaterial({ color: colorLocal, emissive: 0x113355 });
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.copy(pos);
                scene.add(mesh);

                // Cuerpo físico
                const body = new CANNON.Body({ mass: 1, material: physMat });
                if (shape === 'cube') {
                    body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
                } else {
                    body.addShape(new CANNON.Sphere(0.6));
                }
                body.position.copy(pos);
                body.quaternion.copy(quat);
                world.addBody(body);

                objects.set(id, { mesh, body, isOwner: true, shape, ownerPeer: myPeerId });

                // Notificar a los demás si estamos conectados
                if (conn && conn.open) {
                    conn.send({
                        type: 'spawn',
                        id: id,
                        shape: shape,
                        pos: [pos.x, pos.y, pos.z],
                        quat: [quat.x, quat.y, quat.z, quat.w],
                        owner: myPeerId
                    });
                }

                addChatMessage('Sistema', `Has creado un ${shape} (ID: ${id.slice(-4)})`, '#006400');
            }

            // --- CREACIÓN DE OBJETO REMOTO ---
            function createRemoteObject(id, shape, pos, quat, ownerPeer) {
                if (objects.has(id)) return;
                const colorRemoto = 0xffaa33; // naranja
                let geometry;
                if (shape === 'cube') {
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                } else {
                    geometry = new THREE.SphereGeometry(0.6, 24, 16);
                }
                const material = new THREE.MeshStandardMaterial({ color: colorRemoto, emissive: 0x221100 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.set(pos[0], pos[1], pos[2]);
                mesh.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                scene.add(mesh);

                // Cuerpo cinemático (no responde a fuerzas locales)
                const body = new CANNON.Body({ mass: 0, material: physMat, type: CANNON.Body.KINEMATIC });
                if (shape === 'cube') {
                    body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
                } else {
                    body.addShape(new CANNON.Sphere(0.6));
                }
                body.position.set(pos[0], pos[1], pos[2]);
                body.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                world.addBody(body);

                objects.set(id, { mesh, body, isOwner: false, shape, ownerPeer });
                addChatMessage('Sistema', `Jugador ${ownerPeer.substr(0,5)} creó ${shape}`, '#993300');
            }

            // --- ACTUALIZAR OBJETO REMOTO ---
            function updateRemoteObject(id, pos, quat) {
                const obj = objects.get(id);
                if (!obj || obj.isOwner) return; // solo actualizamos remotos
                obj.body.position.set(pos[0], pos[1], pos[2]);
                obj.body.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
            }

            // --- ELIMINAR OBJETO (no implementado en UI pero se puede ampliar) ---
            // (opcional)

            // --- MANEJO DE MENSAJES PEER ---
            function handleMessage(data) {
                if (!data || !data.type) return;
                switch (data.type) {
                    case 'spawn':
                        createRemoteObject(data.id, data.shape, data.pos, data.quat, data.owner);
                        break;
                    case 'update':
                        updateRemoteObject(data.id, data.pos, data.quat);
                        break;
                    case 'chat':
                        addChatMessage(data.sender || 'Desconocido', data.message, '#aa3300');
                        break;
                    case 'sync':
                        if (data.objects) {
                            data.objects.forEach(obj => {
                                if (!objects.has(obj.id)) {
                                    createRemoteObject(obj.id, obj.shape, obj.pos, obj.quat, obj.owner);
                                }
                            });
                        }
                        break;
                    default: break;
                }
            }

            // --- CONFIGURAR CONEXIÓN ---
            function setupConnection(connection) {
                conn = connection;
                estadoSpan.innerText = '🟢 Conectado a ' + conn.peer;
                estadoSpan.style.color = '#006600';

                conn.on('data', handleMessage);

                conn.on('close', () => {
                    estadoSpan.innerText = '⚪ Solo (singleplayer)';
                    estadoSpan.style.color = '#000';
                    conn = null;
                });

                // Al conectar, enviar lista de mis objetos
                const myObjs = [];
                objects.forEach((obj, id) => {
                    if (obj.isOwner) {
                        myObjs.push({
                            id, shape: obj.shape,
                            pos: [obj.body.position.x, obj.body.position.y, obj.body.position.z],
                            quat: [obj.body.quaternion.x, obj.body.quaternion.y, obj.body.quaternion.z, obj.body.quaternion.w],
                            owner: myPeerId
                        });
                    }
                });
                if (myObjs.length > 0) {
                    conn.send({ type: 'sync', objects: myObjs });
                }
            }

            // --- INICIALIZAR PEER ---
            function initPeer() {
                peer = new Peer();
                peer.on('open', (id) => {
                    myPeerId = id;
                    peerDisplay.innerText = id;
                    addChatMessage('Sistema', `Tu ID: ${id}`, '#0000aa');
                });

                peer.on('connection', (connection) => {
                    if (conn) {
                        connection.close(); // solo una conexión
                        return;
                    }
                    setupConnection(connection);
                });

                peer.on('error', (err) => {
                    console.error('Peer error', err);
                    addChatMessage('Sistema', 'Error PeerJS: ' + err.type, '#aa0000');
                });
            }

            // --- BUCLE DE ENVÍO DE ACTUALIZACIONES (solo si somos propietarios) ---
            setInterval(() => {
                if (conn && conn.open) {
                    objects.forEach((obj, id) => {
                        if (obj.isOwner) {
                            const p = obj.body.position;
                            const q = obj.body.quaternion;
                            conn.send({
                                type: 'update',
                                id: id,
                                pos: [p.x, p.y, p.z],
                                quat: [q.x, q.y, q.z, q.w]
                            });
                        }
                    });
                }
            }, 100);

            // --- EVENTOS UI ---
            connectBtn.addEventListener('click', () => {
                const remoteId = remoteInput.value.trim();
                if (!remoteId) return alert('Ingresa un ID');
                if (!peer) initPeer();
                // Esperar a que peer tenga ID
                if (myPeerId === 'sin-conexión') {
                    setTimeout(() => connectBtn.click(), 500);
                    return;
                }
                if (conn) {
                    alert('Ya estás conectado');
                    return;
                }
                const newConn = peer.connect(remoteId);
                setupConnection(newConn);
            });

            disconnectBtn.addEventListener('click', () => {
                if (conn) conn.close();
            });

            spawnCubeBtn.addEventListener('click', () => createLocalObject('cube'));
            spawnSphereBtn.addEventListener('click', () => createLocalObject('sphere'));

            chatSend.addEventListener('click', () => {
                const msg = chatInput.value.trim();
                if (!msg) return;
                if (conn && conn.open) {
                    conn.send({ type: 'chat', message: msg, sender: myPeerId.substr(0,6) });
                    addChatMessage('Tú', msg, '#0000aa');
                } else {
                    addChatMessage('Tú (local)', msg, '#555555');
                }
                chatInput.value = '';
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') chatSend.click();
            });

            // --- ANIMACIÓN Y FÍSICA ---
            function animate() {
                requestAnimationFrame(animate);

                // Avanzar física
                world.step(1 / 60);

                // Sincronizar mallas con cuerpos
                objects.forEach((obj) => {
                    obj.mesh.position.copy(obj.body.position);
                    obj.mesh.quaternion.copy(obj.body.quaternion);
                });

                // Pequeña rotación de cámara para dar vida (opcional)
                // camera.lookAt(0, 2, 0);

                renderer.render(scene, camera);
            }

            animate();

            // --- AJUSTE DE VENTANA ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // --- INICIALIZAR ---
            initPeer();
            addChatMessage('⏥ GMod 2008', 'Bienvenido al modo sandbox. Spawnea objetos y conecta con un amigo usando su ID.', '#990099');
            // Mensaje singleplayer
            setTimeout(() => {
                if (!conn) estadoSpan.innerText = '⚪ Solo (singleplayer)';
            }, 1000);
        })();
    </script>
</body>
</html>
