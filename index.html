<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Creador de juegos simple · Exportar/Importar</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #1a1f2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .game-lab {
            background: #252b3d;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #3e4559;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            background: #1e2333;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #3f485e;
        }
        .palette {
            display: flex;
            gap: 6px;
            background: #0f121c;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #414b63;
        }
        .tile-option {
            width: 42px;
            height: 42px;
            border-radius: 20px;
            background: #2a3147;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.1s ease;
            box-shadow: 0 2px 0 #0b0e14;
        }
        .tile-option.selected {
            border-color: #ffcc66;
            transform: scale(1.05);
            background: #3d4660;
            box-shadow: 0 0 0 2px #ffb347;
        }
        .tile-option[data-type="0"] { background: #3f4a63; color: #9aa9c7; }  /* vacío */
        .tile-option[data-type="1"] { background: #5a4c3c; color: #b9a68c; }  /* muro */
        .tile-option[data-type="2"] { background: #3c5a4b; color: #ffd966; }  /* moneda */
        .tile-option[data-type="3"] { background: #4a3f5e; color: #a5d8ff; }  /* jugador */
        button {
            background: #323b52;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #57627e;
            box-shadow: 0 4px 0 #171c29;
            transition: 0.08s linear;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .mode-indicator {
            background: #0b0f18;
            color: #b7c7e9;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            border: 1px solid #49536d;
        }
        .mode-indicator span {
            color: #ffdb8e;
            font-weight: 700;
            margin-left: 6px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            background: #1d2332;
            box-shadow: inset 0 0 0 2px #3c435b, 0 16px 30px black;
            cursor: crosshair;
            width: 100%;
            max-width: 640px;
            height: auto;
            image-rendering: pixelated;
        }
        .status-bar {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #a6b9dc;
            background: #1b202f;
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid #404a61;
            font-weight: 500;
        }
        .file-zone {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .file-zone label {
            background: #323b52;
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid #5c6a89;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        #importFile {
            display: none;
        }
        .coin-counter {
            background: #2a324a;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #f5c542;
            color: #ffe19c;
        }
    </style>
</head>
<body>
<div class="game-lab">
    <div class="toolbar">
        <div class="palette">
            <div class="tile-option selected" data-type="0" title="Vacío (borrar)">⬜</div>
            <div class="tile-option" data-type="1" title="Muro">🧱</div>
            <div class="tile-option" data-type="2" title="Moneda">🪙</div>
            <div class="tile-option" data-type="3" title="Inicio jugador">👤</div>
        </div>
        <button id="modeToggle">🎮 Modo: <span id="modeText">EDICIÓN</span></button>
        <button id="clearBtn">🗑️ Limpiar todo</button>
        <div class="mode-indicator">⚡ Instrucciones <span style="color:#a5d8ff;">click · arrastrar · clic derecho borra</span></div>
    </div>

    <canvas id="gameCanvas" width="640" height="480"></canvas>

    <div class="status-bar">
        <div class="coin-counter">🪙 <span id="coinCount">0</span></div>
        <div class="file-zone">
            <button id="exportBtn">📤 Exportar (.json)</button>
            <label for="importFile">📂 Importar</label>
            <input type="file" id="importFile" accept=".json,application/json">
        </div>
    </div>
</div>

<script>
(function(){
    // ---------- configuración ----------
    const COLS = 20;
    const ROWS = 15;
    const TILE_SIZE = 32; // 20*32=640, 15*32=480

    const TILE_EMPTY = 0;
    const TILE_WALL = 1;
    const TILE_COIN = 2;
    const TILE_PLAYER_START = 3; // solo en editor

    // grid: 2D array (ROWS x COLS)
    let grid = Array(ROWS).fill().map(() => Array(COLS).fill(TILE_EMPTY));

    // estado del editor/juego
    let mode = 'edit'; // 'edit' o 'play'
    let selectedTile = TILE_EMPTY; // por defecto borrar

    // datos del juego en modo play
    let playerPos = { x: 1, y: 1 }; // temporal (se asigna al iniciar play)
    let coinsRemaining = 0;
    let winFlag = false;

    // referencia canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // elementos UI
    const modeText = document.getElementById('modeText');
    const modeToggle = document.getElementById('modeToggle');
    const coinSpan = document.getElementById('coinCount');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importFile = document.getElementById('importFile');
    const tileOptions = document.querySelectorAll('.tile-option');

    // ---------- dibujado común ----------
    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // dibujar celdas
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                let x = col * TILE_SIZE;
                let y = row * TILE_SIZE;
                let tile = grid[row][col];

                // fondo según tile (en modo play, el tile PLAYER_START no se muestra porque se reemplaza por jugador)
                if (mode === 'play' && tile === TILE_PLAYER_START) {
                    tile = TILE_EMPTY; // no dibujar marca de inicio
                }

                // color de fondo base
                if (tile === TILE_WALL) {
                    ctx.fillStyle = '#6f5e4f';
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    ctx.fillStyle = '#8f7a66';
                    ctx.fillRect(x+2, y+2, TILE_SIZE-5, TILE_SIZE-5);
                } else if (tile === TILE_COIN) {
                    ctx.fillStyle = '#4c6b5f';
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    ctx.fillStyle = '#f5e56b';
                    ctx.beginPath();
                    ctx.arc(x+16, y+16, 10, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = '#c9a03d';
                    ctx.beginPath();
                    ctx.arc(x+16, y+16, 4, 0, 2*Math.PI);
                    ctx.fill();
                } else if (tile === TILE_PLAYER_START && mode === 'edit') {
                    ctx.fillStyle = '#4a3f70';
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    ctx.font = 'bold 22px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#b4d0ff';
                    ctx.fillText('👤', x+6, y+26);
                } else if (tile === TILE_EMPTY) {
                    ctx.fillStyle = '#2c3349';
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    // cuadrícula tenue
                    ctx.strokeStyle = '#404a62';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                } else {
                    // fallback (vacío)
                    ctx.fillStyle = '#2c3349';
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                }

                // borde de cuadrícula (siempre)
                ctx.strokeStyle = '#5f6b89';
                ctx.lineWidth = 0.8;
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            }
        }

        // dibujar jugador si estamos en modo play
        if (mode === 'play' && !winFlag) {
            const { x, y } = playerPos;
            ctx.fillStyle = '#7aa5ff';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + 16, y * TILE_SIZE + 16, 14, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText('😊', x * TILE_SIZE + 8, y * TILE_SIZE + 24);
        } else if (mode === 'play' && winFlag) {
            // mensaje victoria
            ctx.font = 'bold 28px "Segoe UI"';
            ctx.fillStyle = '#ffeaa0';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 10;
            ctx.fillText('✨ VICTORIA ✨', 140, 240);
            ctx.shadowBlur = 0;
        }
    }

    // ---------- lógica editor ----------
    function handleCanvasClick(e) {
        if (mode !== 'edit') return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const col = Math.floor(mouseX / TILE_SIZE);
        const row = Math.floor(mouseY / TILE_SIZE);
        if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;

        e.preventDefault(); // evitar menú contextual en clic derecho

        if (e.button === 2) { // clic derecho = borrar (poner vacío)
            grid[row][col] = TILE_EMPTY;
        } else { // izquierdo
            if (selectedTile === TILE_PLAYER_START) {
                // solo puede haber un inicio de jugador: buscar y eliminar otro
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c] === TILE_PLAYER_START) {
                            grid[r][c] = TILE_EMPTY;
                        }
                    }
                }
            }
            grid[row][col] = selectedTile;
        }
        drawGrid();
    }

    // arrastrar para pintar rápido
    function handleDrag(e) {
        if (mode !== 'edit') return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const col = Math.floor(mouseX / TILE_SIZE);
        const row = Math.floor(mouseY / TILE_SIZE);
        if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;

        // Si se arrastra con botón izquierdo (botón principal), pintamos tile seleccionado
        // Nota: e.buttons === 1 significa botón izquierdo presionado
        if (e.buttons === 1) {
            if (selectedTile === TILE_PLAYER_START) {
                // al arrastrar con player start, queremos moverlo de lugar?
                // mejor: arrastrar solo pinta si es tile normal, pero si es player start también pintamos (pero antes borramos el anterior)
                // para simplicidad: en arrastre con player start, eliminamos el anterior y ponemos el nuevo
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c] === TILE_PLAYER_START) {
                            grid[r][c] = TILE_EMPTY;
                        }
                    }
                }
                grid[row][col] = TILE_PLAYER_START;
            } else {
                grid[row][col] = selectedTile;
            }
            drawGrid();
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        handleCanvasClick(e);
    });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    canvas.addEventListener('mousemove', handleDrag);
    canvas.addEventListener('mouseenter', () => {}); // evitar errores

    // ----- cambiar tile seleccionado -----
    tileOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            tileOptions.forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            selectedTile = parseInt(opt.dataset.type, 10);
        });
    });

    // ----- cambiar modo edicion / play -----
    function switchMode() {
        if (mode === 'edit') {
            // entrar a play: buscar inicio jugador, si no hay, usar default (0,0) o avisar
            let startFound = false;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === TILE_PLAYER_START) {
                        playerPos = { x: c, y: r };
                        startFound = true;
                        break;
                    }
                }
            }
            if (!startFound) {
                alert("Coloca un punto de inicio 👤 antes de jugar.");
                return; // no cambia modo
            }

            // contar monedas y guardarlas
            coinsRemaining = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === TILE_COIN) coinsRemaining++;
                }
            }
            coinSpan.innerText = coinsRemaining;
            winFlag = false;
            mode = 'play';
            modeText.innerText = 'JUEGO';
        } else {
            // volver a edición (conservando el grid tal cual, pero las monedas reaparecen porque no se modificó el grid)
            // restauramos todas las celdas que pudieron haber sido cambiadas (monedas) ya que grid no se alteró en play.
            // El único cambio durante play es que las monedas se "eliminan" del grid? en nuestro juego, al recoger moneda se pone TILE_EMPTY, así que sí modificamos grid.
            // por lo tanto al volver a edición, las monedas recogidas se quedan como vacío. Eso es correcto si queremos reflejar el estado actual.
            // pero también podemos decidir si queremos resetear al estado guardado antes del play, pero lo dejamos así.
            mode = 'edit';
            modeText.innerText = 'EDICIÓN';
            winFlag = false;
            // actualizar contador de monedas (solo para edición no se usa)
        }
        drawGrid();
    }

    modeToggle.addEventListener('click', switchMode);

    // ----- teclado para mover jugador (modo play) -----
    window.addEventListener('keydown', (e) => {
        if (mode !== 'play' || winFlag) return;

        const key = e.key;
        let dx = 0, dy = 0;
        if (key === 'ArrowUp') dy = -1;
        else if (key === 'ArrowDown') dy = 1;
        else if (key === 'ArrowLeft') dx = -1;
        else if (key === 'ArrowRight') dx = 1;
        else return;

        e.preventDefault();

        const newX = playerPos.x + dx;
        const newY = playerPos.y + dy;

        if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS) return; // límites

        const targetTile = grid[newY][newX];

        // colisión con muros
        if (targetTile === TILE_WALL) return;

        // mover jugador
        playerPos.x = newX;
        playerPos.y = newY;

        // recoger moneda
        if (targetTile === TILE_COIN) {
            grid[newY][newX] = TILE_EMPTY;
            coinsRemaining--;
            coinSpan.innerText = coinsRemaining;
        }

        // comprobar victoria
        if (coinsRemaining === 0) {
            winFlag = true;
        }

        drawGrid();
    });

    // ----- limpiar todo -----
    clearBtn.addEventListener('click', () => {
        if (mode === 'play') {
            // si estamos en play, volver a edit automáticamente?
            mode = 'edit';
            modeText.innerText = 'EDICIÓN';
        }
        grid = Array(ROWS).fill().map(() => Array(COLS).fill(TILE_EMPTY));
        playerPos = { x: 0, y: 0 };
        coinsRemaining = 0;
        winFlag = false;
        coinSpan.innerText = '0';
        drawGrid();
    });

    // ----- exportar a JSON -----
    function exportLevel() {
        const levelData = {
            grid: grid,
            // también podemos guardar versión, etc.
        };
        const jsonStr = JSON.stringify(levelData, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nivel_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    exportBtn.addEventListener('click', exportLevel);

    // ----- importar desde JSON -----
    importFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const parsed = JSON.parse(ev.target.result);
                if (parsed.grid && Array.isArray(parsed.grid) && parsed.grid.length === ROWS) {
                    // validación simple
                    grid = parsed.grid;
                    // asegurar que todas las filas tengan COLS
                    for (let r = 0; r < ROWS; r++) {
                        if (!grid[r] || grid[r].length !== COLS) {
                            throw new Error('Dimensiones incorrectas');
                        }
                    }
                } else {
                    throw new Error('Formato inválido');
                }

                // si estábamos en modo play, volver a edición
                if (mode === 'play') {
                    mode = 'edit';
                    modeText.innerText = 'EDICIÓN';
                }
                winFlag = false;
                // recalcular monedas (solo para UI)
                coinsRemaining = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c] === TILE_COIN) coinsRemaining++;
                    }
                }
                coinSpan.innerText = coinsRemaining;
                drawGrid();
            } catch (err) {
                alert('Error al importar: ' + err.message);
            }
            importFile.value = ''; // reset
        };
        reader.readAsText(file);
    });

    // ----- inicializar nivel por defecto (algo bonito) -----
    function createDemoLevel() {
        // paredes alrededor
        for (let c = 0; c < COLS; c++) {
            grid[0][c] = TILE_WALL;
            grid[ROWS-1][c] = TILE_WALL;
        }
        for (let r = 0; r < ROWS; r++) {
            grid[r][0] = TILE_WALL;
            grid[r][COLS-1] = TILE_WALL;
        }
        // interior
        for (let r = 2; r < ROWS-2; r+=2) {
            for (let c = 2; c < COLS-2; c+=3) {
                grid[r][c] = TILE_WALL;
            }
        }
        // monedas
        grid[3][5] = TILE_COIN;
        grid[4][10] = TILE_COIN;
        grid[7][15] = TILE_COIN;
        grid[9][7] = TILE_COIN;
        grid[11][12] = TILE_COIN;
        grid[12][5] = TILE_COIN;
        // inicio jugador
        grid[1][1] = TILE_PLAYER_START;
        coinsRemaining = 6;
        coinSpan.innerText = '6';
    }

    createDemoLevel();
    drawGrid();
})();
</script>
</body>
</html>
