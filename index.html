<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Easy Pro 2008 · con input por bloques y touching</title>
    <style>
        /* ===== ESTÉTICA 2008 (sin cambios) ===== */
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: #1f3a5f;
            font-family: 'Tahoma', 'Verdana', 'Arial', sans-serif;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .computer {
            width: 1100px;
            background: #d0d0d0;
            border: 5px ridge #e0e0e0;
            border-radius: 12px 12px 8px 8px;
            padding: 20px 20px 15px 20px;
            box-shadow: 8px 8px 0px #0a1e30, inset 2px 2px 5px #f0f0f0;
        }

        .top-bar {
            background: linear-gradient(180deg, #1040a0, #002070);
            border: 3px ridge #3070d0;
            padding: 8px 20px;
            margin-bottom: 20px;
            box-shadow: inset 2px 2px 8px #80a0ff, inset -2px -2px 5px #001030;
            color: white;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }
        .title {
            font-size: 58px;
            font-weight: bold;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0px #0f0f0f, 6px 6px 0px #303030;
            color: #ffffb0;
            line-height: 1;
        }
        .year {
            font-size: 28px;
            background: #c0c000;
            color: #202020;
            border: 3px inset #f0f000;
            padding: 5px 15px;
            font-weight: bold;
            font-style: italic;
            box-shadow: 0 0 0 2px #808080;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
        }

        .workspace {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .code-panel {
            flex: 1.2;
            background: #bebebe;
            border: 4px inset #fcfcfc;
            padding: 15px;
            box-shadow: inset 3px 3px 8px #707070, inset -3px -3px 8px #e0e0e0;
            position: relative;
        }

        .panel-label {
            font-weight: bold;
            font-size: 20px;
            color: #202020;
            background: linear-gradient(90deg, #c0c0c0, #a0a0a0);
            padding: 5px 15px;
            border: 3px outset #e0e0e0;
            margin-bottom: 15px;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .editor-container {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 260px;
            background: #ffffcc;
            border: 4px inset #8a8a8a;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            color: #001080;
            padding: 12px;
            line-height: 1.4;
            resize: vertical;
            box-shadow: inset 2px 2px 10px #404040;
        }

        .autocomplete-box {
            position: absolute;
            background: #e0e0e0;
            border: 3px outset #ffffff;
            max-height: 150px;
            overflow-y: auto;
            width: 200px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            box-shadow: 4px 4px 0px #404040;
            z-index: 100;
            display: none;
        }
        .autocomplete-item {
            padding: 5px 10px;
            cursor: pointer;
            border-bottom: 1px solid #a0a0a0;
        }
        .autocomplete-item:hover {
            background: #b0b0ff;
        }
        .autocomplete-item.selected {
            background: #8080ff;
            color: white;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(180deg, #f0f0f0, #b0b0b0);
            border: 4px outset #ffffff;
            color: #101010;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 24px;
            cursor: pointer;
            font-family: 'Tahoma', sans-serif;
            box-shadow: 3px 3px 0px #404040;
            transition: 0.05s linear;
        }
        .btn:hover {
            background: linear-gradient(180deg, #ffffe0, #c0c0c0);
            border-color: #fffff0;
        }
        .btn:active {
            border: 4px inset #808080;
            box-shadow: 1px 1px 0px #202020;
            transform: translate(2px, 2px);
        }

        .stage-panel {
            flex: 1;
            background: #bebebe;
            border: 4px inset #fcfcfc;
            padding: 15px;
            box-shadow: inset 3px 3px 8px #707070, inset -3px -3px 8px #e0e0e0;
        }

        .canvas-wrapper {
            background: #8f8f8f;
            border: 6px inset #5a5a5a;
            padding: 8px;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 400px;
            height: 400px;
            background: #ffffff;
            border: 2px solid #303030;
            display: block;
            image-rendering: crisp-edges;
        }

        .object-panel {
            margin-top: 20px;
            background: #c8c8c8;
            border: 4px inset #ececec;
            padding: 10px;
            max-height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #000000;
        }

        .object-title {
            background: #a0a0a0;
            border: 2px outset #d0d0d0;
            padding: 4px 10px;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: center;
            color: #202020;
        }

        .object-list {
            list-style: none;
            padding: 2px;
        }
        .object-list li {
            border-bottom: 1px dashed #404040;
            padding: 5px 0px 5px 10px;
            background: #e0e0e0;
            margin-bottom: 3px;
            border-left: 6px solid #202020;
        }

        .error-panel {
            margin-top: 20px;
            background: #4a1a1a;
            border: 5px inset #a04040;
            padding: 10px;
            max-height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ffb0b0;
        }
        .error-title {
            font-weight: bold;
            color: #ff8080;
            margin-bottom: 5px;
        }
        .error-line {
            border-bottom: 1px solid #802020;
            padding: 3px;
        }

        .log-console {
            background: #1a1a1a;
            color: #3aff99;
            font-family: 'Courier New', monospace;
            border: 5px inset #707070;
            padding: 10px;
            margin-top: 25px;
            height: 100px;
            overflow-y: auto;
            font-size: 15px;
            font-weight: bold;
            box-shadow: inset 0 0 15px #00cc66;
            border-radius: 0px;
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            color: #dfdfdf;
            text-shadow: 2px 2px 0 #0a1e30;
            font-size: 16px;
            font-weight: bold;
            border-top: 2px groove #a0a0a0;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="computer">
    <div class="top-bar">
        <span class="title">EASY PRO</span>
        <span class="year">est. 2008</span>
    </div>

    <div class="workspace">
        <div class="code-panel">
            <div class="panel-label">✎ editar código</div>
            <div class="editor-container">
                <textarea id="codeArea" spellcheck="false"></textarea>
                <div id="autocompleteBox" class="autocomplete-box"></div>
            </div>

            <div class="button-group">
                <button class="btn" id="runBtn">▶ ejecutar</button>
                <button class="btn" id="resetBtn">⟲ reiniciar manual</button>
                <button class="btn" id="exampleBtn">📁 ejemplos</button>
            </div>

            <div class="error-panel" id="errorPanel">
                <div class="error-title">⚠️ errores de la última ejecución:</div>
                <div id="errorList">(ninguno)</div>
            </div>

            <div class="log-console" id="logConsole">
                > Easy Pro 2008 listo.
            </div>
        </div>

        <div class="stage-panel">
            <div class="panel-label">🎬 escenario</div>
            <div class="canvas-wrapper">
                <canvas id="stageCanvas" width="400" height="400"></canvas>
            </div>

            <div class="object-panel">
                <div class="object-title">📦 objetos activos</div>
                <ul class="object-list" id="objectList">
                    <li style="color:#404040;">(ningún objeto)</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="footer-note">
        ⚡ input "tecla" ... finish | if touching obj1 obj2 | createtext "texto" x y | formas: cubo circulo
    </div>
</div>

<script>
    (function() {
        // ========== CONFIGURACIÓN ==========
        const COMMANDS = [
            'varcreate', 'varset', 'if', 'else', 'createobj', 
            'mov', 'tp', 'rotate', 'input', 'finish', 'createtext'
        ];

        // ========== ESTADO GLOBAL ==========
        let objetos = [];
        let variables = {};
        let keyActions = {};  // tecla -> función que ejecuta bloque

        // Flags para if/else (usados tanto en programa principal como en eventos)
        let ifActive = false;
        let ifResult = false;
        let elsePending = false;
        let elseActive = false;
        let elseResult = false;

        // Almacén de errores
        let errors = [];

        // ========== DOM ==========
        const canvas = document.getElementById('stageCanvas');
        const ctx = canvas.getContext('2d');
        const codeArea = document.getElementById('codeArea');
        const logDiv = document.getElementById('logConsole');
        const objectList = document.getElementById('objectList');
        const errorListDiv = document.getElementById('errorList');

        // ========== FUNCIONES DE LOG Y ERRORES ==========
        function logMessage(msg) {
            const p = document.createElement('div');
            p.textContent = '> ' + msg;
            logDiv.appendChild(p);
            if (logDiv.children.length > 9) {
                logDiv.removeChild(logDiv.children[0]);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function addError(lineNumber, message) {
            errors.push({ line: lineNumber, msg: message });
        }

        function displayErrors() {
            if (errors.length === 0) {
                errorListDiv.innerHTML = '(ninguno)';
                return;
            }
            let html = '';
            errors.forEach(err => {
                html += `<div class="error-line">Línea ${err.line}: ${err.msg}</div>`;
            });
            errorListDiv.innerHTML = html;
        }

        function clearErrors() {
            errors = [];
            displayErrors();
        }

        // ========== RENDERIZADO ==========
        function actualizarListaObjetos() {
            if (objetos.length === 0) {
                objectList.innerHTML = '<li style="color:#404040;">(ningún objeto)</li>';
                return;
            }
            let html = '';
            objetos.forEach(obj => {
                if (obj.shape === 'Texto') {
                    html += `<li style="border-left-color: #000;">${obj.name} · Texto: "${obj.text}" · (${obj.x},${obj.y})</li>`;
                } else {
                    html += `<li style="border-left-color: ${obj.color};">${obj.name} · ${obj.shape} · rot:${obj.rotation || 0}° · (${obj.x},${obj.y})</li>`;
                }
            });
            objectList.innerHTML = html;
        }

        function renderizar() {
            ctx.clearRect(0, 0, 400, 400);
            objetos.forEach(obj => {
                if (obj.shape === 'Texto') {
                    // Dibujar texto
                    ctx.font = 'bold 16px "Courier New", monospace';
                    ctx.fillStyle = '#000000';
                    ctx.fillText(obj.text, obj.x, obj.y);
                } else {
                    // Dibujar cubo o círculo
                    ctx.save();
                    ctx.translate(obj.x, obj.y);
                    if (obj.rotation) {
                        ctx.rotate(obj.rotation * Math.PI / 180);
                    }
                    ctx.fillStyle = obj.color;
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2.5;

                    if (obj.shape === 'cubo') {
                        ctx.fillRect(-20, -20, 40, 40);
                        ctx.strokeRect(-20, -20, 40, 40);
                    } else if (obj.shape === 'circulo') {
                        ctx.beginPath();
                        ctx.arc(0, 0, 20, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                    ctx.restore();

                    // Nombre
                    ctx.font = 'bold 11px "Courier New", monospace';
                    ctx.fillStyle = '#111111';
                    ctx.fillText(obj.name, obj.x - 15, obj.y - 25);
                    ctx.fillStyle = '#FFFFF0';
                    ctx.fillText(obj.name, obj.x - 16, obj.y - 26);
                }
            });
            actualizarListaObjetos();
        }

        // ========== FUNCIONES AUXILIARES ==========
        function encontrarObj(nombre) {
            return objetos.find(obj => obj.name === nombre);
        }

        function resetTotal() {
            objetos = [];
            variables = {};
            keyActions = {};
            ifActive = false;
            ifResult = false;
            elsePending = false;
            elseActive = false;
            elseResult = false;
            renderizar();
            logMessage('🔄 Escenario reiniciado (vacío).');
        }

        function cargarDemo() {
            objetos = [
                { name: 'demoCuad', shape: 'cubo', color: '#1070c0', x: 150, y: 150, rotation: 15 },
                { name: 'demoCirc', shape: 'circulo', color: '#c05030', x: 260, y: 280, rotation: 0 }
            ];
            variables = { puntuacion: 5 };
            keyActions = {};
            renderizar();
            logMessage('🎮 Modo demo activado.');
        }

        // ========== PARSER (con eliminación de comillas) ==========
        function parsearComando(linea) {
            linea = linea.trim();
            if (linea === '' || linea.startsWith('//')) return null;
            let partes = linea.split(/\s+/);
            if (partes.length === 0) return null;
            let comando = partes[0].toLowerCase();
            let argumentos = partes.slice(1).map(arg => {
                // Quitar comillas dobles si existen al inicio y final
                if (arg.startsWith('"') && arg.endsWith('"')) {
                    return arg.slice(1, -1);
                }
                return arg;
            });
            return { comando, argumentos };
        }

        // ========== EVALUACIÓN DE CONDICIONES ==========
        function evaluarCondicion(argumentos, lineNumber) {
            if (argumentos.length < 3) {
                addError(lineNumber, 'if: necesita variable operador valor');
                return null;
            }
            let varName = argumentos[0];
            let operador = argumentos[1];
            let valorStr = argumentos[2];

            if (!(varName in variables)) {
                addError(lineNumber, `if: variable "${varName}" no existe`);
                return null;
            }
            let varVal = variables[varName];
            let valorNum = parseFloat(valorStr);
            if (isNaN(valorNum)) {
                if (valorStr in variables) {
                    valorNum = variables[valorStr];
                } else {
                    addError(lineNumber, `if: valor no numérico ni variable: ${valorStr}`);
                    return null;
                }
            }

            switch (operador) {
                case '=': return varVal === valorNum;
                case '<': return varVal < valorNum;
                case '>': return varVal > valorNum;
                case '<=': return varVal <= valorNum;
                case '>=': return varVal >= valorNum;
                case '<>': return varVal !== valorNum;
                default:
                    addError(lineNumber, `if: operador desconocido "${operador}"`);
                    return null;
            }
        }

        function evaluarTouching(argumentos, lineNumber) {
            if (argumentos.length < 2) {
                addError(lineNumber, 'if touching: necesita dos objetos');
                return null;
            }
            let obj1 = encontrarObj(argumentos[0]);
            let obj2 = encontrarObj(argumentos[1]);
            if (!obj1) {
                addError(lineNumber, `if touching: objeto "${argumentos[0]}" no existe`);
                return null;
            }
            if (!obj2) {
                addError(lineNumber, `if touching: objeto "${argumentos[1]}" no existe`);
                return null;
            }
            // Distancia entre centros
            let dx = obj1.x - obj2.x;
            let dy = obj1.y - obj2.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            // Umbral: 40 (porque ambos tienen tamaño 40)
            return dist < 40;
        }

        // ========== EJECUCIÓN DE COMANDOS (con manejo de flujo) ==========
        function ejecutarComando(parsed, lineNumber) {
            if (!parsed) return false;
            const { comando, argumentos } = parsed;

            // Lógica de flujo if/else (incluyendo if touching)
            if (comando === 'if') {
                let cond = null;
                if (argumentos[0] === 'touching') {
                    cond = evaluarTouching(argumentos.slice(1), lineNumber);
                } else {
                    cond = evaluarCondicion(argumentos, lineNumber);
                }
                if (cond === null) return false;
                ifActive = true;
                ifResult = cond;
                elsePending = false;
                elseActive = false;
                logMessage(`🔍 if: ${cond ? 'verdadero' : 'falso'}`);
                return true;
            }

            if (ifActive) {
                ifActive = false;
                if (ifResult) {
                    logMessage('  → then ejecutado');
                    ejecutarComandoNormal(parsed, lineNumber);
                } else {
                    logMessage('  → then omitido');
                }
                elsePending = true;
                return true;
            }

            if (elsePending) {
                elsePending = false;
                if (comando === 'else') {
                    elseActive = true;
                    elseResult = !ifResult;
                    logMessage('  → else detectado');
                    return true;
                } else {
                    logMessage('  → (sin else)');
                    ejecutarComandoNormal(parsed, lineNumber);
                    return true;
                }
            }

            if (elseActive) {
                elseActive = false;
                if (elseResult) {
                    logMessage('  → else ejecutado');
                    ejecutarComandoNormal(parsed, lineNumber);
                } else {
                    logMessage('  → else omitido');
                }
                return true;
            }

            ejecutarComandoNormal(parsed, lineNumber);
            return true;
        }

        function ejecutarComandoNormal(parsed, lineNumber) {
            const { comando, argumentos } = parsed;

            if (comando === 'varcreate') {
                if (argumentos.length < 1) {
                    addError(lineNumber, 'varcreate: necesita nombre');
                    return;
                }
                let nombre = argumentos[0];
                if (nombre in variables) {
                    addError(lineNumber, `varcreate: variable "${nombre}" ya existe`);
                    return;
                }
                variables[nombre] = 0;
                logMessage(`📊 variable "${nombre}" creada = 0`);
            }
            else if (comando === 'varset') {
                if (argumentos.length < 2) {
                    addError(lineNumber, 'varset: necesita nombre y valor');
                    return;
                }
                let nombre = argumentos[0];
                let valor = parseFloat(argumentos[1]);
                if (isNaN(valor)) {
                    if (argumentos[1] in variables) {
                        valor = variables[argumentos[1]];
                    } else {
                        addError(lineNumber, `varset: valor no numérico ni variable: ${argumentos[1]}`);
                        return;
                    }
                }
                if (!(nombre in variables)) {
                    addError(lineNumber, `varset: variable "${nombre}" no existe`);
                    return;
                }
                variables[nombre] = valor;
                logMessage(`📊 variable "${nombre}" = ${valor}`);
            }
            else if (comando === 'createobj') {
                if (argumentos.length < 3) {
                    addError(lineNumber, 'createobj: necesita: nombre forma color');
                    return;
                }
                const [nombre, forma, color] = argumentos;
                if (forma !== 'cubo' && forma !== 'circulo') {
                    addError(lineNumber, `createobj: forma debe ser cubo o circulo (recibió: ${forma})`);
                    return;
                }
                if (encontrarObj(nombre)) {
                    addError(lineNumber, `createobj: ya existe un objeto "${nombre}"`);
                    return;
                }
                objetos.push({
                    name: nombre,
                    shape: forma,
                    color: color,
                    x: 200,
                    y: 200,
                    rotation: 0
                });
                logMessage(`✅ objeto "${nombre}" creado (${forma}, ${color}) en (200,200)`);
                renderizar();
            }
            else if (comando === 'createtext') {
                if (argumentos.length < 3) {
                    addError(lineNumber, 'createtext: necesita: "texto" x y');
                    return;
                }
                const [texto, xStr, yStr] = argumentos;
                const x = parseFloat(xStr);
                const y = parseFloat(yStr);
                if (isNaN(x) || isNaN(y)) {
                    addError(lineNumber, 'createtext: x e y deben ser números');
                    return;
                }
                // Crear un nombre único para el texto (podría ser el texto mismo, pero permitir duplicados)
                let nombre = 'text_' + Date.now() + Math.random();
                objetos.push({
                    name: nombre,
                    shape: 'Texto',
                    text: texto,
                    x: x,
                    y: y
                });
                logMessage(`📝 Texto "${texto}" creado en (${x},${y})`);
                renderizar();
            }
            else if (comando === 'mov') {
                if (argumentos.length < 3) {
                    addError(lineNumber, 'mov: necesita: nombre dx dy');
                    return;
                }
                const [nombre, dxStr, dyStr] = argumentos;
                const obj = encontrarObj(nombre);
                if (!obj) {
                    addError(lineNumber, `mov: objeto "${nombre}" no existe`);
                    return;
                }
                const dx = parseFloat(dxStr);
                const dy = parseFloat(dyStr);
                if (isNaN(dx) || isNaN(dy)) {
                    addError(lineNumber, 'mov: dx y dy deben ser números');
                    return;
                }
                obj.x += dx;
                obj.y += dy;
                logMessage(`🚚 "${nombre}" movido a (${obj.x},${obj.y})`);
                renderizar();
            }
            else if (comando === 'tp') {
                if (argumentos.length < 3) {
                    addError(lineNumber, 'tp: necesita: nombre x y');
                    return;
                }
                const [nombre, xStr, yStr] = argumentos;
                const obj = encontrarObj(nombre);
                if (!obj) {
                    addError(lineNumber, `tp: objeto "${nombre}" no existe`);
                    return;
                }
                const x = parseFloat(xStr);
                const y = parseFloat(yStr);
                if (isNaN(x) || isNaN(y)) {
                    addError(lineNumber, 'tp: x e y deben ser números');
                    return;
                }
                obj.x = x;
                obj.y = y;
                logMessage(`📞 "${nombre}" teleportado a (${obj.x},${obj.y})`);
                renderizar();
            }
            else if (comando === 'rotate') {
                if (argumentos.length < 2) {
                    addError(lineNumber, 'rotate: necesita objeto y grados');
                    return;
                }
                let nombre = argumentos[0];
                let grados = parseFloat(argumentos[1]);
                if (isNaN(grados)) {
                    addError(lineNumber, 'rotate: grados debe ser número');
                    return;
                }
                let obj = encontrarObj(nombre);
                if (!obj) {
                    addError(lineNumber, `rotate: objeto "${nombre}" no existe`);
                    return;
                }
                obj.rotation = grados;
                logMessage(`🔄 "${nombre}" rotado a ${grados}°`);
                renderizar();
            }
            else if (comando === 'input') {
                // Este comando ahora se maneja en el bucle principal (bloques)
                addError(lineNumber, 'input debe usarse con un bloque hasta finish');
            }
            else if (comando === 'finish') {
                resetTotal();
            }
            else {
                addError(lineNumber, `Comando desconocido: "${comando}"`);
            }
        }

        // ========== EJECUTAR UN CONJUNTO DE LÍNEAS (para eventos) ==========
        function ejecutarLineas(lineas) {
            // Reiniciar flags de flujo para este bloque
            ifActive = false;
            ifResult = false;
            elsePending = false;
            elseActive = false;
            elseResult = false;

            for (let i = 0; i < lineas.length; i++) {
                let linea = lineas[i];
                let parsed = parsearComando(linea);
                if (parsed) {
                    ejecutarComando(parsed, 0); // línea 0 indica evento (no se muestra)
                } else {
                    if (linea.trim() !== '' && !linea.trim().startsWith('//')) {
                        logMessage(`⚠️ Error en evento: "${linea.trim()}"`);
                    }
                }
            }
        }

        // ========== EJECUTAR PROGRAMA PRINCIPAL (con soporte de bloques input) ==========
        function ejecutarTodo() {
            clearErrors();
            resetTotal();  // limpia todo, incluyendo keyActions

            const codigo = codeArea.value;
            const lineas = codigo.split('\n');
            let i = 0;
            while (i < lineas.length) {
                let linea = lineas[i].trim();
                if (linea === '' || linea.startsWith('//')) {
                    i++;
                    continue;
                }
                let parsed = parsearComando(linea);
                if (parsed && parsed.comando === 'input') {
                    // Comando input con bloque
                    if (parsed.argumentos.length < 1) {
                        addError(i+1, 'input: necesita una tecla');
                        i++;
                        continue;
                    }
                    let tecla = parsed.argumentos[0].toLowerCase();
                    // Recolectar líneas hasta 'finish'
                    let bloque = [];
                    i++; // saltar línea del input
                    while (i < lineas.length) {
                        let l = lineas[i].trim();
                        if (l === 'finish') {
                            i++; // saltar el finish
                            break;
                        }
                        bloque.push(lineas[i]); // guardar línea original (con espacios)
                        i++;
                    }
                    // Almacenar función
                    keyActions[tecla] = function() {
                        ejecutarLineas(bloque);
                    };
                    logMessage(`🎹 Tecla "${tecla}" registrada con bloque de ${bloque.length} líneas`);
                } else {
                    // Comando normal
                    if (parsed) {
                        ejecutarComando(parsed, i+1);
                    } else {
                        addError(i+1, `Sintaxis no válida: "${linea}"`);
                    }
                    i++;
                }
            }
            displayErrors();
        }

        // ========== AUTOCOMPLETADO ==========
        const autocompleteBox = document.getElementById('autocompleteBox');
        let currentSuggestions = [];
        let selectedIndex = -1;
        let startPos = 0;

        function showAutocomplete(suggestions, cursorPos) {
            if (suggestions.length === 0) {
                autocompleteBox.style.display = 'none';
                return;
            }
            currentSuggestions = suggestions;
            selectedIndex = 0;
            let html = '';
            suggestions.forEach((s, i) => {
                html += `<div class="autocomplete-item ${i === 0 ? 'selected' : ''}">${s}</div>`;
            });
            autocompleteBox.innerHTML = html;
            autocompleteBox.style.display = 'block';

            const rect = codeArea.getBoundingClientRect();
            autocompleteBox.style.left = rect.left + 'px';
            autocompleteBox.style.top = (rect.top + codeArea.offsetHeight) + 'px';
        }

        function insertSuggestion(suggestion) {
            const text = codeArea.value;
            const before = text.substring(0, startPos);
            const after = text.substring(codeArea.selectionStart);
            let endPos = codeArea.selectionStart;
            while (endPos < text.length && text[endPos] !== ' ' && text[endPos] !== '\n') {
                endPos++;
            }
            const newText = before + suggestion + after.substring(endPos - codeArea.selectionStart);
            codeArea.value = newText;
            codeArea.setSelectionRange(startPos + suggestion.length, startPos + suggestion.length);
            autocompleteBox.style.display = 'none';
        }

        codeArea.addEventListener('keydown', (e) => {
            if (autocompleteBox.style.display === 'block') {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedIndex = (selectedIndex + 1) % currentSuggestions.length;
                    highlightItem();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedIndex = (selectedIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
                    highlightItem();
                } else if (e.key === 'Enter' || e.key === 'Tab') {
                    e.preventDefault();
                    if (currentSuggestions.length > 0 && selectedIndex >= 0) {
                        insertSuggestion(currentSuggestions[selectedIndex]);
                    }
                } else if (e.key === 'Escape') {
                    autocompleteBox.style.display = 'none';
                }
            } else {
                if (e.ctrlKey && e.key === ' ') {
                    e.preventDefault();
                    const cursorPos = codeArea.selectionStart;
                    const text = codeArea.value;
                    let wordStart = cursorPos;
                    while (wordStart > 0 && text[wordStart - 1] !== ' ' && text[wordStart - 1] !== '\n') {
                        wordStart--;
                    }
                    startPos = wordStart;
                    const currentWord = text.substring(wordStart, cursorPos);
                    const suggestions = COMMANDS.filter(cmd => cmd.startsWith(currentWord));
                    showAutocomplete(suggestions, cursorPos);
                }
            }
        });

        function highlightItem() {
            const items = document.querySelectorAll('.autocomplete-item');
            items.forEach((item, i) => {
                if (i === selectedIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        document.addEventListener('click', (e) => {
            if (!autocompleteBox.contains(e.target) && e.target !== codeArea) {
                autocompleteBox.style.display = 'none';
            }
        });

        autocompleteBox.addEventListener('click', (e) => {
            const item = e.target.closest('.autocomplete-item');
            if (item) {
                const index = Array.from(autocompleteBox.children).indexOf(item);
                if (index !== -1) {
                    insertSuggestion(currentSuggestions[index]);
                }
            }
        });

        // ========== TECLADO PARA INPUT (sin bloquear edición) ==========
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === codeArea) return;
            let tecla = e.key.toLowerCase();
            if (keyActions[tecla]) {
                e.preventDefault();
                keyActions[tecla]();
            }
        });

        // ========== BOTONES ==========
        document.getElementById('runBtn').addEventListener('click', () => {
            logMessage('📟 --- EJECUTANDO ---');
            ejecutarTodo();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetTotal();
            cargarDemo();
        });

        document.getElementById('exampleBtn').addEventListener('click', () => {
            codeArea.value = `// Ejemplo completo
varcreate puntuacion
varset puntuacion 8
createobj nave cubo #3a6ea5
createobj enemigo circulo #b0302a
tp enemigo 300 200
rotate nave 30
createtext "Hola" 50 50

if puntuacion > 5
  tp nave 100 100
  rotate nave 45
else
  tp nave 300 300
  rotate nave -45

input "a"
  tp nave 200 200
  rotate nave 0
  createtext "Tecla A" 200 50
finish

input "espacio"
  if touching nave enemigo
    tp nave 100 100
  else
    tp nave 300 300
  createtext "Espacio" 200 350
finish`;
            logMessage('📂 Ejemplos cargados en el editor.');
        });

        // Inicializar con demo
        cargarDemo();
    })();
</script>
</body>
</html>
