<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS-Craft: Peer-to-Peer Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; 
            border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%;
        }
        #ui-panel { 
            position: absolute; right: 10px; top: 10px; background: rgba(0,0,0,0.7); 
            padding: 15px; color: white; border-radius: 8px; pointer-events: all;
        }
        .hotbar { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; pointer-events: all;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); }
        input, button { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div id="hud">
    <div id="status">PeerJS: Inicializando...</div>
    <div id="peer-id">ID: -</div>
    <input type="text" id="conn-id" placeholder="ID del Host" style="pointer-events: all;">
    <button id="connect-btn" style="pointer-events: all;">Conectar</button>
</div>

<div id="ui-panel">
    <h3>MCreator API</h3>
    <label>Nombre:</label>
    <input type="text" id="block-name" value="Gema">
    <label>Color:</label>
    <input type="color" id="block-color" value="#00ffcc">
    <label>Opacidad:</label>
    <input type="range" id="block-opacity" min="0.1" max="1" step="0.1" value="1">
    <button id="create-block-btn">Crear Bloque</button>
</div>

<div id="crosshair"></div>
<div class="hotbar" id="hotbar"></div>

<script>
/**
 * CLASE MCREATOR
 * Gestiona el registro de tipos de bloques y la lógica de inventario.
 */
class MCreator {
    constructor() {
        this.registry = {
            1: { id: 1, name: 'Piedra', color: 0x888888, opacity: 1 },
            2: { id: 2, name: 'Pasto', color: 0x44aa44, opacity: 1 }
        };
        this.currentId = 3;
        this.selectedBlockId = 1;
    }

    // Registra un nuevo tipo de bloque y actualiza la UI
    defineBlock(name, color, opacity) {
        const id = this.currentId++;
        const config = { id, name, color: parseInt(color.replace('#', '0x')), opacity: parseFloat(opacity) };
        this.registry[id] = config;
        this.updateHotbar();
        return config;
    }

    updateHotbar() {
        const hb = document.getElementById('hotbar');
        hb.innerHTML = '';
        Object.values(this.registry).forEach(block => {
            const slot = document.createElement('div');
            slot.className = `slot ${this.selectedBlockId === block.id ? 'active' : ''}`;
            slot.style.backgroundColor = '#' + block.color.toString(16).padStart(6, '0');
            slot.title = block.name;
            slot.onclick = () => {
                this.selectedBlockId = block.id;
                this.updateHotbar();
            };
            hb.appendChild(slot);
        });
    }
}

// --- CONFIGURACIÓN DEL MOTOR 3D ---
const creator = new MCreator();
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.HemisphereLight(0xeeeeee, 0x888888, 1);
scene.add(light);

// Terreno e Instancias
const geometry = new THREE.BoxGeometry(1, 1, 1);
const blocks = []; // Guardaremos objetos {mesh, id}
const voxelMap = new Map(); // Para colisiones rápidas "x,y,z"

function createBlockMesh(x, y, z, blockId) {
    const config = creator.registry[blockId];
    const mat = new THREE.MeshLambertMaterial({ 
        color: config.color, 
        transparent: config.opacity < 1, 
        opacity: config.opacity 
    });
    const mesh = new THREE.Mesh(geometry, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    const key = `${Math.round(x)},${Math.round(y)},${Math.round(z)}`;
    voxelMap.set(key, mesh);
    return mesh;
}

// Generación inicial simple
for(let x = -5; x < 5; x++) {
    for(let z = -5; z < 5; z++) {
        createBlockMesh(x, 0, z, 2);
    }
}

// --- FÍSICAS Y CONTROLES ---
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
let velocity = new THREE.Vector3();
const clock = new THREE.Clock();

document.addEventListener('keydown', (e) => {
    if(e.code === 'KeyW') moveForward = true;
    if(e.code === 'KeyS') moveBackward = true;
    if(e.code === 'KeyA') moveLeft = true;
    if(e.code === 'KeyD') moveRight = true;
    if(e.code === 'Space' && canJump) { velocity.y += 5; canJump = false; }
});
document.addEventListener('keyup', (e) => {
    if(e.code === 'KeyW') moveForward = false;
    if(e.code === 'KeyS') moveBackward = false;
    if(e.code === 'KeyA') moveLeft = false;
    if(e.code === 'KeyD') moveRight = false;
});

// Pointer Lock
renderer.domElement.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
});

const pitch = new THREE.Object3D();
const yaw = new THREE.Object3D();
yaw.add(pitch);
pitch.add(camera);
scene.add(yaw);
yaw.position.y = 2;

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement) {
        yaw.rotation.y -= e.movementX * 0.002;
        pitch.rotation.x -= e.movementY * 0.002;
        pitch.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch.rotation.x));
    }
});

// Interaction (Raycasting)
const raycaster = new THREE.Raycaster();
window.addEventListener('mousedown', (e) => {
    if (!document.pointerLockElement) return;
    
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(Array.from(voxelMap.values()));

    if (intersects.length > 0) {
        const intersect = intersects[0];
        if (e.button === 0) { // Click Izquierdo: Romper
            scene.remove(intersect.object);
            const p = intersect.object.position;
            voxelMap.delete(`${p.x},${p.y},${p.z}`);
            broadcast({ type: 'break', pos: {x:p.x, y:p.y, z:p.z} });
        } else if (e.button === 2) { // Click Derecho: Poner
            const pos = intersect.object.position.clone().add(intersect.face.normal);
            createBlockMesh(pos.x, pos.y, pos.z, creator.selectedBlockId);
            broadcast({ 
                type: 'place', 
                pos: {x:pos.x, y:pos.y, z:pos.z}, 
                blockId: creator.selectedBlockId,
                config: creator.registry[creator.selectedBlockId] 
            });
        }
    }
});

// --- NETWORKING (PEERJS) ---
const peer = new Peer();
let connections = [];

peer.on('open', id => {
    document.getElementById('peer-id').innerText = `Tu ID: ${id}`;
    document.getElementById('status').innerText = "PeerJS: Listo";
});

peer.on('connection', conn => setupConn(conn));

document.getElementById('connect-btn').onclick = () => {
    const remoteId = document.getElementById('conn-id').value;
    const conn = peer.connect(remoteId);
    setupConn(conn);
};

function setupConn(conn) {
    conn.on('open', () => {
        connections.push(conn);
        document.getElementById('status').innerText = "Conectado";
    });
    conn.on('data', data => {
        if(data.type === 'place') {
            if(!creator.registry[data.blockId]) {
                creator.registry[data.blockId] = data.config;
                creator.updateHotbar();
            }
            createBlockMesh(data.pos.x, data.pos.y, data.pos.z, data.blockId);
        }
        if(data.type === 'break') {
            const key = `${data.pos.x},${data.pos.y},${data.pos.z}`;
            if(voxelMap.has(key)) {
                scene.remove(voxelMap.get(key));
                voxelMap.delete(key);
            }
        }
    });
}

function broadcast(data) {
    connections.forEach(c => c.send(data));
}

// --- LOOP PRINCIPAL ---
function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Físicas simples
    velocity.y -= 9.8 * delta; // Gravedad
    const direction = new THREE.Vector3();
    if(moveForward) direction.z -= 1;
    if(moveBackward) direction.z += 1;
    if(moveLeft) direction.x -= 1;
    if(moveRight) direction.x += 1;
    
    direction.normalize().applyQuaternion(yaw.quaternion);
    yaw.position.add(direction.multiplyScalar(5 * delta));
    yaw.position.y += velocity.y * delta;

    // Colisión básica con el suelo (y=0)
    if (yaw.position.y < 2) {
        velocity.y = 0;
        yaw.position.y = 2;
        canJump = true;
    }

    renderer.render(scene, camera);
}

// --- EVENTOS UI ---
document.getElementById('create-block-btn').onclick = () => {
    const name = document.getElementById('block-name').value;
    const color = document.getElementById('block-color').value;
    const opacity = document.getElementById('block-opacity').value;
    creator.defineBlock(name, color, opacity);
};

creator.updateHotbar();
animate();
</script>
</body>
</html>
