<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos 2008 · Estudio retro</title>
    <style>
        /* ===== ESTÉTICA 2008 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #2f4f7f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 16px;
        }
        .ventana {
            width: 1000px;
            max-width: 95%;
            background: #e3dfd1;
            border: 4px solid #0b1a4a;
            border-radius: 12px 12px 8px 8px;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
        }
        .barra-superior {
            background: linear-gradient(180deg, #cbd6f0 0%, #9aabcf 100%);
            padding: 8px 16px;
            border-bottom: 3px solid #0b1a4a;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #102040;
            text-shadow: 1px 1px white;
        }
        .barra-superior span {
            margin-right: 8px;
            font-size: 28px;
        }
        .contenedor {
            display: flex;
            padding: 12px;
            gap: 12px;
            background: #bdb79e;
            border-top: 2px solid #fffae8;
            border-bottom: 2px solid #6f6a56;
        }
        .panel-codigo {
            flex: 2;
            background: #fffedc;
            border: 3px inset #9c927c;
            padding: 5px;
        }
        .panel-codigo textarea {
            width: 100%;
            height: 420px;
            background: #fffed0;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            color: #002277;
            padding: 8px;
            resize: none;
            outline: none;
            border: 1px solid #b0a278;
        }
        .panel-escenario {
            flex: 1;
            background: #a69e87;
            border: 3px inset #9c927c;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .canvas-retro {
            background: #2c2c2c;
            border: 5px solid #4d5363;
            border-radius: 8px;
            box-shadow: 5px 5px 0 #1a1f2b;
            width: 320px;
            height: 240px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .botonera {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #b6af98;
            padding: 12px;
            border: 3px outset #fff3d1;
            border-radius: 8px;
        }
        .btn-2008 {
            background: linear-gradient(180deg, #f0ead8 0%, #cfc5a8 100%);
            border: 2px solid #5a4f39;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            padding: 7px 16px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #3f3729;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #1d2b45;
            transition: 0.05s;
        }
        .btn-2008:active {
            background: linear-gradient(0deg, #f0ead8 0%, #cfc5a8 100%);
            box-shadow: inset 3px 3px 0 #3f3729;
            transform: translate(2px, 2px);
        }
        .btn-2008.ejecutar {
            background: linear-gradient(180deg, #fef7b0 0%, #f2d96c 100%);
            border-color: #aa6f2b;
        }
        .barra-estado {
            background: #bdb79e;
            padding: 8px 18px;
            border-top: 3px solid #fff7d7;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #16233b;
        }
        .led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3f3;
            box-shadow: inset -2px -2px 0 #0a4b0a;
            display: inline-block;
            margin-left: 6px;
        }
        .led.rojo {
            background: #f33;
            box-shadow: inset -2px -2px 0 #6b0a0a;
        }
    </style>
</head>
<body>
<div class="ventana">
    <div class="barra-superior">
        <span>⌨️</span> COMANDOS '08 · (create, move, tp, input, fin)
    </div>
    <div class="contenedor">
        <!-- PANEL DE CÓDIGO (COMANDOS) -->
        <div class="panel-codigo">
            <textarea id="codigoComandos" spellcheck="false">
; --------------------------------------
;  EJEMPLO: cubo azul que se mueve con flechas
; --------------------------------------
create "cubo" "rectangulo" "#33aaff" "30"
create "bola" "circulo" "#f4d03f" "25"
tp "bola" "200" "120"

input "up"    "move cubo 0 -5"
input "down"  "move cubo 0 5"
input "left"  "move cubo -5 0"
input "right" "move cubo 5 0"
input "space" "tp bola 150 100"

fin
            </textarea>
        </div>
        <!-- PANEL ESCENARIO -->
        <div class="panel-escenario">
            <div class="canvas-retro">
                <canvas id="canvasJuego" width="320" height="240"></canvas>
            </div>
            <div class="botonera">
                <button class="btn-2008 ejecutar" id="btnRun">▶ EJECUTAR</button>
                <button class="btn-2008" id="btnStop">■ DETENER</button>
                <button class="btn-2008" id="btnExport">📤 EXPORTAR</button>
                <label class="btn-2008" for="importFile">📂 IMPORTAR</label>
                <input type="file" id="importFile" accept=".txt,.scr,.cmds" style="display:none;">
            </div>
            <div style="color:#222; font-size:12px; text-align:center;">
                ⚡ teclas: ↑ ↓ ← → space (configura con input)
            </div>
        </div>
    </div>
    <div class="barra-estado">
        <span id="estadoTexto">🟢 SISTEMA LISTO</span>
        <span>v1.0 · 2008 style</span>
    </div>
</div>

<script>
(function(){
    // ========== ELEMENTOS ==========
    const canvas = document.getElementById('canvasJuego');
    const ctx = canvas.getContext('2d');
    const codigoEl = document.getElementById('codigoComandos');
    const btnRun = document.getElementById('btnRun');
    const btnStop = document.getElementById('btnStop');
    const btnExport = document.getElementById('btnExport');
    const importFile = document.getElementById('importFile');
    const estadoTexto = document.getElementById('estadoTexto');

    // ========== ESTADO DEL JUEGO ==========
    let objetos = {};           // ID -> { x, y, forma, color, tamaño }
    let inputs = {};            // tecla -> comando (string)
    let animFrame = null;
    let ejecutando = false;

    // ========== FUNCIONES DE DIBUJO ==========
    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Fondo cuadriculado retro
        ctx.fillStyle = '#1a2634';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#2f4057';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < canvas.width; i += 20) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.strokeStyle = '#2f4057';
            ctx.stroke();
        }
        for (let i = 0; i < canvas.height; i += 20) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }

        // Dibujar objetos
        for (let id in objetos) {
            const obj = objetos[id];
            ctx.fillStyle = obj.color;
            ctx.shadowColor = '#000000';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            if (obj.forma === 'circulo') {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.tamaño/2, 0, 2 * Math.PI);
                ctx.fill();
                // borde blanco delgado
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else { // rectangulo (u otros por defecto)
                ctx.fillRect(obj.x - obj.tamaño/2, obj.y - obj.tamaño/2, obj.tamaño, obj.tamaño);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(obj.x - obj.tamaño/2, obj.y - obj.tamaño/2, obj.tamaño, obj.tamaño);
            }
            // texto ID pequeño
            ctx.shadowBlur = 0;
            ctx.font = '10px "Courier New"';
            ctx.fillStyle = '#ffffaa';
            ctx.fillText(id, obj.x - 15, obj.y - 20);
        }
        ctx.shadowBlur = 0;
    }

    function loop() {
        if (!ejecutando) return;
        dibujar();
        animFrame = requestAnimationFrame(loop);
    }

    function iniciarLoop() {
        if (animFrame) cancelAnimationFrame(animFrame);
        ejecutando = true;
        estadoTexto.innerHTML = '🟢 EJECUTANDO';
        loop();
    }

    function detenerLoop() {
        if (animFrame) {
            cancelAnimationFrame(animFrame);
            animFrame = null;
        }
        ejecutando = false;
        estadoTexto.innerHTML = '🔴 DETENIDO';
        // dibujar mensaje
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#2c3a4f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 16px "Courier New"';
        ctx.fillStyle = '#9cb6d9';
        ctx.fillText('SISTEMA DETENIDO', 50, 120);
    }

    // ========== PARSEAR Y EJECUTAR COMANDOS ==========
    // Tokenizador simple que respeta comillas dobles
    function tokenizarLinea(linea) {
        const tokens = [];
        let i = 0;
        while (i < linea.length) {
            if (linea[i] === ' ' || linea[i] === '\t') { i++; continue; }
            if (linea[i] === '"') {
                // texto entre comillas
                i++;
                let start = i;
                while (i < linea.length && linea[i] !== '"') i++;
                tokens.push(linea.substring(start, i));
                i++; // saltar comilla cierre
            } else {
                let start = i;
                while (i < linea.length && linea[i] !== ' ' && linea[i] !== '\t') i++;
                tokens.push(linea.substring(start, i));
            }
        }
        return tokens;
    }

    // Ejecuta un comando representado por lista de tokens (sin el comando)
    function ejecutarComando(comando, tokens) {
        if (comando === 'create') {
            // create "id" "forma" "color" "tamaño"
            if (tokens.length < 4) { console.warn('create necesita 4 argumentos'); return; }
            const id = tokens[0];
            const forma = tokens[1].toLowerCase();
            const color = tokens[2];
            const tamaño = parseFloat(tokens[3]);
            if (isNaN(tamaño)) { console.warn('tamaño inválido'); return; }
            // Si ya existe, lo reemplazamos (nuevas propiedades, posición por defecto 0,0)
            objetos[id] = {
                x: 0, y: 0,
                forma: (forma === 'circulo' || forma === 'rectangulo') ? forma : 'rectangulo',
                color: color,
                tamaño: tamaño
            };
        }
        else if (comando === 'move') {
            // move "id" "dx" "dy"
            if (tokens.length < 3) return;
            const id = tokens[0];
            const dx = parseFloat(tokens[1]);
            const dy = parseFloat(tokens[2]);
            if (isNaN(dx) || isNaN(dy)) return;
            if (objetos[id]) {
                objetos[id].x += dx;
                objetos[id].y += dy;
                // límites suaves (opcional)
                objetos[id].x = Math.max(0, Math.min(canvas.width, objetos[id].x));
                objetos[id].y = Math.max(0, Math.min(canvas.height, objetos[id].y));
            }
        }
        else if (comando === 'tp') {
            // tp "id" "x" "y"
            if (tokens.length < 3) return;
            const id = tokens[0];
            const x = parseFloat(tokens[1]);
            const y = parseFloat(tokens[2]);
            if (isNaN(x) || isNaN(y)) return;
            if (objetos[id]) {
                objetos[id].x = Math.max(0, Math.min(canvas.width, x));
                objetos[id].y = Math.max(0, Math.min(canvas.height, y));
            }
        }
        else if (comando === 'input') {
            // input "tecla" "comando"
            if (tokens.length < 2) return;
            const tecla = tokens[0].toLowerCase();
            const cmd = tokens[1]; // el comando completo (ej: "move cubo 5 0")
            inputs[tecla] = cmd;
        }
        else if (comando === 'fin') {
            // no hace nada, pero se usa como marcador
        }
    }

    // Procesa una línea de script (ignora comentarios ;)
    function procesarLinea(linea) {
        linea = linea.trim();
        if (linea === '' || linea.startsWith(';')) return true; // continuar

        const tokens = tokenizarLinea(linea);
        if (tokens.length === 0) return true;
        const cmd = tokens[0].toLowerCase();

        // Si encontramos 'fin', detenemos el procesamiento (retorna false)
        if (cmd === 'fin') {
            return false; // stop
        }

        // Los comandos válidos: create, move, tp, input
        if (['create', 'move', 'tp', 'input'].includes(cmd)) {
            ejecutarComando(cmd, tokens.slice(1));
        } else {
            console.warn('Comando desconocido:', cmd);
        }
        return true; // continuar
    }

    // Ejecuta todo el script (desde textarea)
    function ejecutarScript() {
        // Reiniciar estado
        objetos = {};
        inputs = {};
        detenerLoop(); // cancela loop y limpia canvas

        const texto = codigoEl.value;
        const lineas = texto.split('\n');

        for (let linea of lineas) {
            const continuar = procesarLinea(linea);
            if (!continuar) break; // fin del script
        }

        // Iniciar loop si hay objetos o aunque no haya (para que se vea el canvas)
        iniciarLoop();
    }

    // ========== MANEJADOR DE TECLAS ==========
    function manejarTecla(e) {
        if (!ejecutando) return;
        let tecla = e.key;
        // Normalizar
        if (tecla === ' ') tecla = 'space';
        else if (tecla === 'ArrowUp') tecla = 'up';
        else if (tecla === 'ArrowDown') tecla = 'down';
        else if (tecla === 'ArrowLeft') tecla = 'left';
        else if (tecla === 'ArrowRight') tecla = 'right';
        else tecla = tecla.toLowerCase(); // 'a', 'b', etc.

        if (inputs[tecla]) {
            e.preventDefault(); // evitar scroll con flechas
            const comandoStr = inputs[tecla];
            // Parsear el comando almacenado y ejecutarlo
            const tokens = tokenizarLinea(comandoStr);
            if (tokens.length > 0) {
                const cmd = tokens[0].toLowerCase();
                ejecutarComando(cmd, tokens.slice(1));
            }
        }
    }

    window.addEventListener('keydown', manejarTecla);

    // ========== BOTONES ==========
    btnRun.addEventListener('click', () => {
        ejecutarScript();
    });

    btnStop.addEventListener('click', () => {
        detenerLoop();
        objetos = {};
        inputs = {};
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1f293d';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    });

    // Exportar
    btnExport.addEventListener('click', () => {
        const contenido = codigoEl.value;
        const blob = new Blob([contenido], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'comandos_2008.txt';
        a.click();
        URL.revokeObjectURL(url);
    });

    // Importar
    importFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            codigoEl.value = ev.target.result;
            importFile.value = '';
        };
        reader.readAsText(file);
    });

    // ========== EJEMPLO INICIAL ==========
    // El textarea ya contiene un ejemplo, lo ejecutamos al cargar para que se vea algo
    window.addEventListener('load', () => {
        ejecutarScript();
    });
})();
</script>
</body>
</html>
