<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador Visual Script 2008</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #265987; /* fondo azul oscuro tipo XP */
            font-family: 'Segoe UI', Tahoma, 'Lucida Grande', Verdana, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
        }

        /* contenedor principal — estilo ventana 2008 */
        .ventana {
            width: 950px;
            background: #eef3f7;
            border: 3px outset #ffffff;
            border-radius: 12px 12px 8px 8px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5), inset 0 0 0 1px #d0dbe8;
            padding: 0;
            overflow: hidden;
        }

        /* barra de título con brillo */
        .barra-titulo {
            background: linear-gradient(180deg, #3c6ea0, #1e3f66);
            padding: 8px 15px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #0a1c2e;
            letter-spacing: 1px;
            border-bottom: 2px solid #f5c63f;
            box-shadow: inset 0 -2px 0 #9bb9d9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .barra-titulo span {
            font-size: 18px;
            font-style: italic;
            background: #ffd966;
            color: #1e3f66;
            padding: 3px 12px;
            border-radius: 30px;
            border: 1px solid #ffe484;
            box-shadow: inset -1px -1px 0 #a57c2b, 0 2px 4px black;
        }

        /* contenido principal */
        .contenido {
            display: flex;
            padding: 15px;
            gap: 20px;
            background: #d9e2ef url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1.5" fill="%23ffffff30"/></svg>'); /* textura tenue */
        }

        /* panel del juego (izquierda) */
        .panel-juego {
            flex: 1;
            background: #b8c9dd;
            border: 3px inset #f0f8ff;
            border-radius: 10px;
            padding: 12px;
            box-shadow: inset 2px 2px 5px #2b3f54, inset -2px -2px 5px #eaf0fa;
        }

        .titulo-panel {
            background: linear-gradient(180deg, #e3eefb, #b3c9e3);
            padding: 5px 8px;
            font-weight: bold;
            font-size: 16px;
            border: 2px outset #ffffff;
            border-radius: 20px;
            text-align: center;
            color: #1a3a5e;
            margin-bottom: 12px;
            box-shadow: 0 2px 4px #2f4f6e;
        }

        canvas {
            display: block;
            margin: 10px auto;
            border: 4px solid #2d4d6e;
            border-radius: 8px;
            background: #c0d3e8;
            box-shadow: 0 0 0 2px #eaf1fc, 4px 4px 8px #1f2f40;
            image-rendering: pixelated;
        }

        .info-juego {
            background: #f0f8ff;
            border: 1px solid #abc0d6;
            border-radius: 30px;
            padding: 8px 12px;
            text-align: center;
            font-weight: bold;
            color: #00264d;
            box-shadow: inset 0 0 0 2px white, 2px 2px 0 #768ea8;
        }

        /* panel de script visual (derecha) */
        .panel-script {
            width: 400px;
            background: #cddef5;
            border: 3px inset #ffffff;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 1px 1px 5px #62738b, inset -1px -1px 5px #f0f8ff;
        }

        /* botonera estilo 2008 */
        .botonera {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            background: #aac1db;
            padding: 12px;
            border-radius: 30px;
            border: 2px inset #e1efff;
        }

        .boton {
            background: linear-gradient(180deg, #f0f9ff, #c0d6f0);
            border: 2px outset #ffffff;
            border-radius: 30px;
            padding: 8px 14px;
            font-weight: bold;
            font-size: 14px;
            color: #002b55;
            cursor: pointer;
            box-shadow: 0 3px 0 #7b92b0, 0 5px 8px #1f3145;
            transition: 0.05s linear;
            flex: 1 0 auto;
            text-shadow: 1px 1px 0 white;
            font-family: inherit;
        }

        .boton:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #7b92b0, 0 3px 6px #1f3145;
            border-style: inset;
        }

        .boton:disabled {
            opacity: 0.45;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7b92b0;
            cursor: not-allowed;
            border-style: inset;
            filter: grayscale(20%);
        }

        /* área de bloques (lista visual) */
        .lista-bloques {
            background: #b7ceea;
            border: 3px inset #ddeeff;
            border-radius: 18px;
            padding: 12px;
            min-height: 280px;
            max-height: 380px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px #2f4965;
        }

        .bloque-item {
            background: linear-gradient(180deg, #fefcd0, #f8e071);
            border: 2px outset #ffffe0;
            border-radius: 30px;
            padding: 6px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 2px 2px 0 #987e2c, 0 4px 6px #18293e;
            font-weight: bold;
            color: #2a1f0c;
        }

        .bloque-icono {
            font-size: 22px;
            margin-right: 8px;
            filter: drop-shadow(2px 2px 0 #f5f0b0);
        }

        .bloque-texto {
            flex: 1;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bloque-controles button {
            background: #e6b422;
            border: 2px outset #fcd975;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-left: 4px;
            box-shadow: 1px 2px 0 #7f6600;
            color: #2a2a0a;
            line-height: 1;
        }

        .bloque-controles button:active {
            transform: translate(1px, 2px);
            box-shadow: none;
        }

        .bloque-controles button:disabled {
            opacity: 0.3;
            transform: none;
            box-shadow: 1px 1px 0 #7f6600;
        }

        /* mensajes */
        .mensaje {
            margin-top: 15px;
            background: #fffbcc;
            border: 2px solid #daa520;
            border-radius: 30px;
            padding: 8px;
            font-weight: bold;
            text-align: center;
            color: #3f3a1f;
            box-shadow: inset 0 0 0 2px #ffffe0, 2px 2px 0 #b99b48;
        }

        /* pie 2008 */
        .pie {
            background: #2e4d77;
            color: white;
            padding: 8px 20px;
            font-size: 13px;
            border-top: 3px solid #ffc966;
            text-align: right;
            text-shadow: 1px 1px 0 #001122;
        }

        .pie a {
            color: #ffd966;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="ventana">
    <div class="barra-titulo">
        🎮 VISUAL SCRIPT GAME CREATOR 2008
        <span>BETA</span>
    </div>

    <div class="contenido">
        <!-- panel del juego -->
        <div class="panel-juego">
            <div class="titulo-panel">▶ ZONA DE JUEGO ◀</div>
            <canvas id="gameCanvas" width="200" height="200"></canvas>
            <div class="info-juego" id="estadoJuego">⚡ Jugador en (0,0) · Meta (4,4)</div>
        </div>

        <!-- panel script visual -->
        <div class="panel-script">
            <div class="titulo-panel">📦 SCRIPT VISUAL (apila bloques)</div>

            <div class="botonera">
                <button class="boton" id="btnArriba">⬆ ARRIBA</button>
                <button class="boton" id="btnAbajo">⬇ ABAJO</button>
                <button class="boton" id="btnIzq">⬅ IZQUIERDA</button>
                <button class="boton" id="btnDer">➜ DERECHA</button>
                <button class="boton" id="btnEjecutar">▶ EJECUTAR</button>
                <button class="boton" id="btnResetJuego">⟲ RESET</button>
                <button class="boton" id="btnLimpiar">✖ LIMPIAR</button>
            </div>

            <!-- lista de bloques visuales -->
            <div id="listaBloques" class="lista-bloques">
                <!-- los bloques se generan dinámicamente -->
            </div>

            <div id="mensajeBox" class="mensaje">
                🧩 Arrastra mentalmente los bloques ;)
            </div>
        </div>
    </div>

    <div class="pie">
        ⚡ 2008 visual style · <a href="#">creador de juegos</a> · funcional!
    </div>
</div>

<script>
    (function() {
        // ---------- CONSTANTES Y ESTADO ----------
        const GRID_SIZE = 5;
        const CELL_SIZE = 40; // 200/5
        const META = { x: 4, y: 4 };

        // Posición del jugador
        let jugador = { x: 0, y: 0 };

        // Lista de comandos (script visual)
        let comandos = [];  // ej: ['up', 'down', 'left', 'right']

        // Control de ejecución
        let ejecutando = false;
        let timeoutId = null;

        // Elementos del DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const listaDiv = document.getElementById('listaBloques');
        const mensajeDiv = document.getElementById('mensajeBox');
        const estadoJuegoDiv = document.getElementById('estadoJuego');

        // Botones de acción (para habilitar/deshabilitar)
        const btnArriba = document.getElementById('btnArriba');
        const btnAbajo = document.getElementById('btnAbajo');
        const btnIzq = document.getElementById('btnIzq');
        const btnDer = document.getElementById('btnDer');
        const btnEjecutar = document.getElementById('btnEjecutar');
        const btnResetJuego = document.getElementById('btnResetJuego');
        const btnLimpiar = document.getElementById('btnLimpiar');

        const todosBotones = [btnArriba, btnAbajo, btnIzq, btnDer, btnEjecutar, btnResetJuego, btnLimpiar];

        // ---------- DIBUJAR JUEGO (estilo retro 2008) ----------
        function dibujarGrid() {
            ctx.clearRect(0, 0, 200, 200);

            // Dibujar celdas con relieve
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    let x = i * CELL_SIZE;
                    let y = j * CELL_SIZE;

                    // Fondo tipo tablero
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#afc9eb' : '#8fb0da';
                    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

                    // Borde biselado
                    ctx.strokeStyle = '#eef5ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x+1, y+1, CELL_SIZE-2, CELL_SIZE-2);
                }
            }

            // Dibujar meta (estrella roja con brillo)
            let mx = META.x * CELL_SIZE;
            let my = META.y * CELL_SIZE;
            ctx.beginPath();
            ctx.arc(mx + CELL_SIZE/2, my + CELL_SIZE/2, 15, 0, 2 * Math.PI);
            ctx.fillStyle = '#ff3333';
            ctx.shadowColor = '#ffd966';
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffff99';
            ctx.font = 'bold 20px "Segoe UI", Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⭐', mx + CELL_SIZE/2, my + CELL_SIZE/2 - 1);

            // Dibujar jugador (carita sonriente 2008)
            let px = jugador.x * CELL_SIZE;
            let py = jugador.y * CELL_SIZE;
            ctx.beginPath();
            ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, 14, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffe066';
            ctx.shadowColor = '#b8860b';
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.strokeStyle = '#a67c1e';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(px + 25, py + 15, 3, 0, 2*Math.PI);
            ctx.arc(px + 15, py + 15, 3, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.strokeStyle = '#422013';
            ctx.lineWidth = 3;
            ctx.arc(px + 20, py + 28, 6, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Actualizar texto de estado
            estadoJuegoDiv.innerText = `🎮 Jugador (${jugador.x},${jugador.y})  ·  Meta (4,4)`;
        }

        // ---------- MANEJAR MOVIMIENTO (con límites) ----------
        function moverJugador(dx, dy) {
            let nuevoX = jugador.x + dx;
            let nuevoY = jugador.y + dy;
            if (nuevoX >= 0 && nuevoX < GRID_SIZE && nuevoY >= 0 && nuevoY < GRID_SIZE) {
                jugador.x = nuevoX;
                jugador.y = nuevoY;
            }
            dibujarGrid();
        }

        // ---------- COMPROBAR VICTORIA ----------
        function verificarVictoria() {
            if (jugador.x === META.x && jugador.y === META.y) {
                mensajeDiv.innerHTML = '🏆 ¡VICTORIA! ¡Has ganado! 🏆';
                return true;
            }
            return false;
        }

        // ---------- RENDERIZAR LISTA DE BLOQUES VISUALES ----------
        function renderBloques() {
            if (comandos.length === 0) {
                listaDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#2b4b6f; font-style:italic;">⬆️ Añade bloques con los botones ⬆️</div>';
                return;
            }

            let html = '';
            comandos.forEach((cmd, idx) => {
                let icono = '';
                let texto = '';
                switch (cmd) {
                    case 'up': icono = '⬆️'; texto = 'MOVER ARRIBA'; break;
                    case 'down': icono = '⬇️'; texto = 'MOVER ABAJO'; break;
                    case 'left': icono = '⬅️'; texto = 'MOVER IZQUIERDA'; break;
                    case 'right': icono = '➡️'; texto = 'MOVER DERECHA'; break;
                    default: icono = '🔷'; texto = cmd;
                }
                html += `<div class="bloque-item" data-index="${idx}">
                    <div style="display: flex; align-items: center;">
                        <span class="bloque-icono">${icono}</span>
                        <span class="bloque-texto">${texto}</span>
                    </div>
                    <div class="bloque-controles">
                        <button class="btn-up" data-index="${idx}" ${ejecutando ? 'disabled' : ''}>↑</button>
                        <button class="btn-down" data-index="${idx}" ${ejecutando ? 'disabled' : ''}>↓</button>
                        <button class="btn-delete" data-index="${idx}" ${ejecutando ? 'disabled' : ''}>✖</button>
                    </div>
                </div>`;
            });
            listaDiv.innerHTML = html;

            // Deshabilitar botones internos si estamos ejecutando (por si acaso)
            if (ejecutando) {
                document.querySelectorAll('.bloque-controles button').forEach(btn => btn.disabled = true);
            }
        }

        // ---------- FUNCIONES DE MODIFICACIÓN DE SCRIPT ----------
        function agregarComando(cmd) {
            if (ejecutando) return;
            comandos.push(cmd);
            renderBloques();
            mensajeDiv.innerHTML = '➕ Bloque añadido. ¡Ejecuta el script!';
        }

        function eliminarComando(index) {
            if (ejecutando) return;
            if (index >= 0 && index < comandos.length) {
                comandos.splice(index, 1);
                renderBloques();
            }
        }

        function moverArriba(index) {
            if (ejecutando) return;
            if (index > 0) {
                [comandos[index-1], comandos[index]] = [comandos[index], comandos[index-1]];
                renderBloques();
            }
        }

        function moverAbajo(index) {
            if (ejecutando) return;
            if (index < comandos.length - 1) {
                [comandos[index], comandos[index+1]] = [comandos[index+1], comandos[index]];
                renderBloques();
            }
        }

        function limpiarScript() {
            if (ejecutando) return;
            comandos = [];
            renderBloques();
            mensajeDiv.innerHTML = '🧽 Script limpiado. Crea uno nuevo.';
        }

        function resetJugador() {
            if (ejecutando) {
                detenerEjecucion();
            }
            jugador = { x: 0, y: 0 };
            dibujarGrid();
            mensajeDiv.innerHTML = '🔁 Jugador reiniciado a (0,0)';
        }

        // ---------- EJECUCIÓN DEL SCRIPT (con retardo) ----------
        function detenerEjecucion() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            ejecutando = false;
            habilitarBotones(true);
            renderBloques(); // para habilitar botones internos
            mensajeDiv.innerHTML = '⏸️ Ejecución detenida.';
        }

        function habilitarBotones(habilitar) {
            todosBotones.forEach(btn => btn.disabled = !habilitar);
            // los botones de bloque se actualizan en renderBloques
        }

        function ejecutarScript() {
            if (ejecutando) return;
            if (comandos.length === 0) {
                mensajeDiv.innerHTML = '⚠️ No hay bloques en el script. Añade algunos.';
                return;
            }

            // Reiniciar posición si se desea, pero respetamos posición actual
            // Podríamos preguntar, pero lo dejamos así. El usuario puede reset manual.
            ejecutando = true;
            habilitarBotones(false);
            renderBloques();  // deshabilita los botones de bloque
            mensajeDiv.innerHTML = '⚙️ Ejecutando script...';

            let indice = 0;

            function paso() {
                if (!ejecutando) return; // se detuvo externamente

                if (indice >= comandos.length) {
                    // Terminó
                    mensajeDiv.innerHTML = '✅ Script finalizado.';
                    detenerEjecucion();
                    return;
                }

                const cmd = comandos[indice];
                switch (cmd) {
                    case 'up': moverJugador(0, -1); break;
                    case 'down': moverJugador(0, 1); break;
                    case 'left': moverJugador(-1, 0); break;
                    case 'right': moverJugador(1, 0); break;
                }

                // Comprobar victoria
                if (verificarVictoria()) {
                    detenerEjecucion();
                    return;
                }

                indice++;
                timeoutId = setTimeout(paso, 400); // velocidad 2008: pausita
            }

            paso();
        }

        // ---------- EVENTOS (delegación en lista de bloques) ----------
        listaDiv.addEventListener('click', (e) => {
            if (ejecutando) return;

            const target = e.target;
            if (target.classList.contains('btn-up')) {
                const idx = target.getAttribute('data-index');
                if (idx !== null) moverArriba(parseInt(idx));
            } else if (target.classList.contains('btn-down')) {
                const idx = target.getAttribute('data-index');
                if (idx !== null) moverAbajo(parseInt(idx));
            } else if (target.classList.contains('btn-delete')) {
                const idx = target.getAttribute('data-index');
                if (idx !== null) eliminarComando(parseInt(idx));
            }
        });

        // Botones principales
        btnArriba.addEventListener('click', () => agregarComando('up'));
        btnAbajo.addEventListener('click', () => agregarComando('down'));
        btnIzq.addEventListener('click', () => agregarComando('left'));
        btnDer.addEventListener('click', () => agregarComando('right'));
        btnEjecutar.addEventListener('click', ejecutarScript);
        btnResetJuego.addEventListener('click', resetJugador);
        btnLimpiar.addEventListener('click', limpiarScript);

        // Inicializar
        dibujarGrid();
        renderBloques();

        // Ejemplo de script precargado para que se vea "visual" desde el inicio
        comandos = ['up', 'right', 'down', 'right', 'up']; // pequeña rutina
        renderBloques();
        mensajeDiv.innerHTML = '🎮 Script de ejemplo cargado. ¡Pulsa EJECUTAR!';
    })();
</script>
</body>
</html>
