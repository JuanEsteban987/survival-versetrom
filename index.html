<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Easy Pro 2008 · sintaxis limpia</title>
    <style>
        /* ===== ESTÉTICA 2008 (sin cambios) ===== */
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: #1f3a5f;
            font-family: 'Tahoma', 'Verdana', 'Arial', sans-serif;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .computer {
            width: 1050px;
            background: #d0d0d0;
            border: 5px ridge #e0e0e0;
            border-radius: 12px 12px 8px 8px;
            padding: 20px 20px 15px 20px;
            box-shadow: 8px 8px 0px #0a1e30, inset 2px 2px 5px #f0f0f0;
        }

        .top-bar {
            background: linear-gradient(180deg, #1040a0, #002070);
            border: 3px ridge #3070d0;
            padding: 8px 20px;
            margin-bottom: 20px;
            box-shadow: inset 2px 2px 8px #80a0ff, inset -2px -2px 5px #001030;
            color: white;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }
        .title {
            font-size: 58px;
            font-weight: bold;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0px #0f0f0f, 6px 6px 0px #303030;
            color: #ffffb0;
            line-height: 1;
        }
        .year {
            font-size: 28px;
            background: #c0c000;
            color: #202020;
            border: 3px inset #f0f000;
            padding: 5px 15px;
            font-weight: bold;
            font-style: italic;
            box-shadow: 0 0 0 2px #808080;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
        }

        .workspace {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .code-panel {
            flex: 1;
            background: #bebebe;
            border: 4px inset #fcfcfc;
            padding: 15px;
            box-shadow: inset 3px 3px 8px #707070, inset -3px -3px 8px #e0e0e0;
        }

        .panel-label {
            font-weight: bold;
            font-size: 20px;
            color: #202020;
            background: linear-gradient(90deg, #c0c0c0, #a0a0a0);
            padding: 5px 15px;
            border: 3px outset #e0e0e0;
            margin-bottom: 15px;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 260px;
            background: #ffffcc;
            border: 4px inset #8a8a8a;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            color: #001080;
            padding: 12px;
            line-height: 1.4;
            resize: vertical;
            box-shadow: inset 2px 2px 10px #404040;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(180deg, #f0f0f0, #b0b0b0);
            border: 4px outset #ffffff;
            color: #101010;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 24px;
            cursor: pointer;
            font-family: 'Tahoma', sans-serif;
            box-shadow: 3px 3px 0px #404040;
            transition: 0.05s linear;
        }
        .btn:hover {
            background: linear-gradient(180deg, #ffffe0, #c0c0c0);
            border-color: #fffff0;
        }
        .btn:active {
            border: 4px inset #808080;
            box-shadow: 1px 1px 0px #202020;
            transform: translate(2px, 2px);
        }

        .stage-panel {
            flex: 1;
            background: #bebebe;
            border: 4px inset #fcfcfc;
            padding: 15px;
            box-shadow: inset 3px 3px 8px #707070, inset -3px -3px 8px #e0e0e0;
        }

        .canvas-wrapper {
            background: #8f8f8f;
            border: 6px inset #5a5a5a;
            padding: 8px;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 400px;
            height: 400px;
            background: #ffffff;
            border: 2px solid #303030;
            display: block;
            image-rendering: crisp-edges;
        }

        .object-panel {
            margin-top: 20px;
            background: #c8c8c8;
            border: 4px inset #ececec;
            padding: 10px;
            max-height: 170px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #000000;
        }

        .object-title {
            background: #a0a0a0;
            border: 2px outset #d0d0d0;
            padding: 4px 10px;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: center;
            color: #202020;
        }

        .object-list {
            list-style: none;
            padding: 2px;
        }
        .object-list li {
            border-bottom: 1px dashed #404040;
            padding: 5px 0px 5px 10px;
            background: #e0e0e0;
            margin-bottom: 3px;
            border-left: 6px solid #202020;
        }

        .log-console {
            background: #1a1a1a;
            color: #3aff99;
            font-family: 'Courier New', monospace;
            border: 5px inset #707070;
            padding: 10px;
            margin-top: 25px;
            height: 100px;
            overflow-y: auto;
            font-size: 15px;
            font-weight: bold;
            box-shadow: inset 0 0 15px #00cc66;
            border-radius: 0px;
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            color: #dfdfdf;
            text-shadow: 2px 2px 0 #0a1e30;
            font-size: 16px;
            font-weight: bold;
            border-top: 2px groove #a0a0a0;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="computer">
    <div class="top-bar">
        <span class="title">EASY PRO</span>
        <span class="year">est. 2008</span>
    </div>

    <div class="workspace">
        <div class="code-panel">
            <div class="panel-label">✎ editar código (sin paréntesis)</div>
            <textarea id="codeArea" spellcheck="false">
createobj nave Cubo #2288ff
createobj enemigo Circulo #dd4422
tp nave 200 300
mov enemigo 40 -15
createobj powerup Circulo gold
tp powerup 80 80
input a
input espacio
finish</textarea>

            <div class="button-group">
                <button class="btn" id="runBtn">▶ ejecutar</button>
                <button class="btn" id="resetBtn">⟲ reiniciar</button>
                <button class="btn" id="exampleBtn">📁 ejemplos</button>
            </div>

            <div class="log-console" id="logConsole">
                > Easy Pro 2008 listo. Comandos sin paréntesis ni comillas.
            </div>
        </div>

        <div class="stage-panel">
            <div class="panel-label">🎬 escenario</div>
            <div class="canvas-wrapper">
                <canvas id="stageCanvas" width="400" height="400"></canvas>
            </div>

            <div class="object-panel">
                <div class="object-title">📦 objetos activos</div>
                <ul class="object-list" id="objectList">
                    <li style="color:#404040;">(ningún objeto)</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="footer-note">
        ⚡ comandos: createobj nombre forma color | mov nombre dx dy | tp nombre x y | input tecla | finish
    </div>
</div>

<script>
    (function() {
        // Motor Easy Pro 2008 - sintaxis limpia
        let objetos = [];
        // Mapa de teclas para input (tecla -> función a ejecutar)
        let keyActions = {};

        const canvas = document.getElementById('stageCanvas');
        const ctx = canvas.getContext('2d');
        const codeArea = document.getElementById('codeArea');
        const logDiv = document.getElementById('logConsole');
        const objectList = document.getElementById('objectList');

        function logMessage(msg) {
            const p = document.createElement('div');
            p.textContent = '> ' + msg;
            logDiv.appendChild(p);
            if (logDiv.children.length > 9) {
                logDiv.removeChild(logDiv.children[0]);
            }
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function actualizarListaObjetos() {
            if (objetos.length === 0) {
                objectList.innerHTML = '<li style="color:#404040;">(ningún objeto)</li>';
                return;
            }
            let html = '';
            objetos.forEach(obj => {
                html += `<li style="border-left-color: ${obj.color};">${obj.name} · ${obj.shape} · ${obj.color} · (${obj.x}, ${obj.y})</li>`;
            });
            objectList.innerHTML = html;
        }

        function renderizar() {
            ctx.clearRect(0, 0, 400, 400);
            objetos.forEach(obj => {
                ctx.fillStyle = obj.color;
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2.5;

                if (obj.shape === 'Cubo') {
                    ctx.fillRect(obj.x - 20, obj.y - 20, 40, 40);
                    ctx.strokeRect(obj.x - 20, obj.y - 20, 40, 40);
                } else if (obj.shape === 'Circulo') {
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, 20, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.font = 'bold 11px "Courier New", monospace';
                ctx.fillStyle = '#111111';
                ctx.fillText(obj.name, obj.x - 15, obj.y - 25);
                ctx.fillStyle = '#FFFFF0';
                ctx.fillText(obj.name, obj.x - 16, obj.y - 26);
            });
            actualizarListaObjetos();
        }

        function encontrarObj(nombre) {
            return objetos.find(obj => obj.name === nombre);
        }

        // ===== NUEVO PARSER: sin paréntesis ni comillas =====
        function parsearComando(linea) {
            linea = linea.trim();
            if (linea === '' || linea.startsWith('//')) return null;

            let partes = linea.split(/\s+/); // separa por espacios
            if (partes.length === 0) return null;
            let comando = partes[0].toLowerCase();
            let argumentos = partes.slice(1);
            return { comando, argumentos };
        }

        // ===== MANEJADOR DE TECLADO =====
        function manejarTecla(e) {
            let tecla = e.key.toLowerCase();
            if (keyActions[tecla]) {
                keyActions[tecla](); // ejecutar acción asociada
            }
        }

        // Añadir listener global de teclado
        document.addEventListener('keydown', manejarTecla);

        // ===== EJECUTOR DE COMANDOS =====
        function ejecutarComando(parsed) {
            if (!parsed) return false;
            const { comando, argumentos } = parsed;

            if (comando === 'createobj') {
                if (argumentos.length < 3) {
                    logMessage('❌ createobj: necesita: nombre forma color');
                    return false;
                }
                const [nombre, forma, color] = argumentos;
                if (forma !== 'Cubo' && forma !== 'Circulo') {
                    logMessage(`❌ createobj: forma debe ser Cubo o Circulo (recibió: ${forma})`);
                    return false;
                }
                if (encontrarObj(nombre)) {
                    logMessage(`❌ createobj: ya existe un objeto "${nombre}"`);
                    return false;
                }
                objetos.push({
                    name: nombre,
                    shape: forma,
                    color: color,
                    x: 200,
                    y: 200
                });
                logMessage(`✅ objeto "${nombre}" creado (${forma}, ${color}) en (200,200)`);
                renderizar();
                return true;
            }
            else if (comando === 'mov') {
                if (argumentos.length < 3) {
                    logMessage('❌ mov: necesita: nombre dx dy');
                    return false;
                }
                const [nombre, dxStr, dyStr] = argumentos;
                const obj = encontrarObj(nombre);
                if (!obj) {
                    logMessage(`❌ mov: objeto "${nombre}" no existe`);
                    return false;
                }
                const dx = parseFloat(dxStr);
                const dy = parseFloat(dyStr);
                if (isNaN(dx) || isNaN(dy)) {
                    logMessage('❌ mov: dx y dy deben ser números');
                    return false;
                }
                obj.x += dx;
                obj.y += dy;
                logMessage(`🚚 "${nombre}" movido a (${obj.x},${obj.y})`);
                renderizar();
                return true;
            }
            else if (comando === 'tp') {
                if (argumentos.length < 3) {
                    logMessage('❌ tp: necesita: nombre x y');
                    return false;
                }
                const [nombre, xStr, yStr] = argumentos;
                const obj = encontrarObj(nombre);
                if (!obj) {
                    logMessage(`❌ tp: objeto "${nombre}" no existe`);
                    return false;
                }
                const x = parseFloat(xStr);
                const y = parseFloat(yStr);
                if (isNaN(x) || isNaN(y)) {
                    logMessage('❌ tp: x e y deben ser números');
                    return false;
                }
                obj.x = x;
                obj.y = y;
                logMessage(`📞 "${nombre}" teleportado a (${obj.x},${obj.y})`);
                renderizar();
                return true;
            }
            else if (comando === 'input') {
                if (argumentos.length < 1) {
                    logMessage('❌ input: necesita una tecla (ej: input a)');
                    return false;
                }
                const tecla = argumentos[0].toLowerCase();
                // Asociar acción a la tecla (mostrar mensaje)
                keyActions[tecla] = () => {
                    logMessage(`⌨️ Tecla "${tecla}" presionada`);
                };
                logMessage(`🎹 Tecla "${tecla}" registrada para input`);
                return true;
            }
            else if (comando === 'finish') {
                // Reinicia el escenario y limpia las teclas
                objetos = [];
                keyActions = {};
                renderizar();
                logMessage('🏁 Finish: escenario reiniciado y teclas limpiadas');
                return true;
            }
            else {
                logMessage(`⚠️ Comando desconocido: "${comando}"`);
                return false;
            }
        }

        function ejecutarTodo() {
            const codigo = codeArea.value;
            const lineas = codigo.split('\n');
            lineas.forEach(linea => {
                const parsed = parsearComando(linea);
                if (parsed) {
                    ejecutarComando(parsed);
                } else {
                    if (linea.trim() !== '' && !linea.trim().startsWith('//')) {
                        logMessage(`⏭ línea ignorada: "${linea.trim()}"`);
                    }
                }
            });
        }

        function reiniciarEscenario() {
            objetos = [];
            keyActions = {};
            renderizar();
            logMessage('🔄 Escenario y teclas reiniciados.');
        }

        function cargarEjemplos() {
            codeArea.value = `createobj heroe Cubo #3a6ea5
createobj villano Circulo #b0302a
tp heroe 120 200
tp villano 280 200
createobj estrella Circulo gold
tp estrella 200 90
mov villano 0 50
input flechaArriba
input espacio
// finish para limpiar`;
            logMessage('📂 Ejemplos cargados (sintaxis sin paréntesis)');
        }

        // Demo inicial con objetos visibles
        function demoInicial() {
            objetos = [
                { name: 'demoCuad', shape: 'Cubo', color: '#1070c0', x: 150, y: 150 },
                { name: 'demoCirc', shape: 'Circulo', color: '#c05030', x: 260, y: 280 }
            ];
            renderizar();
            logMessage('⚡ Easy Pro 2008 listo. Objetos de demostración.');
        }

        // Botones
        document.getElementById('runBtn').addEventListener('click', () => {
            logMessage('📟 --- EJECUTANDO COMANDOS ---');
            ejecutarTodo();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            reiniciarEscenario();
        });

        document.getElementById('exampleBtn').addEventListener('click', () => {
            cargarEjemplos();
        });

        demoInicial();
        renderizar();
    })();
</script>
</body>
</html>
