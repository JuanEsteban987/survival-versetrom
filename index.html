<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Creador de Juegos - VS Code Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e1e, #2d2d2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            background: #252526;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #3e3e42;
        }

        /* VS Code Title Bar */
        .title-bar {
            background: #3c3c3c;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0e0e0e;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }

        .title-text {
            color: #cccccc;
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 600px;
        }

        /* Sidebar - Game Creator Tools */
        .sidebar {
            background: #1e1e1e;
            border-right: 1px solid #3e3e42;
            padding: 20px;
        }

        .sidebar-title {
            color: #cccccc;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .tool-section {
            margin-bottom: 25px;
        }

        .tool-section h3 {
            color: #cccccc;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .game-input {
            width: 100%;
            padding: 8px 12px;
            background: #3c3c3c;
            border: 1px solid #0e0e0e;
            color: #cccccc;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .game-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .game-button {
            width: 100%;
            padding: 8px 12px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .game-button:hover {
            background: #1177bb;
        }

        .game-button.secondary {
            background: #3c3c3c;
            color: #cccccc;
            border: 1px solid #0e0e0e;
        }

        .game-button.secondary:hover {
            background: #4a4a4a;
        }

        .color-picker {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .color-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
        }

        /* Game Canvas Area */
        .game-area {
            background: #1e1e1e;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #gameCanvas {
            background: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border: 1px solid #3e3e42;
            width: 100%;
            max-width: 600px;
            height: auto;
            cursor: crosshair;
        }

        .game-stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            padding: 15px 25px;
            background: #2d2d2d;
            border-radius: 6px;
            border: 1px solid #3e3e42;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #969696;
            font-size: 12px;
            text-transform: uppercase;
        }

        .stat-value {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
        }

        /* Status Bar */
        .status-bar {
            background: #007acc;
            padding: 6px 16px;
            color: white;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #252526;
            border-radius: 8px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            border: 1px solid #3e3e42;
        }

        .modal h2 {
            color: #ffffff;
            margin-bottom: 15px;
        }

        .modal p {
            color: #cccccc;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- VS Code Title Bar -->
        <div class="title-bar">
            <div class="window-controls">
                <div class="window-btn close"></div>
                <div class="window-btn minimize"></div>
                <div class="window-btn maximize"></div>
            </div>
            <span class="title-text">🎮 Game Creator - Visual Studio Code</span>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar Tools -->
            <div class="sidebar">
                <div class="sidebar-title">EXPLORER: GAME CREATOR</div>
                
                <div class="tool-section">
                    <h3>🎯 Game Settings</h3>
                    <input type="text" class="game-input" id="gameTitle" placeholder="Game Title" value="Mi Aventura">
                    <input type="number" class="game-input" id="targetScore" placeholder="Target Score" value="10" min="1" max="50">
                </div>

                <div class="tool-section">
                    <h3>🎨 Player Color</h3>
                    <div class="color-picker" id="colorPicker">
                        <div class="color-option selected" style="background: #ff6b6b" data-color="#ff6b6b"></div>
                        <div class="color-option" style="background: #4ecdc4" data-color="#4ecdc4"></div>
                        <div class="color-option" style="background: #45b7d1" data-color="#45b7d1"></div>
                        <div class="color-option" style="background: #96ceb4" data-color="#96ceb4"></div>
                        <div class="color-option" style="background: #ffeead" data-color="#ffeead"></div>
                        <div class="color-option" style="background: #ffcc5c" data-color="#ffcc5c"></div>
                        <div class="color-option" style="background: #ff6f69" data-color="#ff6f69"></div>
                        <div class="color-option" style="background: #88d8b0" data-color="#88d8b0"></div>
                    </div>
                </div>

                <div class="tool-section">
                    <h3>⚡ Power-Ups</h3>
                    <button class="game-button secondary" onclick="addPowerUp()">➕ Add Power-Up</button>
                    <button class="game-button secondary" onclick="removePowerUp()">➖ Remove Power-Up</button>
                </div>

                <div class="tool-section">
                    <h3>🕹️ Controls</h3>
                    <button class="game-button" onclick="startGame()">▶ Start Game</button>
                    <button class="game-button secondary" onclick="resetGame()">⟲ Reset Game</button>
                </div>

                <div class="tool-section">
                    <h3>📊 Active Power-Ups</h3>
                    <div style="color: #cccccc; font-size: 13px; text-align: center;" id="powerUpCount">
                        0 Active
                    </div>
                </div>
            </div>

            <!-- Game Area -->
            <div class="game-area">
                <canvas id="gameCanvas" width="600" height="400"></canvas>
                
                <div class="game-stats">
                    <div class="stat">
                        <div class="stat-label">Score</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Target</div>
                        <div class="stat-value" id="target">10</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Time</div>
                        <div class="stat-value" id="timer">0s</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span>✨ Game Creator v1.0</span>
            </div>
            <div class="status-item">
                <span>⚡ Click on squares to score!</span>
            </div>
            <div class="status-item">
                <span id="gameStatus">Ready to play</span>
            </div>
        </div>
    </div>

    <!-- Victory Modal -->
    <div class="modal" id="victoryModal">
        <div class="modal-content">
            <h2>🏆 Victory!</h2>
            <p id="victoryMessage">You reached the target score!</p>
            <button class="game-button" onclick="closeVictoryModal()">Play Again</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game State
        let gameRunning = false;
        let score = 0;
        let targetScore = 10;
        let timeElapsed = 0;
        let timerInterval = null;
        let gameLoop = null;
        
        // Player Settings
        let currentColor = '#ff6b6b';
        let gameTitle = 'Mi Aventura';
        
        // Game Objects
        let player = {
            x: 300,
            y: 200,
            size: 30,
            color: currentColor
        };
        
        let powerUps = [];
        let powerUpCount = 0;
        
        // Color Selection
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                currentColor = this.dataset.color;
                player.color = currentColor;
            });
        });
        
        // Input Handlers
        document.getElementById('gameTitle').addEventListener('input', (e) => {
            gameTitle = e.target.value;
            document.querySelector('.title-text').textContent = `🎮 ${gameTitle} - Visual Studio Code`;
        });
        
        document.getElementById('targetScore').addEventListener('change', (e) => {
            targetScore = parseInt(e.target.value) || 10;
            document.getElementById('target').textContent = targetScore;
        });
        
        // Canvas Click Handler
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            // Check if clicked on player
            if (mouseX >= player.x - player.size/2 && 
                mouseX <= player.x + player.size/2 &&
                mouseY >= player.y - player.size/2 && 
                mouseY <= player.y + player.size/2) {
                
                score++;
                document.getElementById('score').textContent = score;
                document.getElementById('gameStatus').textContent = '🎯 Hit! +1 point';
                
                // Move player to random position
                player.x = Math.random() * (canvas.width - player.size) + player.size/2;
                player.y = Math.random() * (canvas.height - player.size) + player.size/2;
                
                // Check for victory
                if (score >= targetScore) {
                    victory();
                }
            } else {
                document.getElementById('gameStatus').textContent = '❌ Miss! Try again';
            }
        });
        
        // Power-Up Functions
        function addPowerUp() {
            if (powerUps.length < 5) {
                const newPowerUp = {
                    x: Math.random() * (canvas.width - 20) + 10,
                    y: Math.random() * (canvas.height - 20) + 10,
                    active: true,
                    type: 'speed'
                };
                powerUps.push(newPowerUp);
                powerUpCount = powerUps.length;
                document.getElementById('powerUpCount').textContent = powerUpCount + ' Active';
                document.getElementById('gameStatus').textContent = '✨ Power-up added!';
            } else {
                document.getElementById('gameStatus').textContent = '⚠️ Maximum power-ups reached!';
            }
        }
        
        function removePowerUp() {
            if (powerUps.length > 0) {
                powerUps.pop();
                powerUpCount = powerUps.length;
                document.getElementById('powerUpCount').textContent = powerUpCount + ' Active';
                document.getElementById('gameStatus').textContent = '➖ Power-up removed';
            }
        }
        
        // Drawing Functions
        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid (VS Code style)
            ctx.strokeStyle = '#3e3e42';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 30) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Draw power-ups
            powerUps.forEach(powerUp => {
                ctx.beginPath();
                ctx.arc(powerUp.x, powerUp.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Draw star effect
                ctx.font = '12px Arial';
                ctx.fillStyle = '#000';
                ctx.fillText('⚡', powerUp.x - 6, powerUp.y + 4);
            });
            
            // Draw player
            ctx.shadowColor = currentColor;
            ctx.shadowBlur = 15;
            ctx.fillStyle = currentColor;
            ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
            
            // Draw player border
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
            
            // Draw game title
            ctx.font = 'bold 14px Segoe UI';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`🎮 ${gameTitle}`, 10, 30);
            
            // Draw controls hint
            ctx.font = '12px Segoe UI';
            ctx.fillStyle = '#969696';
            ctx.fillText('Click on the colored square to score!', 10, 50);
        }
        
        // Game Control Functions
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            score = 0;
            timeElapsed = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '0s';
            document.getElementById('gameStatus').textContent = '🎮 Game started!';
            
            // Reset player position
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            
            // Start timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeElapsed++;
                document.getElementById('timer').textContent = timeElapsed + 's';
            }, 1000);
            
            // Start game loop
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                drawGame();
            }, 16); // ~60 FPS
        }
        
        function resetGame() {
            gameRunning = false;
            score = 0;
            timeElapsed = 0;
            powerUps = [];
            powerUpCount = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '0s';
            document.getElementById('powerUpCount').textContent = '0 Active';
            document.getElementById('gameStatus').textContent = '🔄 Game reset';
            
            if (timerInterval) clearInterval(timerInterval);
            if (gameLoop) clearInterval(gameLoop);
            
            // Reset player
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            
            drawGame();
        }
        
        function victory() {
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            if (gameLoop) clearInterval(gameLoop);
            
            document.getElementById('victoryMessage').textContent = 
                `¡Felicidades! Puntuación: ${score} en ${timeElapsed} segundos`;
            document.getElementById('victoryModal').style.display = 'flex';
            document.getElementById('gameStatus').textContent = '🏆 Victory!';
        }
        
        function closeVictoryModal() {
            document.getElementById('victoryModal').style.display = 'none';
            resetGame();
        }
        
        // Initialize game
        drawGame();
    </script>
</body>
</html>
