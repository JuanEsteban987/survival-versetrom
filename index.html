<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod 2D · Survivor.io style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1e2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        .game-container {
            background: #0f1219;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #2a2f3f;
            box-shadow: inset 0 0 20px #00000055, 0 10px 10px rgba(0,0,0,0.3);
            cursor: crosshair;
        }
        .panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            color: #ddd;
            font-weight: 600;
            text-shadow: 2px 2px 0 #0a0c14;
        }
        .stats {
            display: flex;
            gap: 32px;
            background: #1e2333;
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid #4a516b;
        }
        .stats span {
            color: #b7e05e;
            font-size: 1.5rem;
            margin-left: 8px;
        }
        button {
            background: #3d455e;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1b1f2b, 0 8px 12px black;
            transition: 0.07s ease;
            border: 1px solid #7f8aa8;
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #55607f;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #1b1f2b, 0 12px 18px black;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #1b1f2b, 0 8px 12px black;
        }
        .info {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .key-hint {
            background: #262d40;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #5d6988;
        }
        .key-hint kbd {
            background: #0f1219;
            color: #f7df6e;
            padding: 3px 8px;
            border-radius: 30px;
            font-weight: 900;
            margin: 0 4px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div class="panel">
        <div class="stats">
            <div>❤️ <span id="healthDisplay">100</span></div>
            <div>🎯 <span id="scoreDisplay">0</span></div>
        </div>
        <div class="info">
            <div class="key-hint">
                <kbd>WASD</kbd> mover · <kbd>🖱️</kbd> disparar · <kbd>E</kbd> caja
            </div>
            <button id="spawnBoxBtn">➕ SPAWN CAJA</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- CONFIGURACIÓN ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Mostradores
        const healthSpan = document.getElementById('healthDisplay');
        const scoreSpan = document.getElementById('scoreDisplay');

        // --- CONSTANTES DEL JUEGO ---
        const PLAYER_RADIUS = 18;
        const ENEMY_RADIUS = 16;
        const BULLET_RADIUS = 6;
        const BULLET_SPEED = 8;
        const PLAYER_SPEED = 3.8;
        const ENEMY_SPEED = 1.2;
        const SHOT_COOLDOWN = 12; // frames
        const FRICTION = 0.98;
        const BOX_WIDTH = 44;
        const BOX_HEIGHT = 44;

        // --- VARIABLES GLOBALES ---
        let player = {
            x: 400, y: 300,
            vx: 0, vy: 0,
            radius: PLAYER_RADIUS,
            health: 100,
            maxHealth: 100
        };

        let enemies = [];
        let bullets = [];
        let boxes = [];

        let score = 0;

        // Control de teclas
        const keys = {
            w: false, a: false, s: false, d: false
        };

        // Posición del ratón (para apuntar)
        let mouseX = player.x, mouseY = player.y;

        // Cadencia
        let shotTimer = 0;

        // Spawn de enemigos (oleadas)
        let enemySpawnTimer = 0;
        const ENEMY_SPAWN_RATE = 70; // frames

        // --- INICIALIZACIÓN ---
        // Añadir algunas cajas de ejemplo
        boxes.push({ x: 300, y: 200, vx: 0, vy: 0, w: BOX_WIDTH, h: BOX_HEIGHT });
        boxes.push({ x: 600, y: 400, vx: 0, vy: 0, w: BOX_WIDTH, h: BOX_HEIGHT });
        boxes.push({ x: 200, y: 500, vx: 0, vy: 0, w: BOX_WIDTH, h: BOX_HEIGHT });

        // --- EVENTOS DE TECLADO ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
            // Tecla E para spawnear caja
            if (key === 'e') {
                spawnBox();
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
        });

        // --- EVENTOS DE RATÓN (apuntar y disparar) ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) { // clic izquierdo
                e.preventDefault();
                // Disparar si el cooldown lo permite
                if (shotTimer <= 0) {
                    shootBullet();
                    shotTimer = SHOT_COOLDOWN;
                }
            }
        });

        // Evitar menú contextual con clic derecho (opcional)
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Botón spawn caja
        document.getElementById('spawnBoxBtn').addEventListener('click', spawnBox);

        // --- FUNCIONES AUXILIARES ---
        function spawnBox() {
            // Aparece cerca del jugador, pero no encima
            let offsetX = (Math.random() - 0.5) * 150;
            let offsetY = (Math.random() - 0.5) * 150;
            let x = Math.min(canvas.width - BOX_WIDTH/2, Math.max(BOX_WIDTH/2, player.x + offsetX));
            let y = Math.min(canvas.height - BOX_HEIGHT/2, Math.max(BOX_HEIGHT/2, player.y + offsetY));
            boxes.push({
                x: x, y: y,
                vx: 0, vy: 0,
                w: BOX_WIDTH, h: BOX_HEIGHT
            });
        }

        function shootBullet() {
            // Dirección hacia el ratón
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const len = Math.hypot(dx, dy);
            if (len < 0.001) return; // justo encima

            const normDx = dx / len;
            const normDy = dy / len;

            bullets.push({
                x: player.x + normDx * (PLAYER_RADIUS + BULLET_RADIUS + 2),
                y: player.y + normDy * (PLAYER_RADIUS + BULLET_RADIUS + 2),
                vx: normDx * BULLET_SPEED,
                vy: normDy * BULLET_SPEED,
                radius: BULLET_RADIUS,
                active: true
            });
        }

        function spawnEnemy() {
            // Aparece en un borde aleatorio
            let side = Math.floor(Math.random() * 4); // 0: izquierda, 1: derecha, 2: arriba, 3: abajo
            let x, y;
            const pad = 50;
            if (side === 0) { // izquierda
                x = -pad;
                y = Math.random() * canvas.height;
            } else if (side === 1) { // derecha
                x = canvas.width + pad;
                y = Math.random() * canvas.height;
            } else if (side === 2) { // arriba
                x = Math.random() * canvas.width;
                y = -pad;
            } else { // abajo
                x = Math.random() * canvas.width;
                y = canvas.height + pad;
            }
            enemies.push({
                x: x, y: y,
                vx: 0, vy: 0,
                radius: ENEMY_RADIUS,
            });
        }

        // --- COLISIONES Y FÍSICA ---

        // Detección círculo - rectángulo (centro del círculo, radio, rectángulo)
        function circleRectCollision(cx, cy, r, rect) {
            let closestX = Math.max(rect.x - rect.w/2, Math.min(cx, rect.x + rect.w/2));
            let closestY = Math.max(rect.y - rect.h/2, Math.min(cy, rect.y + rect.h/2));
            let dx = cx - closestX;
            let dy = cy - closestY;
            let dist = Math.hypot(dx, dy);
            if (dist < r) {
                // devolvemos la normal (desde el rect al círculo) y la profundidad
                if (dist === 0) {
                    // excepcional: el centro está dentro del rectángulo
                    // empujamos hacia arriba por defecto
                    return { collides: true, nx: 0, ny: -1, depth: r };
                }
                let nx = dx / dist;
                let ny = dy / dist;
                return { collides: true, nx: nx, ny: ny, depth: r - dist };
            }
            return { collides: false };
        }

        // Resolver colisión entre dos círculos (jugador-enemigo, etc.) 
        // Devuelve {collides, nx, ny, depth}
        function circleCollision(c1, r1, c2, r2) {
            let dx = c2.x - c1.x;
            let dy = c2.y - c1.y;
            let dist = Math.hypot(dx, dy);
            let minDist = r1 + r2;
            if (dist < minDist) {
                if (dist === 0) {
                    return { collides: true, nx: 1, ny: 0, depth: minDist };
                }
                let nx = dx / dist;
                let ny = dy / dist;
                return { collides: true, nx: nx, ny: ny, depth: minDist - dist };
            }
            return { collides: false };
        }

        // Aplicar rozamiento a todas las entidades con velocidad
        function applyFriction() {
            player.vx *= FRICTION;
            player.vy *= FRICTION;

            for (let b of boxes) {
                b.vx *= FRICTION;
                b.vy *= FRICTION;
            }
            // Los enemigos también tienen rozamiento (para que no se deslicen infinito)
            for (let e of enemies) {
                e.vx *= FRICTION;
                e.vy *= FRICTION;
            }
            // Las balas no tienen rozamiento (van a velocidad constante hasta impactar)
        }

        // Mover según velocidad
        function moveObjects() {
            player.x += player.vx;
            player.y += player.vy;

            for (let b of boxes) {
                b.x += b.vx;
                b.y += b.vy;
                // Mantener dentro del canvas (rebote simple)
                if (b.x - b.w/2 < 0) { b.x = b.w/2; b.vx *= -0.3; }
                if (b.x + b.w/2 > canvas.width) { b.x = canvas.width - b.w/2; b.vx *= -0.3; }
                if (b.y - b.h/2 < 0) { b.y = b.h/2; b.vy *= -0.3; }
                if (b.y + b.h/2 > canvas.height) { b.y = canvas.height - b.h/2; b.vy *= -0.3; }
            }

            for (let e of enemies) {
                e.x += e.vx;
                e.y += e.vy;
                // Mantener dentro (opcional, pero si salen mucho los traemos de vuelta)
                if (e.x - e.radius < 0) { e.x = e.radius; e.vx *= -0.3; }
                if (e.x + e.radius > canvas.width) { e.x = canvas.width - e.radius; e.vx *= -0.3; }
                if (e.y - e.radius < 0) { e.y = e.radius; e.vy *= -0.3; }
                if (e.y + e.radius > canvas.height) { e.y = canvas.height - e.radius; e.vy *= -0.3; }
            }

            for (let b of bullets) {
                b.x += b.vx;
                b.y += b.vy;
                // Eliminar si sale del canvas
                if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
                    b.active = false;
                }
            }
            // Filtrar balas inactivas
            bullets = bullets.filter(b => b.active);
        }

        // --- MANEJO DE COLISIONES (versión simplificada pero entretenida) ---
        function handleCollisions() {
            // 1. Jugador contra cajas (círculo - rect)
            for (let box of boxes) {
                let col = circleRectCollision(player.x, player.y, player.radius, box);
                if (col.collides) {
                    // Separar jugador
                    player.x += col.nx * col.depth;
                    player.y += col.ny * col.depth;
                    // Transferir velocidad (empujar caja)
                    let impulse = 0.6;
                    box.vx += col.nx * impulse * (Math.hypot(player.vx, player.vy) + 0.5);
                    box.vy += col.ny * impulse * (Math.hypot(player.vx, player.vy) + 0.5);
                    // El jugador rebota un poco
                    player.vx -= col.nx * 0.5;
                    player.vy -= col.ny * 0.5;
                }
            }

            // 2. Jugador contra enemigos (círculo - círculo)
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let col = circleCollision(player, player.radius, e, e.radius);
                if (col.collides) {
                    // Separar
                    player.x -= col.nx * col.depth * 0.6;
                    player.y -= col.ny * col.depth * 0.6;
                    e.x += col.nx * col.depth * 0.6;
                    e.y += col.ny * col.depth * 0.6;

                    // Daño al jugador (con enfriamiento implícito por frames)
                    player.health = Math.max(0, player.health - 12);
                    healthSpan.innerText = Math.floor(player.health);

                    // Empujón
                    let push = 2.5;
                    player.vx -= col.nx * push;
                    player.vy -= col.ny * push;
                    e.vx += col.nx * push * 0.7;
                    e.vy += col.ny * push * 0.7;

                    if (player.health <= 0) {
                        // Game over simple: reiniciamos (por ahora)
                        resetGame();
                        return;
                    }
                }
            }

            // 3. Balas contra enemigos
            for (let i = bullets.length - 1; i >= 0; i--) {
                let bullet = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let enemy = enemies[j];
                    let col = circleCollision(bullet, bullet.radius, enemy, enemy.radius);
                    if (col.collides) {
                        // Eliminar bala y enemigo
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 10;
                        scoreSpan.innerText = score;
                        break; // bala desaparece, salir del bucle interno
                    }
                }
            }

            // 4. Balas contra cajas
            for (let i = bullets.length - 1; i >= 0; i--) {
                let bullet = bullets[i];
                for (let j = boxes.length - 1; j >= 0; j--) {
                    let box = boxes[j];
                    let col = circleRectCollision(bullet.x, bullet.y, bullet.radius, box);
                    if (col.collides) {
                        // Empujar caja
                        let impulse = 3.0;
                        box.vx += col.nx * impulse;
                        box.vy += col.ny * impulse;
                        // Eliminar bala
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }

            // 5. (Opcional) Cajas entre sí? Las omitimos por simplicidad.
        }

        // --- COMPORTAMIENTO DE ENEMIGOS (perseguir al jugador) ---
        function updateEnemies() {
            for (let e of enemies) {
                let dx = player.x - e.x;
                let dy = player.y - e.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 0.1) {
                    let normX = dx / dist;
                    let normY = dy / dist;
                    // Acelerar hacia el jugador
                    e.vx += normX * ENEMY_SPEED * 0.15;
                    e.vy += normY * ENEMY_SPEED * 0.15;
                    // Limitar velocidad máxima
                    let sp = Math.hypot(e.vx, e.vy);
                    let maxSp = ENEMY_SPEED * 1.8;
                    if (sp > maxSp) {
                        e.vx = (e.vx / sp) * maxSp;
                        e.vy = (e.vy / sp) * maxSp;
                    }
                }
            }
        }

        // --- RESET RÁPIDO (cuando muere) ---
        function resetGame() {
            player = { x: 400, y: 300, vx: 0, vy: 0, radius: PLAYER_RADIUS, health: 100, maxHealth: 100 };
            enemies = [];
            bullets = [];
            boxes = [
                { x: 300, y: 200, vx: 0, vy: 0, w: BOX_WIDTH, h: BOX_HEIGHT },
                { x: 600, y: 400, vx: 0, vy: 0, w: BOX_WIDTH, h: BOX_HEIGHT },
                { x: 200, y: 500, vx: 0, vy: 0, w: BOX_WIDTH, h: BOX_HEIGHT }
            ];
            score = 0;
            shotTimer = 0;
            healthSpan.innerText = '100';
            scoreSpan.innerText = '0';
        }

        // --- ACTUALIZACIÓN DEL JUGADOR POR TECLAS ---
        function updatePlayerInput() {
            let moveX = 0, moveY = 0;
            if (keys.w) moveY -= 1;
            if (keys.s) moveY += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            if (moveX !== 0 || moveY !== 0) {
                let len = Math.hypot(moveX, moveY);
                moveX = moveX / len * PLAYER_SPEED;
                moveY = moveY / len * PLAYER_SPEED;
                player.vx += moveX * 0.25;
                player.vy += moveY * 0.25;
                // Limitar velocidad
                let sp = Math.hypot(player.vx, player.vy);
                let maxSp = PLAYER_SPEED * 1.2;
                if (sp > maxSp) {
                    player.vx = (player.vx / sp) * maxSp;
                    player.vy = (player.vy / sp) * maxSp;
                }
            }
        }

        // --- BUCLE PRINCIPAL ---
        function gameLoop() {
            // Disparo cooldown
            if (shotTimer > 0) shotTimer--;

            // Spawn de enemigos automático
            enemySpawnTimer--;
            if (enemySpawnTimer <= 0) {
                spawnEnemy();
                enemySpawnTimer = ENEMY_SPAWN_RATE;
            }

            // Entrada jugador
            updatePlayerInput();

            // Actualizar enemigos (IA)
            updateEnemies();

            // Aplicar rozamiento a casi todo
            applyFriction();

            // Mover según velocidades
            moveObjects();

            // Colisiones
            handleCollisions();

            // Mantener jugador dentro del canvas
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Actualizar UI de salud (por si cambió fuera de colisión)
            healthSpan.innerText = Math.floor(player.health);
            scoreSpan.innerText = score;

            // Dibujar todo
            draw();

            requestAnimationFrame(gameLoop);
        }

        // --- DIBUJADO ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar cuadrícula de fondo estilo "sandbox"
            ctx.strokeStyle = "#3f4a5e";
            ctx.lineWidth = 0.6;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.strokeStyle = "#353f52";
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.strokeStyle = "#353f52";
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Dibujar cajas (props)
            ctx.shadowColor = "#00000080";
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;
            for (let b of boxes) {
                ctx.fillStyle = "#b08968";
                ctx.strokeStyle = "#4e3e2e";
                ctx.lineWidth = 3;
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                ctx.strokeRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                // Dibujar línea de "madera"
                ctx.fillStyle = "#8b6b4d";
                ctx.fillRect(b.x - 15, b.y - 5, 30, 10);
                ctx.fillStyle = "#6d4f36";
                ctx.fillRect(b.x - 10, b.y - 15, 20, 8);
            }

            // Dibujar enemigos
            for (let e of enemies) {
                ctx.fillStyle = "#e24b4b";
                ctx.shadowColor = "#a00";
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "#510000";
                ctx.lineWidth = 3;
                ctx.stroke();
                // Ojos agresivos
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(e.x-6, e.y-4, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x+6, e.y-4, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#03101c";
                ctx.beginPath();
                ctx.arc(e.x-7, e.y-6, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x+5, e.y-6, 2, 0, Math.PI*2);
                ctx.fill();
            }

            // Dibujar balas
            for (let b of bullets) {
                ctx.fillStyle = "#fdde5b";
                ctx.shadowColor = "#fcb045";
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fill();
            }

            // Dibujar jugador
            ctx.shadowColor = "#2a9df4";
            ctx.shadowBlur = 20;
            ctx.fillStyle = "#4aa3ff";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "#0011aa";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Dirección (línea hacia el ratón)
            ctx.shadowBlur = 8;
            ctx.strokeStyle = "#e6ff73";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();

            // Ojos del jugador (miran hacia el ratón)
            let dx = mouseX - player.x;
            let dy = mouseY - player.y;
            let lookDist = Math.hypot(dx, dy);
            if (lookDist > 1) {
                let lookX = dx / lookDist;
                let lookY = dy / lookDist;
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(player.x + lookX*8 - 3, player.y + lookY*8 - 4, 4, 0, 2*Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(player.x + lookX*8 + 3, player.y + lookY*8 - 4, 4, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = "#152238";
                ctx.beginPath();
                ctx.arc(player.x + lookX*8 - 4, player.y + lookY*8 - 6, 2, 0, 2*Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(player.x + lookX*8 + 2, player.y + lookY*8 - 6, 2, 0, 2*Math.PI);
                ctx.fill();
            }

            // Barra de vida sobre el jugador
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#3b2b1e";
            ctx.fillRect(player.x-25, player.y-35, 50, 8);
            ctx.fillStyle = "#e04444";
            let healthPercent = player.health / player.maxHealth;
            ctx.fillRect(player.x-25, player.y-35, 50 * healthPercent, 8);

            // Reiniciar sombra
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";
        }

        // Arrancar el bucle
        resetGame(); // Asegurar valores iniciales
        gameLoop();
    })();
</script>
