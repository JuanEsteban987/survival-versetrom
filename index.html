<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod 2008 · Sandbox P2P (single/multi)</title>
    <style>
        /* Exactamente mismo estilo retro, solo añado algunos retoques */
        body { margin:0; overflow:hidden; font-family:'Arial',sans-serif; background:#0a3f5e; }
        #info-panel {
            position:absolute; top:10px; left:10px; right:10px;
            background:linear-gradient(180deg,#e8f4ff 0%,#c0dcf0 100%);
            border:3px solid #2a6f8f; border-radius:15px; padding:12px 20px;
            box-shadow:0 0 0 2px #c0d4e6, inset 0 0 10px #7ab3c9;
            color:#003366; z-index:100; display:flex; flex-wrap:wrap; gap:15px;
            align-items:center; font-size:14px; border-bottom:4px solid #2f6f9f;
            text-shadow:1px 1px 0 white;
        }
        #info-panel fieldset {
            border:2px solid #2a6f8f; border-radius:8px; padding:5px 12px;
            background:#d7e9ff; box-shadow:inset 1px 1px 3px #9bb7d4, 2px 2px 0 #1a4b6b;
        }
        #info-panel legend {
            background:#f4c542; padding:2px 12px; border-radius:20px;
            border:2px solid #b57c1a; font-weight:bold; color:#1e2f3f;
            box-shadow:1px 1px 0 white;
        }
        #info-panel button {
            background:linear-gradient(180deg,#f0f9ff,#b0d4f0);
            border:3px solid #3a7ca5; border-radius:30px; color:#002856;
            font-weight:bold; padding:8px 20px; cursor:pointer;
            box-shadow:2px 2px 0 #1a4b6b, inset -1px -1px 0 #6b9ec0;
            margin:2px; transition:0.1s;
        }
        #info-panel button:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #1a4b6b; }
        #info-panel input {
            background:#fcf9e8; border:3px inset #9bb7d4; border-radius:20px;
            padding:6px 15px; color:#003366; box-shadow:2px 2px 0 #1a4b6b;
        }
        #peer-id-label {
            background:#1e4f6e; color:white; padding:6px 18px; border-radius:30px;
            font-weight:bold; text-shadow:2px 2px 0 #0a2a3a;
            border:2px solid #ffcc66; box-shadow:inset 0 -2px 0 #0b3142;
            font-size:1.2rem;
        }
        #chat-panel {
            position:absolute; bottom:20px; right:20px; width:300px;
            background:rgba(220,240,255,0.95); border:4px solid #2a6f8f;
            border-radius:20px; padding:8px; box-shadow:5px 5px 0 #0b3550;
            z-index:200; font-family:'Comic Sans MS', 'Arial', sans-serif;
        }
        #chat-header {
            background:linear-gradient(90deg,#f6b83e,#fada5e); padding:5px;
            border-radius:15px 15px 5px 5px; border:2px solid #b37b2e;
            font-weight:bold; text-align:center; margin-bottom:5px;
        }
        #chat-messages {
            height:150px; overflow-y:auto; background:#f0f7ff;
            border:3px inset #9bb7d4; border-radius:12px; padding:8px;
            font-size:13px; color:#001c3d; margin-bottom:8px;
        }
        .chat-msg { border-bottom:1px solid #8fb0cf; padding:4px; }
        .chat-user { color:#a63c06; font-weight:bold; }
        #chat-input-area { display:flex; gap:5px; }
        #chat-input { flex:1; border:3px inset #9bb7d4; border-radius:30px; padding:8px; background:white; }
        #chat-send { background:#f4c542; border:3px solid #b57c1a; border-radius:30px; font-weight:bold; padding:8px 15px; cursor:pointer; box-shadow:2px 2px 0 #7b4f0e; }
        #chat-send:active { transform:translate(2px,2px); box-shadow:none; }
        #version-badge {
            position:absolute; top:80px; left:20px; background:gold;
            border:3px solid darkgoldenrod; padding:4px 15px; transform:rotate(-5deg);
            font-weight:bold; font-size:1.2rem; box-shadow:4px 4px 0 #7f5f1f; z-index:300;
        }
        #controls-note {
            position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.5);
            color:#0f0; padding:10px; border-radius:10px; font-family:'Courier New', monospace;
            border:2px solid #0f0; z-index:150;
        }
    </style>
</head>
<body>
    <div id="version-badge">⌨️ GMod 2008 · P2P + Single</div>
    <div id="info-panel">
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="background:#003c5e; color:white; padding:6px 18px; border-radius:40px; border:2px solid #fc6;">🆔 Tu ID:</span>
            <span id="peer-id-label">iniciando...</span>
        </div>
        <fieldset>
            <legend>🔗 Multijugador P2P</legend>
            <input type="text" id="remote-peer-input" placeholder="ID del otro jugador">
            <button id="connect-btn">Conectar</button>
            <button id="disconnect-btn">Desconectar</button>
            <span id="peer-status" style="margin-left:10px; font-weight:bold;">⚪ Solo</span>
        </fieldset>
        <fieldset>
            <legend>📦 Spawnear</legend>
            <button id="spawn-cube">🧊 Cubo</button>
            <button id="spawn-sphere">⚽ Esfera</button>
        </fieldset>
    </div>

    <div id="chat-panel">
        <div id="chat-header">💬 Chat 2008 (solo con amigos)</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Escribe...">
            <button id="chat-send">Enviar</button>
        </div>
    </div>

    <div id="controls-note">
        ↑↓←→ mover cámara | Click + arrastrar mirar | R: reset view
    </div>

    <!-- Contenedor three.js -->
    <div id="canvas-container" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        (function() {
            // --- Configuración básica ---
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xaaccff); // cielo

            // Cámara con controles simples (Orbit como GMod)
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 8, 15);
            camera.lookAt(0, 2, 0);

            // Render
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Luces
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -15;
            dirLight.shadow.camera.right = 15;
            dirLight.shadow.camera.top = 15;
            dirLight.shadow.camera.bottom = -15;
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x4466aa, 0.5);
            backLight.position.set(-5, 10, 10);
            scene.add(backLight);

            // Suelo visual
            const gridHelper = new THREE.GridHelper(40, 20, 0xcccccc, 0x555555);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a6b8f, roughness: 0.7, metalness: 0.1 });
            const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
            groundPlane.rotation.x = -Math.PI/2;
            groundPlane.position.y = -0.01;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);

            // --- Mundo físico Cannon ---
            const world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.SAPBroadphase(world);
            world.defaultContactMaterial.restitution = 0.2;

            // Suelo físico
            const groundBody = new CANNON.Body({ mass: 0, material: new CANNON.Material('ground') });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(groundBody);

            // Material de props
            const propMaterial = new CANNON.Material('prop');
            const contactMaterial = new CANNON.ContactMaterial(propMaterial, groundBody.material, {
                friction: 0.4,
                restitution: 0.3
            });
            world.addContactMaterial(contactMaterial);

            // --- Almacén de objetos ---
            const objects = new Map(); // id -> { mesh, body, isOwner, shape, ownerPeer }

            // --- Variables de control de cámara (Orbit simple) ---
            let cameraAngleX = 0.5; // horizontal
            let cameraAngleY = 0.3;  // vertical
            const cameraDistance = 20;
            let mouseDown = false;
            let lastMouseX = 0, lastMouseY = 0;

            container.addEventListener('mousedown', (e) => { mouseDown = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
            window.addEventListener('mouseup', () => { mouseDown = false; });
            window.addEventListener('mousemove', (e) => {
                if (!mouseDown) return;
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                cameraAngleX += dx * 0.005;
                cameraAngleY += dy * 0.005;
                // límite vertical para no invertirse
                cameraAngleY = Math.max(0.1, Math.min(Math.PI/2 - 0.1, cameraAngleY));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            });
            // Teclas para mover (WASD y flechas) - mover la posición objetivo? Mejor mover el ángulo o desplazar? Lo simplifico con teclas: flechas izquierda/derecha rotan, arriba/abajo acercan/alejan?
            window.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowLeft': cameraAngleX -= 0.1; break;
                    case 'ArrowRight': cameraAngleX += 0.1; break;
                    case 'ArrowUp': cameraDistance = Math.max(5, cameraDistance - 1); break;
                    case 'ArrowDown': cameraDistance = Math.min(30, cameraDistance + 1); break;
                    case 'r': case 'R': cameraAngleX = 0.5; cameraAngleY = 0.3; cameraDistance = 20; break;
                }
            });

            // --- PeerJS y conexión ---
            let peer = null;
            let conn = null;
            let myPeerId = 'sin ID';
            const localMessages = [];

            // Elementos UI
            const peerDisplay = document.getElementById('peer-id-label');
            const peerStatus = document.getElementById('peer-status');
            const remotePeerInput = document.getElementById('remote-peer-input');
            const connectBtn = document.getElementById('connect-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');
            const spawnCubeBtn = document.getElementById('spawn-cube');
            const spawnSphereBtn = document.getElementById('spawn-sphere');
            const chatMessagesDiv = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const chatSend = document.getElementById('chat-send');

            // Inicializar Peer (solo una vez)
            function initPeer() {
                peer = new Peer(); // usa servidor público
                peer.on('open', (id) => {
                    myPeerId = id;
                    peerDisplay.innerText = id;
                    addChatMessage('Sistema', `Tu ID: ${id}`, '#006400');
                });

                peer.on('connection', (connection) => {
                    if (conn) {
                        // Si ya hay una conexión, rechazar o cerrar la anterior
                        connection.close();
                        return;
                    }
                    conn = connection;
                    setupConnection(conn);
                });

                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    addChatMessage('Sistema', 'Error PeerJS: ' + err.type, '#aa0000');
                });
            }

            function setupConnection(connection) {
                conn = connection;
                peerStatus.innerText = '🟢 Conectado a ' + conn.peer.substr(0,8) + '...';
                peerStatus.style.color = '#00aa00';

                conn.on('data', (data) => {
                    handleMessage(data);
                });

                conn.on('close', () => {
                    peerStatus.innerText = '⚪ Solo';
                    peerStatus.style.color = '#000';
                    conn = null;
                    addChatMessage('Sistema', 'Desconectado', '#aa0000');
                });

                conn.on('error', (err) => {
                    console.warn('Connection error:', err);
                });

                // Al conectar, enviar lista de objetos propios
                const myObjects = [];
                objects.forEach((obj, id) => {
                    if (obj.isOwner) {
                        myObjects.push({
                            id, shape: obj.shape,
                            pos: [obj.body.position.x, obj.body.position.y, obj.body.position.z],
                            quat: [obj.body.quaternion.x, obj.body.quaternion.y, obj.body.quaternion.z, obj.body.quaternion.w],
                            owner: myPeerId
                        });
                    }
                });
                if (myObjects.length > 0) {
                    conn.send({ type: 'sync', objects: myObjects });
                }
                addChatMessage('Sistema', 'Conectado. Enviando objetos...', '#006400');
            }

            function handleMessage(data) {
                if (!data || !data.type) return;
                switch(data.type) {
                    case 'spawn':
                        createRemoteObject(data.id, data.shape, data.pos, data.quat, data.owner);
                        addChatMessage('Sistema', `${data.owner.substr(0,6)} spawneó ${data.shape}`, '#333399');
                        break;
                    case 'update':
                        updateRemoteObject(data.id, data.pos, data.quat);
                        break;
                    case 'remove':
                        removeObject(data.id);
                        break;
                    case 'chat':
                        addChatMessage(data.sender || 'Desconocido', data.message, '#aa3300');
                        break;
                    case 'sync':
                        if (data.objects) {
                            data.objects.forEach(obj => {
                                if (!objects.has(obj.id) && obj.owner !== myPeerId) {
                                    createRemoteObject(obj.id, obj.shape, obj.pos, obj.quat, obj.owner);
                                }
                            });
                        }
                        break;
                    default: break;
                }
            }

            function createRemoteObject(id, shape, pos, quat, ownerPeer) {
                if (objects.has(id)) return;
                let geometry, radius;
                if (shape === 'cube') {
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                } else {
                    geometry = new THREE.SphereGeometry(0.6, 24, 16);
                }
                const material = new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0x221100 }); // naranja remoto
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.set(pos[0], pos[1], pos[2]);
                mesh.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                scene.add(mesh);

                // Cuerpo kinemático
                const body = new CANNON.Body({ mass: 0, material: propMaterial, type: CANNON.Body.KINEMATIC });
                if (shape === 'cube') {
                    body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
                } else {
                    body.addShape(new CANNON.Sphere(0.6));
                }
                body.position.set(pos[0], pos[1], pos[2]);
                body.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                world.addBody(body);

                objects.set(id, { mesh, body, isOwner: false, shape, ownerPeer });
            }

            function updateRemoteObject(id, pos, quat) {
                const obj = objects.get(id);
                if (!obj || obj.isOwner) return;
                obj.body.position.set(pos[0], pos[1], pos[2]);
                obj.body.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
            }

            function createLocalObject(shape) {
                const id = myPeerId + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                const pos = new CANNON.Vec3( (Math.random()-0.5)*6, 5, (Math.random()-0.5)*6 );
                const quat = new CANNON.Quaternion();

                let geometry, mesh;
                const color = 0x44aaff; // azul local
                if (shape === 'cube') {
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                } else {
                    geometry = new THREE.SphereGeometry(0.6, 24, 16);
                }
                const material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x113355 });
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.copy(pos);
                scene.add(mesh);

                const body = new CANNON.Body({ mass: 1, material: propMaterial });
                if (shape === 'cube') {
                    body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
                } else {
                    body.addShape(new CANNON.Sphere(0.6));
                }
                body.position.copy(pos);
                body.quaternion.copy(quat);
                world.addBody(body);

                objects.set(id, { mesh, body, isOwner: true, shape, ownerPeer: myPeerId });

                if (conn) {
                    conn.send({
                        type: 'spawn',
                        id, shape,
                        pos: [pos.x, pos.y, pos.z],
                        quat: [quat.x, quat.y, quat.z, quat.w],
                        owner: myPeerId
                    });
                }
            }

            function removeObject(id) {
                const obj = objects.get(id);
                if (!obj) return;
                scene.remove(obj.mesh);
                world.removeBody(obj.body);
                objects.delete(id);
            }

            // --- Sincronización periódica (solo objetos propios) ---
            setInterval(() => {
                if (!conn) return;
                objects.forEach((obj, id) => {
                    if (obj.isOwner) {
                        const p = obj.body.position;
                        const q = obj.body.quaternion;
                        conn.send({
                            type: 'update',
                            id: id,
                            pos: [p.x, p.y, p.z],
                            quat: [q.x, q.y, q.z, q.w]
                        });
                    }
                });
            }, 100); // 10 fps aprox

            // --- Chat ---
            function addChatMessage(sender, text, color = '#000') {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg';
                msgDiv.innerHTML = `<span class="chat-user" style="color:${color}">${sender}:</span> ${text}`;
                chatMessagesDiv.appendChild(msgDiv);
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            }

            chatSend.addEventListener('click', () => {
                const msg = chatInput.value.trim();
                if (!msg) return;
                if (!conn) {
                    addChatMessage('Sistema', 'No hay conexión P2P', '#aa0000');
                    chatInput.value = '';
                    return;
                }
                conn.send({ type: 'chat', message: msg, sender: myPeerId.substr(0,6) });
                addChatMessage('Tú', msg, '#003399');
                chatInput.value = '';
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') chatSend.click();
            });

            // --- UI Eventos ---
            connectBtn.addEventListener('click', () => {
                const remoteId = remotePeerInput.value.trim();
                if (!remoteId) { alert('Introduce un ID'); return; }
                if (!peer) initPeer();
                // Esperar un poco si peer no está listo
                if (!myPeerId || myPeerId === 'sin ID') {
                    setTimeout(() => connectBtn.click(), 500);
                    return;
                }
                if (conn) {
                    alert('Ya tienes una conexión activa. Desconecta primero.');
                    return;
                }
                conn = peer.connect(remoteId);
                if (conn) {
                    setupConnection(conn);
                } else {
                    alert('No se pudo conectar. ID inválido?');
                }
            });

            disconnectBtn.addEventListener('click', () => {
                if (conn) conn.close();
            });

            spawnCubeBtn.addEventListener('click', () => createLocalObject('cube'));
            spawnSphereBtn.addEventListener('click', () => createLocalObject('sphere'));

            // --- Animación y física ---
            function animate() {
                requestAnimationFrame(animate);

                // Física
                world.step(1/60);

                // Sincronizar meshes con bodies
                objects.forEach((obj) => {
                    obj.mesh.position.copy(obj.body.position);
                    obj.mesh.quaternion.copy(obj.body.quaternion);
                });

                // Actualizar cámara según ángulos (Orbit alrededor de centro (0,2,0))
                const target = new THREE.Vector3(0, 2, 0);
                const offset = new THREE.Vector3(
                    cameraDistance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY),
                    cameraDistance * Math.sin(cameraAngleY),
                    cameraDistance * Math.cos(cameraAngleX) * Math.cos(cameraAngleY)
                );
                camera.position.copy(target.clone().add(offset));
                camera.lookAt(target);

                renderer.render(scene, camera);
            }

            animate();

            // Inicializar todo
            initPeer();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Mensaje de bienvenida
            setTimeout(() => {
                addChatMessage('GMod 2008', 'Modo Singleplayer siempre activo. Conéctate a un amigo para multijugador.', '#990099');
            }, 1000);

            // Limpieza (opcional)
        })();
    </script>
</body>
</html>
