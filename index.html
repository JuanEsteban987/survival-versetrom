<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod P2P Lite</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #controls input, #controls button {
            padding: 5px;
            font-size: 14px;
        }
        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>GMod P2P Lite</h3>
        <p>Haz clic en cualquier lugar para crear un cubo.</p>
        <p>Conéctate con amigos usando el mismo ID de sala (anfitrión).</p>
    </div>
    <div id="controls">
        <input type="text" id="roomIdInput" placeholder="ID de sala" />
        <button id="createBtn">Crear sala</button>
        <button id="joinBtn">Unirse a sala</button>
        <button id="disconnectBtn" disabled>Desconectar</button>
    </div>
    <div id="status">Desconectado</div>

    <!-- Importar librerías -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon-es/0.20.0/cannon-es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.2/dist/peerjs.min.js"></script>

    <script>
        // --- Configuración básica Three.js ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Sombras para más realismo
        document.body.appendChild(renderer.domElement);

        // Luces
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 10;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);

        // --- Configuración Cannon.js ---
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.defaultContactMaterial.restitution = 0.3;

        // Material del suelo y cubos
        const groundMaterial = new CANNON.Material("groundMaterial");
        const cubeMaterial = new CANNON.Material("cubeMaterial");
        const contactMaterial = new CANNON.ContactMaterial(groundMaterial, cubeMaterial, {
            friction: 0.5,
            restitution: 0.4
        });
        world.addContactMaterial(contactMaterial);

        // Suelo (cuerpo estático)
        const groundShape = new CANNON.Plane();
        const groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
        groundBody.addShape(groundShape);
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
        world.addBody(groundBody);

        // Malla del suelo (visual)
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x336633, side: THREE.DoubleSide });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI/2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        // Ejes de referencia (opcional)
        // scene.add(new THREE.AxesHelper(5));

        // --- Variables de red y estado ---
        let peer = null;
        let connections = []; // Conexiones activas (solo útil para el anfitrión)
        let isHost = false;
        let roomId = null;
        let myPeerId = null;

        // Lista de cubos: cada cubo tiene { mesh, body, id }
        let cubes = [];
        let nextCubeId = 0;

        // Elementos UI
        const statusDiv = document.getElementById('status');
        const roomIdInput = document.getElementById('roomIdInput');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        // --- Funciones auxiliares ---
        function updateStatus(text, isError = false) {
            statusDiv.textContent = text;
            statusDiv.style.color = isError ? '#f00' : '#0f0';
        }

        function generateColor() {
            return new THREE.Color(Math.random() * 0xffffff);
        }

        // Crear un cubo (física y visual) en una posición dada, con un color aleatorio y un ID único
        function createCube(posX, posY, posZ, colorHex = null, id = null) {
            const size = 0.5;
            // Cuerpo físico
            const shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
            const body = new CANNON.Body({ mass: 1, material: cubeMaterial });
            body.addShape(shape);
            body.position.set(posX, posY, posZ);
            world.addBody(body);

            // Malla visual
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({ color: colorHex !== null ? colorHex : generateColor() });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.copy(body.position);
            scene.add(mesh);

            const cubeId = id !== null ? id : nextCubeId++;
            cubes.push({ mesh, body, id: cubeId });

            return cubeId;
        }

        // Eliminar todos los cubos (para reiniciar al unirse)
        function clearCubes() {
            cubes.forEach(cube => {
                world.removeBody(cube.body);
                scene.remove(cube.mesh);
            });
            cubes = [];
            nextCubeId = 0;
        }

        // Enviar un mensaje a todos los peers conectados (si soy el host)
        function broadcastToPeers(message) {
            connections.forEach(conn => {
                if (conn.open) {
                    conn.send(message);
                }
            });
        }

        // --- Inicialización de PeerJS ---
        function initPeer() {
            return new Promise((resolve, reject) => {
                const newPeer = new Peer();
                newPeer.on('open', (id) => {
                    myPeerId = id;
                    updateStatus(`Conectado al servidor PeerJS. Tu ID: ${id}`);
                    resolve(newPeer);
                });
                newPeer.on('error', (err) => {
                    console.error('Peer error:', err);
                    updateStatus('Error de conexión con PeerJS', true);
                    reject(err);
                });
            });
        }

        // --- Configuración como host ---
        async function setupHost() {
            if (!peer) peer = await initPeer();
            isHost = true;
            roomId = myPeerId;
            roomIdInput.value = roomId;
            updateStatus(`Eres el anfitrión. Sala: ${roomId}. Esperando jugadores...`);

            peer.on('connection', (conn) => {
                updateStatus(`Nuevo jugador conectado: ${conn.peer}`);
                connections.push(conn);

                // Al recibir un mensaje del cliente
                conn.on('data', (data) => {
                    handleMessage(data, conn);
                });

                conn.on('close', () => {
                    updateStatus(`Jugador ${conn.peer} desconectado`);
                    connections = connections.filter(c => c.peer !== conn.peer);
                });

                // Enviar estado actual al nuevo cliente (todos los cubos existentes)
                const cubesData = cubes.map(c => ({
                    id: c.id,
                    x: c.body.position.x,
                    y: c.body.position.y,
                    z: c.body.position.z,
                    color: c.mesh.material.color.getHex()
                }));
                conn.send({ type: 'init', cubes: cubesData });
            });

            disconnectBtn.disabled = false;
            createBtn.disabled = true;
            joinBtn.disabled = true;
        }

        // --- Unirse a una sala (como cliente) ---
        async function joinRoom(hostId) {
            if (!peer) peer = await initPeer();
            isHost = false;
            roomId = hostId;
            updateStatus(`Conectando a la sala ${hostId}...`);

            const conn = peer.connect(hostId);
            conn.on('open', () => {
                updateStatus(`Conectado al anfitrión ${hostId}`);
                connections = [conn]; // Solo guardamos la conexión con el host

                conn.on('data', (data) => {
                    handleMessage(data, conn);
                });

                conn.on('close', () => {
                    updateStatus('Desconectado del anfitrión');
                    connections = [];
                });
            });

            conn.on('error', (err) => {
                console.error('Connection error:', err);
                updateStatus('Error al conectar con el anfitrión', true);
            });

            disconnectBtn.disabled = false;
            createBtn.disabled = true;
            joinBtn.disabled = true;
        }

        // --- Manejo de mensajes entrantes ---
        function handleMessage(data, conn) {
            if (data.type === 'init') {
                // Inicialización: recibimos la lista actual de cubos
                clearCubes();
                data.cubes.forEach(cubeData => {
                    createCube(cubeData.x, cubeData.y, cubeData.z, cubeData.color, cubeData.id);
                });
                // Actualizar nextCubeId para no repetir IDs
                const maxId = data.cubes.reduce((max, c) => Math.max(max, c.id), -1);
                nextCubeId = maxId + 1;
            }
            else if (data.type === 'newCube') {
                // Un nuevo cubo creado por otro peer
                createCube(data.x, data.y, data.z, data.color, data.id);
                // Actualizar nextCubeId
                if (data.id >= nextCubeId) nextCubeId = data.id + 1;
            }
            else if (data.type === 'syncCubes') {
                // Podríamos implementar sincronización periódica, pero por simplicidad no lo hacemos
            }
        }

        // --- Desconectar ---
        function disconnect() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            connections.forEach(conn => conn.close());
            connections = [];
            isHost = false;
            roomId = null;
            clearCubes();
            updateStatus('Desconectado');
            disconnectBtn.disabled = true;
            createBtn.disabled = false;
            joinBtn.disabled = false;
        }

        // --- Eventos de UI ---
        createBtn.addEventListener('click', setupHost);
        joinBtn.addEventListener('click', () => {
            const hostId = roomIdInput.value.trim();
            if (hostId) joinRoom(hostId);
            else alert('Introduce un ID de sala válido');
        });
        disconnectBtn.addEventListener('click', disconnect);

        // --- Crear cubo al hacer clic ---
        window.addEventListener('click', (event) => {
            // Ignorar clics en la UI
            if (event.target.closest('#controls')) return;

            if (!peer) {
                alert('Conéctate a una sala primero');
                return;
            }

            // Posición aleatoria cerca del centro
            const x = (Math.random() - 0.5) * 4;
            const z = (Math.random() - 0.5) * 4;
            const y = 3; // altura inicial

            const color = generateColor().getHex();
            const id = nextCubeId; // El ID se asigna localmente, pero al enviar al host se usará el mismo

            // Crear localmente
            createCube(x, y, z, color, id);

            // Enviar a los demás
            const msg = {
                type: 'newCube',
                x, y, z,
                color: color,
                id: id
            };

            if (isHost) {
                // Soy el host: envío a todos los clientes excepto a mí mismo (ya lo creé)
                broadcastToPeers(msg);
            } else {
                // Soy cliente: envío al host
                if (connections.length > 0 && connections[0].open) {
                    connections[0].send(msg);
                }
            }
        });

        // --- Bucle de animación ---
        function animate() {
            requestAnimationFrame(animate);

            // Actualizar física (paso fijo)
            world.step(1/60);

            // Sincronizar mallas con cuerpos físicos
            cubes.forEach(cube => {
                cube.mesh.position.copy(cube.body.position);
                cube.mesh.quaternion.copy(cube.body.quaternion);
            });

            renderer.render(scene, camera);
        }
        animate();

        // --- Ajuste de cámara y resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Control de cámara simple con teclas (opcional)
        const keyState = {};
        window.addEventListener('keydown', (e) => keyState[e.code] = true);
        window.addEventListener('keyup', (e) => keyState[e.code] = false);
        function cameraControl() {
            const speed = 0.1;
            if (keyState['KeyW']) camera.position.z -= speed;
            if (keyState['KeyS']) camera.position.z += speed;
            if (keyState['KeyA']) camera.position.x -= speed;
            if (keyState['KeyD']) camera.position.x += speed;
            if (keyState['KeyQ']) camera.position.y += speed;
            if (keyState['KeyE']) camera.position.y -= speed;
            camera.lookAt(0, 1, 0);
            requestAnimationFrame(cameraControl);
        }
        cameraControl(); // Iniciar control de cámara
    </script>
</body>
</html>
