<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 VISUAL NODE 2008 · edición extremo</title>
    <style>
        /* ESTÉTICA 2008 VIEJÍSIMA: brillos, reflejos, burbujas, gradientes extremos */
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0a4c7a;  /* color base */
            /* Rayos de sol típicos de fondos 2008 */
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 255, 220, 0.8) 0%, rgba(200, 230, 255, 0.4) 40%, transparent 70%),
                              radial-gradient(circle at 80% 70%, rgba(255, 250, 180, 0.7) 0%, rgba(180, 220, 255, 0.3) 50%, transparent 70%),
                              linear-gradient(125deg, #2779b0 0%, #6ab0e0 100%);
            font-family: 'Segoe UI', 'Trebuchet MS', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: auto;
        }

        /* burbujas flotantes (muy 2008) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.3) 5%, transparent 15%),
                        radial-gradient(circle at 95% 80%, rgba(255,255,255,0.25) 8%, transparent 20%),
                        radial-gradient(circle at 40% 60%, rgba(255,255,255,0.2) 10%, transparent 25%),
                        radial-gradient(circle at 70% 15%, rgba(255,255,240,0.35) 7%, transparent 18%);
            pointer-events: none;
            z-index: 1;
        }

        .main-window {
            width: 1450px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 0 0 2px rgba(255,255,255,0.8), inset 0 0 30px rgba(255,255,240,0.7);
            border: 1px solid rgba(255,255,255,0.9);
            padding: 30px;
            position: relative;
            z-index: 10;
        }

        /* Cabecera super-glossy */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(175deg, 
                rgba(255,255,255,0.95) 0%, 
                rgba(230, 250, 255, 0.9) 40%,
                rgba(180, 220, 250, 0.8) 70%,
                rgba(130, 190, 240, 0.7) 100%);
            border-radius: 90px 90px 50px 50px;
            padding: 20px 50px;
            margin-bottom: 40px;
            border: 3px solid white;
            box-shadow: 0 15px 20px #00263b, inset 0 4px 15px white;
            position: relative;
            overflow: hidden;
        }
        /* reflejo extra en la cabecera */
        .header::after {
            content: '';
            position: absolute;
            top: 0; left: -20%;
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }
        @keyframes shine {
            0% { left: -20%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 600;
            color: #002c4b;
            text-shadow: 0 3px 0 white, 0 5px 15px #c0e4ff, 2px 5px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .header h1 span {
            background: rgba(255,255,255,0.9);
            padding: 12px 35px;
            border-radius: 100px;
            font-size: 2.2rem;
            border: 3px solid white;
            box-shadow: inset 0 -5px 0 #7fadcc, 0 8px 15px #001e33;
            backdrop-filter: blur(2px);
        }

        .toolbar {
            display: flex;
            gap: 25px;
        }

        .btn {
            background: linear-gradient(180deg, #f4fcff, #b3d9f5);
            border: none;
            border-radius: 100px;
            padding: 15px 45px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #003459;
            text-shadow: 0 2px 3px white;
            box-shadow: 0 12px 0 #5480a0, 0 15px 25px #001a2b, inset 0 3px 10px white;
            cursor: pointer;
            transition: all 0.07s;
            border: 2px solid white;
            letter-spacing: 1px;
            position: relative;
        }

        .btn:active {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #5480a0, 0 12px 20px #001a2b, inset 0 2px 8px white;
        }

        .btn.play {
            background: linear-gradient(180deg, #dafac8, #7fc96b);
            box-shadow: 0 12px 0 #3f7335, 0 15px 25px #1e4020, inset 0 3px 10px #e9ffe0;
            color: #113d13;
        }

        .btn.stop {
            background: linear-gradient(180deg, #ffdbd0, #f78b73);
            box-shadow: 0 12px 0 #ad4f3e, 0 15px 25px #4f2b1f, inset 0 3px 10px #fff0ea;
            color: #631f1f;
        }

        /* Workspace */
        .workspace {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Panel del juego */
        .game-panel {
            flex: 1 1 480px;
            background: linear-gradient(145deg, #e2f2ff, #aac9ed);
            border-radius: 70px;
            padding: 25px;
            box-shadow: inset 0 -8px 12px white, inset 0 8px 20px #8eb6db, 0 30px 40px #002d49;
            border: 4px solid white;
            position: relative;
            overflow: hidden;
        }
        .game-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.6) 0%, transparent 60%);
            pointer-events: none;
            border-radius: 70px;
        }

        .game-panel h2 {
            color: #00263b;
            text-shadow: 0 3px 8px white;
            font-size: 2.3rem;
            padding-left: 25px;
            margin: 5px 0 15px;
            position: relative;
            z-index: 2;
        }

        canvas#gameCanvas {
            width: 100%;
            aspect-ratio: 6/4;
            border-radius: 55px;
            background: linear-gradient(180deg, #b3e4ff, #6eb3dc, #b8e09f);
            box-shadow: inset 0 -10px 15px #10547a, 0 0 0 5px white, 0 25px 40px black;
            display: block;
            position: relative;
            z-index: 3;
        }

        .score {
            margin-top: 25px;
            background: rgba(255,255,255,0.6);
            border-radius: 100px;
            padding: 15px 40px;
            font-size: 2.6rem;
            display: inline-block;
            color: #002845;
            font-weight: bold;
            backdrop-filter: blur(8px);
            border: 4px solid white;
            box-shadow: inset 0 -6px 0 #9bbde0, 0 12px 20px #0c314a;
            text-shadow: 0 2px 5px white;
        }

        /* Panel de nodos */
        .node-editor {
            flex: 2 1 750px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 25px;
            box-shadow: inset 0 0 60px white, 0 30px 45px #002e4b, 0 0 0 3px rgba(255,255,255,0.8);
            border: 3px solid white;
        }

        .node-editor h2 {
            color: #002d4e;
            text-shadow: 0 3px 8px white;
            font-size: 2.3rem;
            margin: 0 0 20px 30px;
        }

        #nodeCanvas {
            width: 100%;
            height: 550px;
            border-radius: 60px;
            background: #e5f2ff;
            box-shadow: inset 0 0 0 4px white, 0 15px 35px #00263f;
            cursor: crosshair;
        }

        .legend {
            display: flex;
            gap: 40px;
            margin-top: 25px;
            color: #003968;
            font-weight: bold;
            text-shadow: 0 2px 6px white;
            font-size: 1.4rem;
            background: rgba(255,255,255,0.3);
            padding: 15px 30px;
            border-radius: 90px;
            backdrop-filter: blur(5px);
            border: 2px solid white;
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="main-window">
    <div class="header">
        <h1>
            🧊 NODE FORGE 2008
            <span>visual script</span>
        </h1>
        <div class="toolbar">
            <button class="btn play" id="runBtn">▶ EJECUTAR</button>
            <button class="btn stop" id="stopBtn">⏹️ PARAR</button>
        </div>
    </div>

    <div class="workspace">
        <div class="game-panel">
            <h2>🎾 ZONA DE JUEGO</h2>
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="score" id="scoreDisplay">🏆 0</div>
        </div>

        <div class="node-editor">
            <h2>🔌 CONECTA NODOS (arrastra conexiones)</h2>
            <canvas id="nodeCanvas" width="750" height="550"></canvas>
            <div class="legend">
                <span><span style="background:#8cc88c; width:20px;height:20px;border-radius:10px;box-shadow:0 0 0 2px white;"></span> Eventos (verde)</span>
                <span><span style="background:#66aaff; width:20px;height:20px;border-radius:10px;box-shadow:0 0 0 2px white;"></span> Acciones (azul)</span>
                <span>⚪ Pines: entrada / salida</span>
                <span>✏️ Click y arrastra para conectar</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // -------------------- JUEGO --------------------
        const gameCanvas = document.getElementById('gameCanvas');
        const ctx = gameCanvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        let player = { x: 280, y: 300, vx: 0, vy: 0, w: 20, h: 20 };
        let coin = { x: 150, y: 150, r: 12 };
        let score = 0;
        const GROUND = 380;
        const GRAVITY = 0.5;
        const FRICTION = 0.88;
        const MOVE_FORCE = 2.2;
        const JUMP_FORCE = -10;

        let gameRunning = false;
        let animFrame = null;

        const keys = {};

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === ' ' || k === 'arrowleft' || k === 'arrowright' || k === 'arrowup' || k === 'a' || k === 'd') {
                e.preventDefault();
            }
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function resetGame() {
            player = { x: 280, y: 300, vx: 0, vy: 0, w: 20, h: 20 };
            coin = { x: 150, y: 150, r: 12 };
            score = 0;
            updateScore();
        }

        function updateScore() {
            scoreSpan.innerText = `🏆 ${score}`;
        }

        function drawGame() {
            ctx.clearRect(0, 0, 600, 400);
            const grad = ctx.createLinearGradient(0, 0, 0, 400);
            grad.addColorStop(0, '#b9e3ff');
            grad.addColorStop(0.7, '#9ac5e0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 600, 400);
            // nubes glossy
            ctx.shadowColor = 'white';
            ctx.shadowBlur = 30;
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(110, 60, 40, 0, 2*Math.PI);
            ctx.arc(160, 40, 45, 0, 2*Math.PI);
            ctx.arc(450, 90, 50, 0, 2*Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            // suelo
            ctx.fillStyle = '#78b13e';
            ctx.fillRect(0, GROUND, 600, 20);
            ctx.fillStyle = '#a0d86c';
            ctx.globalAlpha = 0.5;
            ctx.fillRect(0, GROUND, 600, 8);
            ctx.globalAlpha = 1;

            // moneda
            ctx.shadowColor = 'gold';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.r, 0, 2*Math.PI);
            ctx.fillStyle = '#ffd966';
            ctx.fill();
            ctx.strokeStyle = '#b8860b';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(coin.x-3, coin.y-3, 5, 0, 2*Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();

            // jugador
            ctx.shadowColor = '#0066aa';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#3f8ab3';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#9ad0f0';
            ctx.globalAlpha = 0.6;
            ctx.fillRect(player.x+2, player.y+2, player.w-4, 7);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // -------------------- NODOS --------------------
        const nodeCanvas = document.getElementById('nodeCanvas');
        const nctx = nodeCanvas.getContext('2d');

        const nodes = [
            { id: 'start', type: 'event', label: 'INICIO', x: 120, y: 70, w: 110, h: 45, outputs: ['out'] },
            { id: 'keyA', type: 'event', label: 'TECLA A', x: 120, y: 160, w: 110, h: 45, outputs: ['out'] },
            { id: 'keyD', type: 'event', label: 'TECLA D', x: 120, y: 250, w: 110, h: 45, outputs: ['out'] },
            { id: 'keySpace', type: 'event', label: 'ESPACIO', x: 120, y: 340, w: 110, h: 45, outputs: ['out'] },
            { id: 'coinTouch', type: 'event', label: 'TOCA MONEDA', x: 120, y: 430, w: 130, h: 45, outputs: ['out'] },
            { id: 'moveLeft', type: 'action', label: 'MOVER IZQ', x: 390, y: 70, w: 110, h: 45, inputs: ['in'] },
            { id: 'moveRight', type: 'action', label: 'MOVER DER', x: 390, y: 150, w: 110, h: 45, inputs: ['in'] },
            { id: 'jump', type: 'action', label: 'SALTAR', x: 390, y: 230, w: 110, h: 45, inputs: ['in'] },
            { id: 'addScore', type: 'action', label: 'SUMA 5', x: 390, y: 310, w: 110, h: 45, inputs: ['in'] },
            { id: 'setScore0', type: 'action', label: 'PUNTOS 0', x: 390, y: 390, w: 110, h: 45, inputs: ['in'] }
        ];

        let connections = [
            { from: 'start', to: 'setScore0' },
            { from: 'keyA', to: 'moveLeft' },
            { from: 'keyD', to: 'moveRight' },
            { from: 'keySpace', to: 'jump' },
            { from: 'coinTouch', to: 'addScore' }
        ];

        let draggingFrom = null;
        let mouseX = 0, mouseY = 0;

        function getNodeAt(px, py) {
            for (let n of nodes) {
                if (px >= n.x && px <= n.x + n.w && py >= n.y && py <= n.y + n.h) return n;
            }
            return null;
        }

        function getOutputPos(node) {
            return { x: node.x + node.w, y: node.y + node.h/2 };
        }
        function getInputPos(node) {
            return { x: node.x, y: node.y + node.h/2 };
        }

        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        function drawNodes() {
            nctx.clearRect(0, 0, 750, 550);
            // conexiones
            nctx.strokeStyle = '#4f9ed0';
            nctx.lineWidth = 5;
            nctx.shadowColor = '#b0e0ff';
            nctx.shadowBlur = 12;
            connections.forEach(c => {
                const fromNode = nodes.find(n => n.id === c.from);
                const toNode = nodes.find(n => n.id === c.to);
                if (!fromNode || !toNode) return;
                const fromPos = getOutputPos(fromNode);
                const toPos = getInputPos(toNode);
                nctx.beginPath();
                nctx.moveTo(fromPos.x, fromPos.y);
                nctx.lineTo(toPos.x, toPos.y);
                nctx.stroke();
            });
            nctx.shadowBlur = 0;
            // línea de arrastre
            if (draggingFrom) {
                const fromNode = nodes.find(n => n.id === draggingFrom.nodeId);
                if (fromNode) {
                    const start = getOutputPos(fromNode);
                    nctx.beginPath();
                    nctx.strokeStyle = '#ffb347';
                    nctx.lineWidth = 5;
                    nctx.setLineDash([10, 8]);
                    nctx.moveTo(start.x, start.y);
                    nctx.lineTo(mouseX, mouseY);
                    nctx.stroke();
                    nctx.setLineDash([]);
                }
            }

            // nodos
            nodes.forEach(n => {
                nctx.shadowColor = 'white';
                nctx.shadowBlur = 20;
                if (n.type === 'event') {
                    nctx.fillStyle = '#8cc88c'; // verde glossy
                } else {
                    nctx.fillStyle = '#66aaff'; // azul
                }
                nctx.strokeStyle = 'white';
                nctx.lineWidth = 4;
                nctx.beginPath();
                nctx.roundRect(n.x, n.y, n.w, n.h, 20);
                nctx.fill();
                nctx.stroke();

                // reflejo interno (super glossy)
                nctx.shadowBlur = 8;
                nctx.fillStyle = 'rgba(255,255,255,0.35)';
                nctx.beginPath();
                nctx.roundRect(n.x+2, n.y+2, n.w-4, 10, 10);
                nctx.fill();

                nctx.shadowBlur = 6;
                nctx.font = 'bold 16px "Segoe UI", Tahoma';
                nctx.fillStyle = '#002244';
                nctx.textAlign = 'center';
                nctx.textBaseline = 'middle';
                nctx.fillText(n.label, n.x + n.w/2, n.y + n.h/2);

                // pines
                nctx.shadowBlur = 0;
                nctx.fillStyle = 'white';
                // entrada
                nctx.beginPath();
                nctx.arc(n.x, n.y + n.h/2, 8, 0, 2*Math.PI);
                nctx.fill();
                nctx.strokeStyle = '#2277aa';
                nctx.lineWidth = 3;
                nctx.stroke();
                // salida
                nctx.beginPath();
                nctx.arc(n.x + n.w, n.y + n.h/2, 8, 0, 2*Math.PI);
                nctx.fill();
                nctx.stroke();
            });
        }

        // Eventos ratón
        nodeCanvas.addEventListener('mousedown', (e) => {
            const rect = nodeCanvas.getBoundingClientRect();
            const scaleX = nodeCanvas.width / rect.width;
            const scaleY = nodeCanvas.height / rect.height;
            const canvasX = (e.clientX - rect.left) * scaleX;
            const canvasY = (e.clientY - rect.top) * scaleY;

            for (let n of nodes) {
                const pinX = n.x + n.w;
                const pinY = n.y + n.h/2;
                if (Math.hypot(canvasX - pinX, canvasY - pinY) < 12) {
                    draggingFrom = { nodeId: n.id, pin: 'out' };
                    mouseX = canvasX;
                    mouseY = canvasY;
                    drawNodes();
                    return;
                }
            }
        });

        nodeCanvas.addEventListener('mousemove', (e) => {
            if (!draggingFrom) return;
            const rect = nodeCanvas.getBoundingClientRect();
            const scaleX = nodeCanvas.width / rect.width;
            const scaleY = nodeCanvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            drawNodes();
        });

        nodeCanvas.addEventListener('mouseup', (e) => {
            if (!draggingFrom) return;
            const rect = nodeCanvas.getBoundingClientRect();
            const scaleX = nodeCanvas.width / rect.width;
            const scaleY = nodeCanvas.height / rect.height;
            const canvasX = (e.clientX - rect.left) * scaleX;
            const canvasY = (e.clientY - rect.top) * scaleY;

            let targetNode = null;
            for (let n of nodes) {
                if (n.id === draggingFrom.nodeId) continue;
                const pinX = n.x;
                const pinY = n.y + n.h/2;
                if (Math.hypot(canvasX - pinX, canvasY - pinY) < 12) {
                    targetNode = n;
                    break;
                }
            }

            if (targetNode) {
                const exists = connections.some(c => c.from === draggingFrom.nodeId && c.to === targetNode.id);
                if (!exists) {
                    connections.push({ from: draggingFrom.nodeId, to: targetNode.id });
                }
            }
            draggingFrom = null;
            drawNodes();
        });

        nodeCanvas.addEventListener('mouseleave', () => {
            draggingFrom = null;
            drawNodes();
        });

        drawNodes();

        // -------------------- LÓGICA DE ACCIONES --------------------
        function runActionsForEvent(eventNodeId) {
            const targets = connections.filter(c => c.from === eventNodeId).map(c => c.to);
            targets.forEach(targetId => {
                const node = nodes.find(n => n.id === targetId);
                if (!node) return;
                switch (node.id) {
                    case 'moveLeft': player.vx -= MOVE_FORCE; break;
                    case 'moveRight': player.vx += MOVE_FORCE; break;
                    case 'jump': if (player.y + player.h >= GROUND - 0.5) player.vy = JUMP_FORCE; break;
                    case 'addScore': score += 5; updateScore(); break;
                    case 'setScore0': score = 0; updateScore(); break;
                }
            });
        }

        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const code = e.code;
            let eventId = null;
            if (code === 'KeyA') eventId = 'keyA';
            else if (code === 'KeyD') eventId = 'keyD';
            else if (code === 'Space') eventId = 'keySpace';
            if (eventId) {
                e.preventDefault();
                runActionsForEvent(eventId);
            }
        });

        function gameLoop() {
            if (!gameRunning) return;
            player.vx *= FRICTION;
            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x + player.w > 600) { player.x = 600 - player.w; player.vx = 0; }
            if (player.y + player.h > GROUND) { player.y = GROUND - player.h; player.vy = 0; }
            if (player.y < 0) { player.y = 0; player.vy = 0; }

            const dx = (player.x + player.w/2) - coin.x;
            const dy = (player.y + player.h/2) - coin.y;
            if (Math.hypot(dx, dy) < player.w/2 + coin.r) {
                runActionsForEvent('coinTouch');
                coin.x = 50 + Math.random() * 500;
                coin.y = 50 + Math.random() * (GROUND - 70);
            }

            drawGame();
            animFrame = requestAnimationFrame(gameLoop);
        }

        document.getElementById('runBtn').addEventListener('click', () => {
            if (gameRunning) return;
            resetGame();
            runActionsForEvent('start');
            gameRunning = true;
            gameLoop();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            gameRunning = false;
            if (animFrame) cancelAnimationFrame(animFrame);
            resetGame();
            drawGame();
        });

        drawGame();
    })();
</script>
</body>
</html>
