<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMod 2008 · Versión simplificada</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'VT323', monospace; background: #111; }
        #info {
            position: absolute; top: 10px; left: 10px; background: #000; color: #0f0;
            padding: 8px 16px; border: 3px solid #0a0; font-size: 24px; z-index: 100;
        }
        #toolbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #b0b7b0; border: 4px solid #222; padding: 8px 16px; display: flex;
            gap: 20px; box-shadow: 6px 6px 0 #3a3a3a; z-index: 200;
        }
        .tool-btn {
            background: #dbdddb; border: 3px solid #222; color: #111; font-family: 'VT323';
            font-size: 28px; padding: 5px 20px; cursor: pointer; text-transform: uppercase;
            box-shadow: 3px 3px 0 #3c3c3c;
        }
        .tool-btn.active { background: #acc7e6; transform: translate(2px, 2px); }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); border: 2px solid white; z-index: 150;
            box-shadow: 0 0 0 2px black;
        }
        #status {
            position: absolute; top: 10px; right: 10px; background: #000; color: #ffcc00;
            padding: 8px 16px; border: 3px solid #ffaa00; font-size: 22px; z-index: 100;
        }
    </style>
    <!-- Three.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div id="info">🛠️ GMod 2008 · Lite</div>
    <div id="status">HERRAMIENTA: <span id="toolName">PROP</span></div>
    <div id="crosshair"></div>
    <div id="toolbar">
        <button class="tool-btn active" data-tool="prop">📦 PROP</button>
        <button class="tool-btn" data-tool="remove">❌ REMOVE</button>
    </div>

    <script>
        // --- Inicialización básica ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Cielo azul claro

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Sombras para más realismo
        document.body.appendChild(renderer.domElement);

        // --- Luces potentes (para que todo se vea) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); // Luz ambiental clara
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Luz puntual extra para iluminar desde abajo
        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(0, 5, 5);
        scene.add(pointLight);

        // --- Suelo con cuadrícula (visible) ---
        const gridHelper = new THREE.GridHelper(30, 20, 0x88ff88, 0x335533);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        const planeGeo = new THREE.PlaneGeometry(30, 30);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x3c6e3c, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0;
        plane.receiveShadow = true;
        scene.add(plane);

        // --- Paredes invisibles para no caerse (no se renderizan, pero limitan el movimiento) ---
        // Simularemos límites con un simple check en el movimiento, sin físicas complejas.

        // --- Variables globales ---
        const keyState = { w: false, a: false, s: false, d: false, space: false };
        const player = {
            mesh: null,
            velocity: new THREE.Vector3(0, 0, 0),
            onGround: false,
            radius: 0.5,
            height: 1.8
        };
        const props = []; // almacena los meshes de props
        let currentTool = 'prop';

        // --- Crear jugador (un grupo con cuerpo y cabeza) ---
        const playerGroup = new THREE.Group();
        
        // Cuerpo (camisa roja)
        const torsoGeo = new THREE.BoxGeometry(0.9, 1.4, 0.6);
        const torsoMat = new THREE.MeshStandardMaterial({ color: 0xff5555 });
        const torso = new THREE.Mesh(torsoGeo, torsoMat);
        torso.position.y = 0.7;
        torso.castShadow = true;
        torso.receiveShadow = true;
        playerGroup.add(torso);
        
        // Cabeza
        const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.5;
        head.castShadow = true;
        head.receiveShadow = true;
        playerGroup.add(head);
        
        // Ojos
        const eyeGeo = new THREE.SphereGeometry(0.1, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(-0.15, 1.6, 0.35);
        playerGroup.add(eyeL);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.15, 1.6, 0.35);
        playerGroup.add(eyeR);

        playerGroup.position.set(0, 1, 0);
        playerGroup.castShadow = true;
        playerGroup.receiveShadow = true;
        scene.add(playerGroup);
        player.mesh = playerGroup;

        // --- Suelo lógico (para gravedad) ---
        const groundLevel = 0.9; // altura a la que el jugador toca el suelo (considerando su altura)

        // --- Controles de teclado ---
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'Space': keyState.space = true; e.preventDefault(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
                case 'Space': keyState.space = false; e.preventDefault(); break;
            }
        });

        // --- Toolbar ---
        const toolButtons = document.querySelectorAll('.tool-btn');
        const toolSpan = document.getElementById('toolName');
        toolButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                toolButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                toolSpan.innerText = currentTool.toUpperCase();
            });
        });

        // --- Raycaster para interacción ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(e.clientY / renderer.domElement.clientHeight) * 2 + 1;
        });

        // --- Spawn de props (cajas de colores) ---
        function spawnProp(position) {
            const size = 0.5 + Math.random() * 0.5;
            const color = new THREE.Color().setHSL(Math.random(), 0.9, 0.6);
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.copy(position);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            props.push(cube);
        }

        // --- Eliminar prop bajo el cursor ---
        function removeProp() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(props);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                scene.remove(hit);
                const index = props.indexOf(hit);
                if (index > -1) props.splice(index, 1);
            }
        }

        // --- Eventos de clic ---
        window.addEventListener('click', (e) => {
            if (currentTool === 'prop') {
                // Colocar prop donde mira la cámara, a 5 unidades de distancia
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                const spawnPos = camera.position.clone().add(direction.multiplyScalar(5));
                spawnPos.y = Math.max(1, spawnPos.y); // evitar que aparezca bajo tierra
                spawnProp(spawnPos);
            } else if (currentTool === 'remove') {
                removeProp();
            }
        });

        // Bloquear menú contextual para clic derecho
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- Físicas simples (gravedad y movimiento) ---
        const gravity = -15; // unidades por segundo²
        const moveSpeed = 8;
        const jumpSpeed = 7;

        function updatePlayer(deltaTime) {
            // Aplicar gravedad
            player.velocity.y += gravity * deltaTime;

            // Movimiento horizontal (solo si está en el suelo o con poco control en aire)
            const moveDir = new THREE.Vector3(0, 0, 0);
            if (keyState.w) moveDir.z -= 1;
            if (keyState.s) moveDir.z += 1;
            if (keyState.a) moveDir.x -= 1;
            if (keyState.d) moveDir.x += 1;
            if (moveDir.length() > 0) {
                moveDir.normalize();
                // Convertir dirección relativa a la cámara
                const cameraDir = new THREE.Vector3();
                camera.getWorldDirection(cameraDir);
                cameraDir.y = 0;
                cameraDir.normalize();
                const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), cameraDir).normalize();
                
                const move = new THREE.Vector3(0, 0, 0);
                if (keyState.w) move.add(cameraDir);
                if (keyState.s) move.sub(cameraDir);
                if (keyState.a) move.add(right);
                if (keyState.d) move.sub(right);
                move.normalize();
                player.velocity.x = move.x * moveSpeed;
                player.velocity.z = move.z * moveSpeed;
            } else {
                // Frenar suavemente
                player.velocity.x *= 0.8;
                player.velocity.z *= 0.8;
            }

            // Salto
            if (keyState.space && player.onGround) {
                player.velocity.y = jumpSpeed;
                player.onGround = false;
            }

            // Actualizar posición
            player.mesh.position.x += player.velocity.x * deltaTime;
            player.mesh.position.y += player.velocity.y * deltaTime;
            player.mesh.position.z += player.velocity.z * deltaTime;

            // Colisión con el suelo
            if (player.mesh.position.y < groundLevel) {
                player.mesh.position.y = groundLevel;
                player.velocity.y = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }

            // Límites del mundo (para no irse al infinito)
            const boundary = 14;
            if (player.mesh.position.x > boundary) player.mesh.position.x = boundary;
            if (player.mesh.position.x < -boundary) player.mesh.position.x = -boundary;
            if (player.mesh.position.z > boundary) player.mesh.position.z = boundary;
            if (player.mesh.position.z < -boundary) player.mesh.position.z = -boundary;
        }

        // --- Cámara en tercera persona ---
        function updateCamera() {
            const playerPos = player.mesh.position.clone();
            const offset = new THREE.Vector3(-3, 2, 4); // detrás y arriba
            // Rotar offset según la dirección del jugador? En este caso lo fijamos relativo al mundo
            camera.position.copy(playerPos.clone().add(offset));
            camera.lookAt(playerPos.clone().add(new THREE.Vector3(0, 1.2, 0)));
        }

        // --- Reloj para deltaTime ---
        const clock = new THREE.Clock();

        // --- Animación ---
        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = Math.min(clock.getDelta(), 0.1); // seguridad

            updatePlayer(deltaTime);
            updateCamera();

            renderer.render(scene, camera);
        }

        animate();

        // --- Ajustar tamaño de ventana ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Añadir algunos props iniciales ---
        setTimeout(() => {
            spawnProp(new THREE.Vector3(2, 1, 3));
            spawnProp(new THREE.Vector3(-1, 1, 2));
            spawnProp(new THREE.Vector3(0, 1, 5));
        }, 100);
    </script>
</body>
</html>
