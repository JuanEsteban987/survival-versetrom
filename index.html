<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMod 2008 P2P · Sandbox retro</title>
    <!-- Estilo 2008: gradients, bevel, Web 2.0, Windows XP-ish -->
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #0a3f5e; /* fallback */
        }
        #info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #2a6f8f;
            border-radius: 15px;
            padding: 12px 20px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 0 2px #c0d4e6, inset 0 0 10px #7ab3c9;
            background: linear-gradient(180deg, #e8f4ff 0%, #c0dcf0 100%);
            color: #003366;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            font-size: 14px;
            border-bottom: 4px solid #2f6f9f;
            text-shadow: 1px 1px 0 white;
        }
        #info-panel fieldset {
            border: 2px solid #2a6f8f;
            border-radius: 8px;
            padding: 5px 12px;
            margin: 0;
            background: #d7e9ff;
            box-shadow: inset 1px 1px 3px #9bb7d4, 2px 2px 0 #1a4b6b;
        }
        #info-panel legend {
            background: #f4c542;
            padding: 2px 12px;
            border-radius: 20px;
            border: 2px solid #b57c1a;
            font-weight: bold;
            color: #1e2f3f;
            box-shadow: 1px 1px 0 white;
            font-size: 0.9rem;
        }
        #info-panel button {
            background: linear-gradient(180deg, #f0f9ff, #b0d4f0);
            border: 3px solid #3a7ca5;
            border-radius: 30px;
            color: #002856;
            font-weight: bold;
            padding: 8px 20px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #1a4b6b, inset -1px -1px 0 #6b9ec0;
            font-size: 1rem;
            transition: 0.1s ease;
            margin: 2px;
        }
        #info-panel button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #1a4b6b, inset -1px -1px 0 #6b9ec0;
        }
        #info-panel input {
            background: #fcf9e8;
            border: 3px inset #9bb7d4;
            border-radius: 20px;
            padding: 6px 15px;
            font-weight: bold;
            color: #003366;
            box-shadow: 2px 2px 0 #1a4b6b;
        }
        #peer-id-label {
            background: #1e4f6e;
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #0a2a3a;
            border: 2px solid #ffcc66;
            box-shadow: inset 0 -2px 0 #0b3142;
            font-size: 1.2rem;
        }
        #chat-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(220, 240, 255, 0.95);
            border: 4px solid #2a6f8f;
            border-radius: 20px;
            padding: 8px;
            box-shadow: 5px 5px 0 #0b3550, inset 0 0 20px #aad0ff;
            backdrop-filter: blur(4px);
            z-index: 200;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
        }
        #chat-header {
            background: linear-gradient(90deg, #f6b83e, #fada5e);
            padding: 5px 10px;
            border-radius: 15px 15px 5px 5px;
            border: 2px solid #b37b2e;
            font-weight: bold;
            color: #1e3400;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #chat-messages {
            height: 150px;
            overflow-y: auto;
            background: #f0f7ff;
            border: 3px inset #9bb7d4;
            border-radius: 12px;
            padding: 8px;
            font-size: 13px;
            color: #001c3d;
            margin-bottom: 8px;
        }
        .chat-msg {
            border-bottom: 1px solid #8fb0cf;
            padding: 4px;
        }
        .chat-user {
            color: #a63c06;
            font-weight: bold;
        }
        #chat-input-area {
            display: flex;
            gap: 5px;
        }
        #chat-input {
            flex: 1;
            border: 3px inset #9bb7d4;
            border-radius: 30px;
            padding: 8px;
            background: white;
        }
        #chat-send {
            background: #f4c542;
            border: 3px solid #b57c1a;
            border-radius: 30px;
            font-weight: bold;
            padding: 8px 15px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #7b4f0e;
        }
        #chat-send:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        /* decoración retro */
        .marquee {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 3px;
            overflow: hidden;
            white-space: nowrap;
            animation: scrollText 15s linear infinite;
            border-top: 2px solid lime;
            border-bottom: 2px solid lime;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        #version-badge {
            position: absolute;
            top: 80px;
            left: 20px;
            background: gold;
            border: 3px solid darkgoldenrod;
            padding: 4px 15px;
            transform: rotate(-5deg);
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 4px 4px 0 #7f5f1f;
            z-index: 300;
        }
    </style>
</head>
<body>

    <!-- Banner retro 2008 -->
    <div id="version-badge">⏥ GMod 2008 · P2P alpha ⏥</div>

    <!-- Panel principal estilo XP -->
    <div id="info-panel">
        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <span style="background: #003c5e; color: white; padding: 6px 18px; border-radius: 40px; border: 2px solid #fc6; font-weight: bold;">🎮 Tu ID:</span>
            <span id="peer-id-label" id="peerDisplay">cargando...</span>
        </div>
        <fieldset>
            <legend>🔌 Conectar a compa</legend>
            <input type="text" id="remote-peer-input" placeholder="ID del otro player" style="width: 180px;">
            <button id="connect-btn">Conectar P2P</button>
            <button id="disconnect-btn">Desconectar</button>
        </fieldset>
        <fieldset>
            <legend>📦 Spawnear props</legend>
            <button id="spawn-cube">📦 Cubo</button>
            <button id="spawn-sphere">⚽ Esfera</button>
        </fieldset>
        <div style="margin-left: auto; color: #002856; font-weight: bold;">
            <span id="peer-status">🔴 Desconectado</span>
        </div>
    </div>

    <!-- Chat 2008 -->
    <div id="chat-panel">
        <div id="chat-header">💬 CHAT 2008 (MSN style)</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Escribe mensaje...">
            <button id="chat-send">Enviar</button>
        </div>
    </div>

    <!-- El canvas 3D se inyecta aquí -->
    <div id="canvas-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>

    <!-- Scripts: Three, Cannon, PeerJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        (function() {
            // --- Configuración básica ---
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // cielo celeste

            // Cámara
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 10, 20);
            camera.lookAt(0, 2, 0);

            // Render
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // para sensación GMod
            container.appendChild(renderer.domElement);

            // Luces
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfff5d1, 1);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x4466aa, 0.8);
            fillLight.position.set(-5, 10, 10);
            scene.add(fillLight);

            // Suelo visual (rejilla)
            const gridHelper = new THREE.GridHelper(40, 20, 0xaaaaaa, 0x444444);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x335577, roughness: 0.7, metalness: 0.1 });
            const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
            groundPlane.rotation.x = -Math.PI/2;
            groundPlane.position.y = -0.01;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);

            // --- Mundo físico Cannon ---
            const world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.SAPBroadphase(world);
            world.defaultContactMaterial.restitution = 0.3;

            // Suelo físico
            const groundBody = new CANNON.Body({ mass: 0, material: new CANNON.Material('groundMat') });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(groundBody);

            // Material de contacto
            const physMat = new CANNON.Material('propMat');
            const groundPhysMat = new CANNON.Material('groundMat');
            const contactMat = new CANNON.ContactMaterial(physMat, groundPhysMat, { friction: 0.4, restitution: 0.3 });
            world.addContactMaterial(contactMat);

            // --- Almacén de objetos sincronizados ---
            const objects = new Map(); // id -> { mesh, body, isOwner, shape, ownerPeer }

            // --- PeerJS y conexión ---
            let peer = null;
            let conn = null;
            let myPeerId = '';
            const localMessages = []; // para chat

            // Elementos UI
            const peerDisplay = document.getElementById('peer-id-label');
            const peerStatus = document.getElementById('peer-status');
            const remotePeerInput = document.getElementById('remote-peer-input');
            const connectBtn = document.getElementById('connect-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');
            const spawnCubeBtn = document.getElementById('spawn-cube');
            const spawnSphereBtn = document.getElementById('spawn-sphere');
            const chatMessagesDiv = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const chatSend = document.getElementById('chat-send');

            // Inicializar Peer
            function initPeer() {
                peer = new Peer(); // usa servidor público de PeerJS
                peer.on('open', (id) => {
                    myPeerId = id;
                    peerDisplay.innerText = id;
                    console.log('Mi ID:', id);
                    addChatMessage('Sistema', `Tu ID: ${id}`, '#006400');
                });

                peer.on('connection', (connection) => {
                    conn = connection;
                    setupConnection(conn);
                });

                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    alert('Error de Peer: ' + err.type);
                });
            }

            function setupConnection(connection) {
                conn = connection;
                peerStatus.innerText = '🟢 Conectado a ' + conn.peer;
                peerStatus.style.color = '#00aa00';

                conn.on('data', (data) => {
                    handleMessage(data);
                });

                conn.on('close', () => {
                    peerStatus.innerText = '🔴 Desconectado';
                    peerStatus.style.color = '#aa0000';
                    conn = null;
                });

                // Al conectar, enviar sincronización de objetos existentes (solo los que son míos)
                const myObjects = [];
                objects.forEach((obj, id) => {
                    if (obj.isOwner) {
                        myObjects.push({
                            id: id,
                            shape: obj.shape,
                            pos: [obj.body.position.x, obj.body.position.y, obj.body.position.z],
                            quat: [obj.body.quaternion.x, obj.body.quaternion.y, obj.body.quaternion.z, obj.body.quaternion.w],
                            owner: myPeerId
                        });
                    }
                });
                if (myObjects.length > 0) {
                    conn.send({ type: 'sync', objects: myObjects });
                }
            }

            // Manejo de mensajes entrantes
            function handleMessage(data) {
                if (!data || !data.type) return;

                switch(data.type) {
                    case 'spawn':
                        createRemoteObject(data.id, data.shape, data.pos, data.quat, data.owner);
                        addChatMessage('Sistema', `Jugador ${data.owner.substr(0,5)} spawneó ${data.shape}`, '#333399');
                        break;
                    case 'update':
                        updateRemoteObject(data.id, data.pos, data.quat);
                        break;
                    case 'remove':
                        removeObject(data.id);
                        break;
                    case 'chat':
                        addChatMessage(data.sender || 'Desconocido', data.message, '#aa3300');
                        break;
                    case 'sync':
                        // Recibir lista de objetos al conectar
                        if (data.objects) {
                            data.objects.forEach(obj => {
                                if (!objects.has(obj.id)) {
                                    createRemoteObject(obj.id, obj.shape, obj.pos, obj.quat, obj.owner);
                                }
                            });
                        }
                        break;
                    default: break;
                }
            }

            // Crear objeto remoto (kinemático)
            function createRemoteObject(id, shape, pos, quat, ownerPeer) {
                if (objects.has(id)) return;
                let geometry, material;
                const color = 0xffaa33; // naranja retro para los remotos
                if (shape === 'cube') {
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                    material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x221100 });
                } else {
                    geometry = new THREE.SphereGeometry(0.6, 24, 16);
                    material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x221100 });
                }
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.set(pos[0], pos[1], pos[2]);
                mesh.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                scene.add(mesh);

                // Cuerpo kinemático (para colisiones pasivas)
                const body = new CANNON.Body({ mass: 0, material: physMat, type: CANNON.Body.KINEMATIC });
                if (shape === 'cube') {
                    body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
                } else {
                    body.addShape(new CANNON.Sphere(0.6));
                }
                body.position.set(pos[0], pos[1], pos[2]);
                body.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                world.addBody(body);

                objects.set(id, { mesh, body, isOwner: false, shape, ownerPeer });
            }

            // Actualizar objeto remoto (kinemático)
            function updateRemoteObject(id, pos, quat) {
                const obj = objects.get(id);
                if (!obj || obj.isOwner) return; // solo actualizamos remotos
                obj.body.position.set(pos[0], pos[1], pos[2]);
                obj.body.quaternion.set(quat[0], quat[1], quat[2], quat[3]);
                // el mesh se sincroniza en el loop de animación antes de render
            }

            // Crear objeto local (dinámico, dueño)
            function createLocalObject(shape) {
                const id = myPeerId + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
                const pos = new CANNON.Vec3( (Math.random()-0.5)*5, 5, (Math.random()-0.5)*5 );
                const quat = new CANNON.Quaternion();

                let geometry, mesh;
                const color = 0x33ccff; // azul claro para lo propio
                if (shape === 'cube') {
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                } else {
                    geometry = new THREE.SphereGeometry(0.6, 24, 16);
                }
                const material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x113355 });
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.copy(pos);
                scene.add(mesh);

                // Cuerpo físico dinámico
                const body = new CANNON.Body({ mass: 1, material: physMat });
                if (shape === 'cube') {
                    body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
                } else {
                    body.addShape(new CANNON.Sphere(0.6));
                }
                body.position.copy(pos);
                body.quaternion.copy(quat);
                world.addBody(body);

                objects.set(id, { mesh, body, isOwner: true, shape, ownerPeer: myPeerId });

                // Notificar a los demás
                if (conn) {
                    conn.send({
                        type: 'spawn',
                        id: id,
                        shape: shape,
                        pos: [pos.x, pos.y, pos.z],
                        quat: [quat.x, quat.y, quat.z, quat.w],
                        owner: myPeerId
                    });
                }
            }

            // Eliminar objeto (local o remoto)
            function removeObject(id) {
                const obj = objects.get(id);
                if (!obj) return;
                scene.remove(obj.mesh);
                world.removeBody(obj.body);
                objects.delete(id);
            }

            // --- Bucle de sincronización (envío de updates cada 100ms) ---
            let lastUpdateTime = 0;
            const updateInterval = 100; // ms

            function sendUpdates() {
                if (!conn) return;
                objects.forEach((obj, id) => {
                    if (obj.isOwner) {
                        // Si el objeto es mío, enviar posición/rotación
                        const p = obj.body.position;
                        const q = obj.body.quaternion;
                        conn.send({
                            type: 'update',
                            id: id,
                            pos: [p.x, p.y, p.z],
                            quat: [q.x, q.y, q.z, q.w]
                        });
                    }
                });
            }

            setInterval(() => {
                if (conn) sendUpdates();
            }, updateInterval);

            // --- Chat ---
            function addChatMessage(sender, text, color = '#000') {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg';
                msgDiv.innerHTML = `<span class="chat-user" style="color:${color}">${sender}:</span> ${text}`;
                chatMessagesDiv.appendChild(msgDiv);
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            }

            chatSend.addEventListener('click', () => {
                const msg = chatInput.value.trim();
                if (!msg || !conn) {
                    alert('Conéctate a un peer para chatear');
                    return;
                }
                conn.send({ type: 'chat', message: msg, sender: myPeerId.substr(0,6) });
                addChatMessage('Tú', msg, '#003399');
                chatInput.value = '';
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') chatSend.click();
            });

            // --- UI Eventos ---
            connectBtn.addEventListener('click', () => {
                const remoteId = remotePeerInput.value.trim();
                if (!remoteId) return;
                if (!peer) initPeer();
                // Esperar a que peer esté listo
                if (!peer || !myPeerId) {
                    setTimeout(() => connectBtn.click(), 500);
                    return;
                }
                conn = peer.connect(remoteId);
                setupConnection(conn);
            });

            disconnectBtn.addEventListener('click', () => {
                if (conn) conn.close();
            });

            spawnCubeBtn.addEventListener('click', () => {
                createLocalObject('cube');
            });

            spawnSphereBtn.addEventListener('click', () => {
                createLocalObject('sphere');
            });

            // --- Animación y física ---
            function animate() {
                requestAnimationFrame(animate);

                // Avanzar física (paso fijo)
                world.step(1/60);

                // Sincronizar mallas con cuerpos (tanto locales como remotos kinemáticos ya se actualizaron vía mensajes)
                objects.forEach((obj) => {
                    obj.mesh.position.copy(obj.body.position);
                    obj.mesh.quaternion.copy(obj.body.quaternion);
                });

                // Control simple de cámara (orbitar alrededor del centro con teclas? no por ahora, fijo)
                // Podemos añadir movimiento WASD básico? demasiado, pero lo dejamos fijo para demo.

                renderer.render(scene, camera);
            }

            animate();

            // Inicializar peer automáticamente
            initPeer();

            // Ajuste de ventana
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Añadir mensaje de bienvenida al chat
            setTimeout(() => {
                addChatMessage('⏥ GMod 2008', 'Bienvenido al sandbox P2P retro. Spawnea objetos y conecta con un amigo!', '#990099');
            }, 1000);

            // (Opcional) Limpiar objetos viejos? no por ahora.

        })();
    </script>
</body>
</html>
