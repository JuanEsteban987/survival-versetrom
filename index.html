<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMod 2008 · Web Sandbox</title>
    <!-- Matter.js physics engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
            cursor: default;
        }

        body {
            background: #2e4b3b; /* deep moss green, old GMod background? */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Pixelify Sans', 'VT323', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        /* 2008 inspired window – bevels, gradients, chunky borders */
        .gmod-window {
            background: #ced0cf;
            border: 4px solid #0a0a0a;
            border-radius: 8px 8px 6px 6px;
            box-shadow: 5px 5px 0px 0px #3a3a3a, inset 2px 2px 0 0 #f0f0f0, inset -2px -2px 0 0 #6c6c6c;
            padding: 4px;
        }

        .title-bar {
            background: linear-gradient(90deg, #1f4c8f, #2b6ab0);
            color: #fff;
            padding: 6px 10px;
            font-size: 22px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #0f2f4f;
            border-bottom: 3px solid #0b2b4a;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .title-bar img {
            width: 28px;
            height: 28px;
            image-rendering: pixelated;
            background: #aaccff;
            border: 2px solid #fff;
        }

        .toolbar {
            background: #b2b7b2;
            padding: 10px 8px;
            border-bottom: 3px solid #6f7a6f;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            box-shadow: inset 0 2px 3px #e2e8e2, inset 0 -2px 3px #7c847c;
        }

        .tool-btn {
            background: #dbdddb;
            border: 3px solid #222;
            border-radius: 0px;
            color: #111;
            font-size: 22px;
            font-family: 'Pixelify Sans', 'VT323', monospace;
            font-weight: bold;
            padding: 6px 18px;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px 0 #3c3c3c, inset -1px -1px 0 0 #6f6f6f, inset 1px 1px 0 0 #fefefe;
            cursor: pointer;
            transition: all 0.05s ease-in;
            line-height: 1;
        }

        .tool-btn.active {
            background: #acc7e6;
            box-shadow: inset 2px 2px 0 0 #1e1e1e, inset -1px -1px 0 0 #a0a0a0;
            transform: translate(2px, 2px);
            border-color: #555;
        }

        .tool-btn:active {
            transform: translate(2px, 2px);
            box-shadow: inset 2px 2px 0 0 #1e1e1e;
        }

        .canvas-container {
            border: 5px inset #5e5e5e;
            background: #aab7aa;
            display: flex;
            justify-content: center;
            margin: 8px;
            box-shadow: inset 0 0 0 2px #2c482c;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 1000px;
            height: auto;
            background: #879b87;
            background-image: 
                linear-gradient(rgba(70, 70, 70, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(70, 70, 70, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            image-rendering: crisp-edges; /* pixelated grid */
        }

        .status-bar {
            background: #b7bfb7;
            border-top: 3px solid #828782;
            padding: 6px 12px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            color: #1e2a1e;
            text-shadow: 1px 1px 0 #dddddd;
            box-shadow: inset 0 2px 4px #e2f0e2;
        }

        .status-bar span {
            background: #202020;
            color: #b0ffb0;
            padding: 2px 10px;
            border: 2px inset #6a6a6a;
            font-family: 'VT323', monospace;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .footer-note {
            color: #c6d9c6;
            text-align: right;
            font-size: 14px;
            padding: 4px 10px;
            background: #1b2b1b;
            border-top: 1px solid #3f583f;
        }
    </style>
    <!-- 8-bit inspired font -->
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
<div class="gmod-window" style="max-width: 1100px; width: 100%;">
    <div class="title-bar">
        <span>🛠️ GARRY'S MOD 2008 (web DEMO)</span>
        <span style="margin-left: auto; font-size: 16px;">build 2008</span>
    </div>
    <div class="toolbar" id="toolbar">
        <button class="tool-btn" data-tool="ragdoll">👤 RAGDOLL</button>
        <button class="tool-btn" data-tool="prop">📦 PROP</button>
        <button class="tool-btn" data-tool="remove">❌ REMOVE</button>
        <button class="tool-btn active" data-tool="drag">🖐️ DRAG</button>
        <div style="margin-left: auto; font-size: 20px; color: #261f1f; border: 2px solid #5a5a5a; padding: 4px 16px; background: #cfd9cf;">toolgun</div>
    </div>
    <div class="canvas-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
    </div>
    <div class="status-bar">
        <span id="toolIndicator">DRAG</span>
        <div style="display: flex; gap: 20px;">
            <span id="entityCount">0 entities</span>
            <span>FPS: 60</span>
        </div>
    </div>
    <div class="footer-note">
        ⚡ click canvas to spawn with active tool · drag stuff · ragdolls are wobbly · 2008 vibe
    </div>
</div>

<script>
    (function() {
        // --- Matter.js modules ---
        const Engine = Matter.Engine;
        const Render = Matter.Render;
        const Runner = Matter.Runner;
        const Bodies = Matter.Bodies;
        const Composite = Matter.Composite;
        const Constraint = Matter.Constraint;
        const Mouse = Matter.Mouse;
        const MouseConstraint = Matter.MouseConstraint;
        const Events = Matter.Events;
        const Query = Matter.Query;
        const Body = Matter.Body;
        const World = Matter.World; // alias for Composite

        // --- engine setup ---
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 0.5; // a bit heavier for that chunky feel

        // --- canvas and render ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // we will use a custom render to keep that retro aesthetic + Matter.js debug draw
        // But Matter.Render is efficient, we'll keep it and override styling.
        const render = Render.create({
            canvas: canvas,
            engine: engine,
            options: {
                width: 1000,
                height: 600,
                wireframes: false, // we want solid fills
                background: '#879b87',
                pixelRatio: 1,
                showAngleIndicator: false,
                showCollisions: false,
                showVelocity: false
            }
        });

        Render.run(render);

        // runner
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- static walls (invisible but solid) ---
        const wallOptions = { isStatic: true, restitution: 0.3, friction: 0.5, render: { fillStyle: '#5d755d', strokeStyle: '#2d3f2d', lineWidth: 2 } };
        const ground = Bodies.rectangle(500, 610, 1020, 40, wallOptions); // bottom
        const ceiling = Bodies.rectangle(500, -10, 1020, 40, wallOptions); // top
        const leftWall = Bodies.rectangle(-10, 300, 40, 640, wallOptions);
        const rightWall = Bodies.rectangle(1010, 300, 40, 640, wallOptions);
        
        // add some decorative barriers (static blocks)
        const barrier1 = Bodies.rectangle(300, 500, 200, 20, { ...wallOptions, isStatic: true, render: { fillStyle: '#6f4f2f', strokeStyle: '#3b2b1b' } });
        const barrier2 = Bodies.rectangle(700, 450, 150, 20, { ...wallOptions, isStatic: true, render: { fillStyle: '#6f4f2f', strokeStyle: '#3b2b1b' } });
        
        Composite.add(world, [ground, ceiling, leftWall, rightWall, barrier1, barrier2]);

        // --- mouse interaction (drag) will be added/removed based on tool ---
        let mouseConstraint;
        let mouse;

        function initMouseConstraint() {
            if (mouseConstraint) return;
            mouse = Mouse.create(canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });
            Composite.add(world, mouseConstraint);
        }

        function removeMouseConstraint() {
            if (mouseConstraint) {
                Composite.remove(world, mouseConstraint);
                mouseConstraint = null;
                mouse = null;
            }
        }

        // start with drag tool -> enable mouse constraint
        let currentTool = 'drag';
        initMouseConstraint();

        // --- helper to find bodies under mouse (for remove) ---
        function getBodiesAtMouse(ev) {
            if (!canvas) return [];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (ev.clientX - rect.left) * scaleX;
            const mouseY = (ev.clientY - rect.top) * scaleY;

            // all bodies at point
            const allBodies = Composite.allBodies(world);
            // account for a small radius
            const bodiesUnder = Query.point(allBodies, { x: mouseX, y: mouseY });
            // filter out static walls
            return bodiesUnder.filter(b => !b.isStatic);
        }

        // --- spawn functions ---
        function spawnProp(x, y) {
            if (!x || !y) return;
            // random shape
            const isBox = Math.random() > 0.3;
            const col = `hsl(${Math.random() * 360}, 70%, 55%)`;
            let body;
            if (isBox) {
                const w = 30 + Math.floor(Math.random() * 30);
                const h = 30 + Math.floor(Math.random() * 30);
                body = Bodies.rectangle(x, y, w, h, {
                    restitution: 0.2,
                    friction: 0.4,
                    density: 0.002,
                    render: { fillStyle: col, strokeStyle: '#222', lineWidth: 2 }
                });
            } else {
                const r = 12 + Math.floor(Math.random() * 18);
                body = Bodies.circle(x, y, r, {
                    restitution: 0.4,
                    friction: 0.2,
                    density: 0.003,
                    render: { fillStyle: col, strokeStyle: '#222', lineWidth: 2 }
                });
            }
            Composite.add(world, body);
        }

        function spawnRagdoll(x, y) {
            if (!x || !y) return;
            // Torso (main)
            const torso = Bodies.rectangle(x, y, 35, 55, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.003,
                render: { fillStyle: '#4d6b4d', strokeStyle: '#263326', lineWidth: 2 }
            });
            // Head
            const head = Bodies.circle(x, y - 40, 16, {
                restitution: 0.3,
                friction: 0.3,
                density: 0.002,
                render: { fillStyle: '#f0d2a0', strokeStyle: '#886644', lineWidth: 2 }
            });
            // Left upper arm
            const leftArmU = Bodies.rectangle(x - 25, y - 15, 35, 15, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.002,
                render: { fillStyle: '#4d6b4d', strokeStyle: '#263326', lineWidth: 2 }
            });
            // Right upper arm
            const rightArmU = Bodies.rectangle(x + 25, y - 15, 35, 15, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.002,
                render: { fillStyle: '#4d6b4d', strokeStyle: '#263326', lineWidth: 2 }
            });
            // Left lower arm
            const leftArmL = Bodies.rectangle(x - 45, y - 35, 32, 14, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.002,
                render: { fillStyle: '#4d6b4d', strokeStyle: '#263326', lineWidth: 2 }
            });
            // Right lower arm
            const rightArmL = Bodies.rectangle(x + 45, y - 35, 32, 14, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.002,
                render: { fillStyle: '#4d6b4d', strokeStyle: '#263326', lineWidth: 2 }
            });
            // Left upper leg
            const leftLegU = Bodies.rectangle(x - 14, y + 35, 20, 45, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.003,
                render: { fillStyle: '#2f4d2f', strokeStyle: '#1f331f', lineWidth: 2 }
            });
            // Right upper leg
            const rightLegU = Bodies.rectangle(x + 14, y + 35, 20, 45, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.003,
                render: { fillStyle: '#2f4d2f', strokeStyle: '#1f331f', lineWidth: 2 }
            });
            // Left lower leg
            const leftLegL = Bodies.rectangle(x - 14, y + 75, 18, 40, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.003,
                render: { fillStyle: '#2f4d2f', strokeStyle: '#1f331f', lineWidth: 2 }
            });
            // Right lower leg
            const rightLegL = Bodies.rectangle(x + 14, y + 75, 18, 40, {
                restitution: 0.2,
                friction: 0.5,
                density: 0.003,
                render: { fillStyle: '#2f4d2f', strokeStyle: '#1f331f', lineWidth: 2 }
            });

            // --- Constraints (joints) ---
            const stiffness = 0.8;
            // head to torso
            const headJoint = Constraint.create({
                bodyA: head,
                bodyB: torso,
                pointA: { x: 0, y: 12 },
                pointB: { x: 0, y: -27 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // left shoulder
            const leftShoulder = Constraint.create({
                bodyA: torso,
                bodyB: leftArmU,
                pointA: { x: -15, y: -15 },
                pointB: { x: 10, y: 0 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // right shoulder
            const rightShoulder = Constraint.create({
                bodyA: torso,
                bodyB: rightArmU,
                pointA: { x: 15, y: -15 },
                pointB: { x: -10, y: 0 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // left elbow
            const leftElbow = Constraint.create({
                bodyA: leftArmU,
                bodyB: leftArmL,
                pointA: { x: -12, y: 0 },
                pointB: { x: 10, y: 0 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // right elbow
            const rightElbow = Constraint.create({
                bodyA: rightArmU,
                bodyB: rightArmL,
                pointA: { x: 12, y: 0 },
                pointB: { x: -10, y: 0 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // left hip
            const leftHip = Constraint.create({
                bodyA: torso,
                bodyB: leftLegU,
                pointA: { x: -8, y: 20 },
                pointB: { x: 0, y: -18 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // right hip
            const rightHip = Constraint.create({
                bodyA: torso,
                bodyB: rightLegU,
                pointA: { x: 8, y: 20 },
                pointB: { x: 0, y: -18 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // left knee
            const leftKnee = Constraint.create({
                bodyA: leftLegU,
                bodyB: leftLegL,
                pointA: { x: 0, y: 15 },
                pointB: { x: 0, y: -18 },
                stiffness: stiffness,
                render: { visible: false }
            });
            // right knee
            const rightKnee = Constraint.create({
                bodyA: rightLegU,
                bodyB: rightLegL,
                pointA: { x: 0, y: 15 },
                pointB: { x: 0, y: -18 },
                stiffness: stiffness,
                render: { visible: false }
            });

            Composite.add(world, [
                torso, head, leftArmU, rightArmU, leftArmL, rightArmL,
                leftLegU, rightLegU, leftLegL, rightLegL,
                headJoint, leftShoulder, rightShoulder, leftElbow, rightElbow,
                leftHip, rightHip, leftKnee, rightKnee
            ]);
        }

        // --- remove body under mouse ---
        function removeAtMouse(ev) {
            const bodies = getBodiesAtMouse(ev);
            if (bodies.length > 0) {
                // remove the first non-static (should be all non-static anyway)
                Composite.remove(world, bodies[0]);
            }
        }

        // --- handle canvas click for spawn/remove ---
        canvas.addEventListener('click', (ev) => {
            if (currentTool === 'drag') return; // drag handled by mouseConstraint

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (ev.clientX - rect.left) * scaleX;
            const mouseY = (ev.clientY - rect.top) * scaleY;

            if (currentTool === 'ragdoll') {
                spawnRagdoll(mouseX, mouseY);
            } else if (currentTool === 'prop') {
                spawnProp(mouseX, mouseY);
            } else if (currentTool === 'remove') {
                removeAtMouse(ev);
            }
        });

        // --- toolbar button logic ---
        const toolButtons = document.querySelectorAll('.tool-btn');
        toolButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const tool = btn.dataset.tool;
                if (!tool) return;
                // update active class
                toolButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // update tool
                currentTool = tool;

                // handle mouse constraint (enable only if drag)
                if (tool === 'drag') {
                    if (!mouseConstraint) initMouseConstraint();
                } else {
                    removeMouseConstraint();
                }

                document.getElementById('toolIndicator').innerText = tool.toUpperCase();
            });
        });

        // update entity count every second
        function updateEntityCount() {
            const allBodies = Composite.allBodies(world);
            const nonStatic = allBodies.filter(b => !b.isStatic).length;
            document.getElementById('entityCount').innerText = nonStatic + ' entities';
        }
        setInterval(updateEntityCount, 200);

        // small extra: override default render styles to make them pop more 2008
        Events.on(render, 'afterRender', function() {
            // additional retro grid effect? we already have canvas grid via CSS.
            // we can also draw some outlines with pixel brush, but fine.
        });

        // add a couple starting props for fun
        window.addEventListener('load', () => {
            spawnProp(400, 300);
            spawnProp(600, 300);
            spawnRagdoll(500, 200);
        });

        // also handle right click to remove quickly? but we keep it simple.
        canvas.addEventListener('contextmenu', (e) => e.preventDefault()); // block right-click menu
    })();
</script>
</body>
</html>
