<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Maker 2008 · Estudio de creación</title>
    <style>
        /* ========== ESTÉTICA 2008 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #336699; /* azul XP clásico de fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, 'Courier New', monospace;
            padding: 16px;
        }
        .ventana-principal {
            width: 1100px;
            max-width: 95%;
            background: #ece9d8; /* fondo gris claro XP */
            border: 3px solid #0a246a;
            border-radius: 12px 12px 8px 8px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .barra-titulo {
            background: linear-gradient(180deg, #d6e0f5 0%, #b1c1e0 100%);
            padding: 8px 12px;
            border-bottom: 2px solid #0a246a;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            color: #1f2d5a;
            text-shadow: 1px 1px white;
        }
        .barra-titulo img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
            filter: drop-shadow(1px 1px 0 white);
        }
        .contenedor-editores {
            display: flex;
            flex-direction: row;
            padding: 12px;
            gap: 12px;
            background: #d4d0c8; /* gris más oscuro tipo panel */
            border-top: 1px solid #ffffff;
            border-bottom: 1px solid #808080;
        }
        .panel-codigo {
            flex: 1;
            background: #ffffff;
            border: 2px inset #b0a898;
            padding: 4px;
            box-shadow: inset 2px 2px 0px #5f5a52;
        }
        .panel-codigo textarea {
            width: 100%;
            height: 400px;
            border: none;
            background: #fefedc; /* fondo amarillento como editores viejos */
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #001188;
            padding: 8px;
            resize: none;
            outline: none;
            overflow: auto;
            border: 1px solid #a7a394;
        }
        .panel-escenario {
            width: 360px;
            background: #b6b09c;
            border: 2px inset #b0a898;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: inset 2px 2px 0px #5f5a52;
        }
        .canvas-2008 {
            background: #303030;
            border: 4px solid #4b4f5c;
            border-radius: 6px;
            box-shadow: 4px 4px 0px #202020;
            width: 320px;
            height: 240px;
            image-rendering: crisp-edges; /* píxel retro */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .toolbar-2008 {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #c0b9a8;
            padding: 10px;
            border: 2px outset #ffffff;
            border-radius: 6px;
        }
        .btn-2008 {
            background: linear-gradient(180deg, #e8e2d4 0%, #c7beaa 100%);
            border: 2px solid #6a5f4f;
            border-radius: 4px;
            color: #1e2b45;
            font-weight: bold;
            font-size: 13px;
            padding: 6px 14px;
            cursor: pointer;
            box-shadow: 2px 2px 0px #4a3f32;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: 0.05s linear;
        }
        .btn-2008:active {
            background: linear-gradient(0deg, #e8e2d4 0%, #c7beaa 100%);
            box-shadow: inset 2px 2px 0px #4a3f32;
            transform: translate(2px, 2px);
        }
        .btn-2008.accion {
            background: linear-gradient(180deg, #fde59c 0%, #f2c75f 100%);
            border-color: #b37b2e;
        }
        .barra-estado {
            background: #d4d0c8;
            padding: 6px 16px;
            border-top: 2px solid #f0ece4;
            font-size: 13px;
            color: #2b2b2b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .luz-ejecucion {
            background: #29a329;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            box-shadow: inset -2px -2px 0px #145a14;
            display: inline-block;
        }
        .luz-detente {
            background: #a32929;
            box-shadow: inset -2px -2px 0px #5a1414;
        }
    </style>
</head>
<body>
<div class="ventana-principal">
    <div class="barra-titulo">
        <!-- icono simplificado -->
        <span style="font-size:24px; margin-right:8px;">🎮</span>
        <span>Game Maker 2008 · Proyecto [*]</span>
    </div>

    <div class="contenedor-editores">
        <!-- PANEL DE CÓDIGO -->
        <div class="panel-codigo">
            <textarea id="codigoUsuario" placeholder="; Escribe tu código JavaScript aquí...">// Ejemplo: un cuadrado que rebota
let x = 100, y = 50;
let vx = 2, vy = 1.5;

function update() {
    ctx.fillStyle = '#336699';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.rect(x, y, 40, 40);
    ctx.fill();
    
    x += vx;
    y += vy;
    
    if (x < 0 || x > canvas.width-40) vx = -vx;
    if (y < 0 || y > canvas.height-40) vy = -vy;
}

startLoop(update);</textarea>
        </div>

        <!-- PANEL ESCENARIO + BOTONES -->
        <div class="panel-escenario">
            <div class="canvas-2008">
                <canvas id="gameCanvas" width="320" height="240"></canvas>
            </div>
            <div class="toolbar-2008">
                <button class="btn-2008 accion" id="btnRun">▶ Ejecutar</button>
                <button class="btn-2008" id="btnStop">■ Detener</button>
                <button class="btn-2008" id="btnExport">📤 Exportar</button>
                <label class="btn-2008" for="importFile">📂 Importar</label>
                <input type="file" id="importFile" accept=".txt,.js,.json" style="display:none;">
            </div>
            <div style="font-size:12px; color:#3f3f3f; margin-top:4px;">
                ⚡ Flechas = mueven objeto (si implementas)
            </div>
        </div>
    </div>

    <div class="barra-estado">
        <span id="estado">🟡 DETENIDO</span>
        <span>GM 2008 · by retro</span>
    </div>
</div>

<script>
(function(){
    // Elementos del DOM
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const codigoTextarea = document.getElementById('codigoUsuario');
    const btnRun = document.getElementById('btnRun');
    const btnStop = document.getElementById('btnStop');
    const btnExport = document.getElementById('btnExport');
    const importFile = document.getElementById('importFile');
    const estadoSpan = document.getElementById('estado');

    // Variables de control de animación
    let animFrameId = null;
    let loopFunction = null;          // función de loop definida por el usuario (si usa startLoop)
    let userStopRequested = false;

    // === API que se expone al código del usuario ===
    function startLoop(fn) {
        // Detiene cualquier loop previo
        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }
        if (typeof fn === 'function') {
            loopFunction = fn;
            // lanzar bucle
            function frame() {
                if (!loopFunction) return;
                try {
                    loopFunction();
                } catch (e) {
                    console.error("Error en loop del usuario:", e);
                    stopEverything();
                }
                animFrameId = requestAnimationFrame(frame);
            }
            animFrameId = requestAnimationFrame(frame);
            actualizarEstado(true);
        } else {
            console.warn("startLoop necesita una función");
        }
    }

    function stopLoop() {
        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }
        loopFunction = null;
        actualizarEstado(false);
    }

    // Función interna para detener todo (desde botón o error)
    function stopEverything() {
        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }
        loopFunction = null;
        actualizarEstado(false);
    }

    function actualizarEstado(encendido) {
        if (encendido) {
            estadoSpan.innerHTML = '🟢 EJECUTANDO';
        } else {
            estadoSpan.innerHTML = '🔴 DETENIDO';
        }
    }

    // === EJECUTAR CÓDIGO DEL USUARIO (Run) ===
    function ejecutarCodigo() {
        // Detener cualquier ejecución previa
        stopEverything();
        // Limpiar canvas (opcional)
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const codigo = codigoTextarea.value;

        // Preparar el entorno de la sandbox: pasamos ctx, canvas, width, height,
        // startLoop, stopLoop y requestAnimationFrame (por si quiere usarlo directamente)
        // pero limitamos el acceso a window. Al usar new Function, el código solo ve
        // las variables que le pasamos como argumentos.
        try {
            // Crear función con los parámetros permitidos
            const funcionUsuario = new Function(
                'ctx', 'canvas', 'width', 'height',
                'startLoop', 'stopLoop', 'requestAnimationFrame', 'cancelAnimationFrame',
                codigo
            );

            // Ejecutar la función en modo estricto implícito (por new Function) y con los objetos permitidos
            funcionUsuario(
                ctx, canvas, canvas.width, canvas.height,
                startLoop, stopLoop,               // funciones control loop
                requestAnimationFrame, cancelAnimationFrame
            );

            // Si el código no llamó a startLoop, no pasa nada; se queda detenido
            // pero se considera una ejecución correcta.
        } catch (error) {
            console.error('Error al ejecutar código:', error);
            alert('Error en el código: ' + error.message);
            stopEverything();
        }
    }

    // === DETENER (Stop) ===
    function detenerEjecucion() {
        stopEverything();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // pequeño mensaje de "detenido"
        ctx.fillStyle = '#666';
        ctx.font = 'bold 16px "Courier New"';
        ctx.fillText('DETENIDO', 80, 120);
    }

    // === EXPORTAR CÓDIGO ===
    function exportarCodigo() {
        const codigo = codigoTextarea.value;
        const blob = new Blob([codigo], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'mi_juego_2008.txt';
        a.click();
        URL.revokeObjectURL(url);
    }

    // === IMPORTAR CÓDIGO ===
    importFile.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            codigoTextarea.value = ev.target.result;
            importFile.value = ''; // reset
        };
        reader.readAsText(file);
    });

    // === EVENTOS DE BOTONES ===
    btnRun.addEventListener('click', ejecutarCodigo);
    btnStop.addEventListener('click', detenerEjecucion);
    btnExport.addEventListener('click', exportarCodigo);

    // Prevenir arrastrar archivo sobre la ventana (para evitar que se abra)
    window.addEventListener('dragover', e => e.preventDefault());
    window.addEventListener('drop', e => e.preventDefault());

    // Ejemplo de código por defecto (se muestra en textarea)
    // ya está en el HTML

    // Inicializar estado
    actualizarEstado(false);
})();
</script>
</body>
</html>
