<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Minecraft con Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 40px;
            border: 2px solid #444;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
        }
        .block-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .block-selector.selected {
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px #ffaa00;
        }
        .block-color {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            margin-bottom: 5px;
            border: 2px solid white;
        }
        .block-name {
            font-size: 14px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            pointer-events: none;
            z-index: 5;
            opacity: 0.8;
        }
        #instructions {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 18px;
            border: 2px solid #00aa00;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.3s;
            text-align: center;
        }
        #status {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 16px;
            border: 1px solid #0f0;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="block-selector" id="sel-grass">
            <div class="block-color" style="background: #7cfc00;"></div>
            <span class="block-name">PASTO</span>
        </div>
        <div class="block-selector" id="sel-dirt">
            <div class="block-color" style="background: #8b4513;"></div>
            <span class="block-name">TIERRA</span>
        </div>
        <div class="block-selector" id="sel-stone">
            <div class="block-color" style="background: #808080;"></div>
            <span class="block-name">PIEDRA</span>
        </div>
    </div>
    <div id="crosshair">+</div>
    <div id="instructions">🔒 Haz clic aquí para empezar (bloquear ratón)</div>
    <div id="status">🏹 Bloque: PASTO | 1,2,3 para cambiar</div>

    <!-- Importación de librerías -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        (function() {
            // --- Configuración inicial ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Cielo celeste

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10); // Posición inicial

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Activamos sombras para más realismo
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Sombras suaves
            document.body.appendChild(renderer.domElement);

            // --- Luces ---
            // Luz ambiental suave
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);

            // Luz direccional principal (simula el sol)
            const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            const d = 20;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 30;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            // Luz de relleno desde atrás
            const backLight = new THREE.DirectionalLight(0xccddff, 0.5);
            backLight.position.set(-5, 5, -10);
            scene.add(backLight);

            // --- Variables globales del juego ---
            const blocksGroup = new THREE.Group(); // Grupo que contiene todos los bloques
            scene.add(blocksGroup);

            const blocksMap = new Map(); // Mapa de posición "x,y,z" -> mesh

            // Tipos de bloque: nombre, color, y selector DOM
            const blockTypes = [
                { name: 'PASTO', color: 0x7cfc00, selector: document.getElementById('sel-grass') },
                { name: 'TIERRA', color: 0x8b4513, selector: document.getElementById('sel-dirt') },
                { name: 'PIEDRA', color: 0x808080, selector: document.getElementById('sel-stone') }
            ];
            let currentBlockIndex = 0; // Pasto por defecto

            // Elementos DOM
            const hudSelectors = document.querySelectorAll('.block-selector');
            const statusDiv = document.getElementById('status');
            const instructionsDiv = document.getElementById('instructions');

            // --- Generar suelo de 16x16 bloques de pasto (y=0) ---
            function generateGround() {
                const size = 16; // 16x16
                const offset = Math.floor(size / 2); // Para centrar en 0
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j < size; j++) {
                        const x = i - offset; // rango -8 a 7
                        const z = j - offset;
                        const y = 0;
                        createBlock(x, y, z, 0); // 0 = pasto
                    }
                }
            }

            // Función para crear un bloque en (x,y,z) del tipo index
            function createBlock(x, y, z, typeIndex) {
                const key = `${x},${y},${z}`;
                if (blocksMap.has(key)) return null; // Ya existe

                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshPhongMaterial({ 
                    color: blockTypes[typeIndex].color,
                    shininess: 10,
                    emissive: 0x000000
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.castShadow = true;
                cube.receiveShadow = true;
                cube.position.set(x, y, z);
                
                // Almacenar el tipo en el userData para posible uso futuro
                cube.userData = { type: typeIndex };

                blocksGroup.add(cube);
                blocksMap.set(key, cube);
                return cube;
            }

            // Eliminar bloque por su mesh
            function removeBlock(mesh) {
                const key = `${mesh.position.x},${mesh.position.y},${mesh.position.z}`;
                if (blocksMap.has(key)) {
                    blocksGroup.remove(mesh);
                    blocksMap.delete(key);
                    // Opcional: liberar memoria
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                }
            }

            // Generar el suelo inicial
            generateGround();

            // --- Controles PointerLock ---
            const controls = new THREE.PointerLockControls(camera, document.body);

            // Manejar el clic para bloquear
            instructionsDiv.addEventListener('click', function() {
                controls.lock();
            });

            // Eventos de bloqueo/desbloqueo
            controls.addEventListener('lock', function() {
                instructionsDiv.style.opacity = '0';
                instructionsDiv.style.pointerEvents = 'none';
            });

            controls.addEventListener('unlock', function() {
                instructionsDiv.style.opacity = '1';
                instructionsDiv.style.pointerEvents = 'auto';
            });

            // --- Movimiento WASD manual ---
            const moveState = { w: false, a: false, s: false, d: false };
            const velocity = new THREE.Vector3();
            const speed = 5.0;

            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.w = true; e.preventDefault(); break;
                    case 'KeyA': moveState.a = true; e.preventDefault(); break;
                    case 'KeyS': moveState.s = true; e.preventDefault(); break;
                    case 'KeyD': moveState.d = true; e.preventDefault(); break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.w = false; e.preventDefault(); break;
                    case 'KeyA': moveState.a = false; e.preventDefault(); break;
                    case 'KeyS': moveState.s = false; e.preventDefault(); break;
                    case 'KeyD': moveState.d = false; e.preventDefault(); break;
                }
            });

            // --- Selección de bloque con teclas 1,2,3 ---
            document.addEventListener('keydown', (e) => {
                if (!controls.isLocked) return; // Solo cuando el ratón está bloqueado

                switch(e.key) {
                    case '1':
                        setCurrentBlock(0);
                        e.preventDefault();
                        break;
                    case '2':
                        setCurrentBlock(1);
                        e.preventDefault();
                        break;
                    case '3':
                        setCurrentBlock(2);
                        e.preventDefault();
                        break;
                }
            });

            function setCurrentBlock(index) {
                if (index === currentBlockIndex) return;
                // Actualizar UI
                hudSelectors.forEach((el, i) => {
                    if (i === index) {
                        el.classList.add('selected');
                    } else {
                        el.classList.remove('selected');
                    }
                });
                currentBlockIndex = index;
                statusDiv.innerHTML = `🏹 Bloque: ${blockTypes[index].name} | 1,2,3 para cambiar`;
            }

            // Inicializar selector UI
            setCurrentBlock(0);

            // --- Raycaster para interacción (clic izquierdo/derecho) ---
            const raycaster = new THREE.Raycaster();
            raycaster.far = 10; // Distancia máxima de interacción

            function onMouseDown(event) {
                if (!controls.isLocked) return; // Solo si el ratón está bloqueado

                // Evitar el menú contextual en clic derecho
                if (event.button === 2) {
                    event.preventDefault();
                }

                // Calcular dirección de la cámara (centro de la pantalla)
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                raycaster.set(camera.position, direction);

                // Intersectar con los bloques
                const intersects = raycaster.intersectObjects(blocksGroup.children);

                if (intersects.length > 0) {
                    // Tomar el primer bloque impactado
                    const hit = intersects[0];
                    const hitMesh = hit.object;
                    const hitPoint = hit.point;
                    const face = hit.face;

                    // Clic izquierdo (botón 0): destruir bloque
                    if (event.button === 0) {
                        removeBlock(hitMesh);
                    }
                    // Clic derecho (botón 2): colocar bloque adyacente
                    else if (event.button === 2) {
                        // Obtener la normal de la cara (redondeada para evitar errores de coma flotante)
                        const normal = face.normal.clone().round();
                        
                        // La nueva posición es la del bloque impactado + la normal
                        const newPos = hitMesh.position.clone().add(normal);
                        
                        // Verificar si la posición está vacía
                        const newKey = `${newPos.x},${newPos.y},${newPos.z}`;
                        if (!blocksMap.has(newKey)) {
                            // Crear bloque del tipo actual
                            createBlock(newPos.x, newPos.y, newPos.z, currentBlockIndex);
                        }
                    }
                }
            }

            // Registrar eventos de ratón
            document.addEventListener('mousedown', onMouseDown);
            // Prevenir menú contextual en toda la página
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // --- Ajuste de ventana ---
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- Bucle de animación ---
            function animate() {
                requestAnimationFrame(animate);

                // Movimiento del jugador (solo si bloqueado)
                if (controls.isLocked) {
                    // Calcular dirección de movimiento
                    const direction = new THREE.Vector3();
                    camera.getWorldDirection(direction);
                    direction.y = 0; // Mantener movimiento horizontal
                    direction.normalize();

                    const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), direction).negate(); // Vector derecha

                    velocity.set(0, 0, 0);

                    if (moveState.w) velocity.add(direction);
                    if (moveState.s) velocity.sub(direction);
                    if (moveState.d) velocity.add(right);
                    if (moveState.a) velocity.sub(right);

                    if (velocity.length() > 0) {
                        velocity.normalize();
                        // Mover la cámara (controls mantiene la rotación, pero la posición la manejamos nosotros)
                        camera.position.addScaledVector(velocity, speed * 0.016); // Aprox 60 FPS
                    }
                }

                renderer.render(scene, camera);
            }

            animate();

            // Pequeña adición: unas nubes o estrellas? No, pero podemos poner unos ejes para referencia? Mejor no.
            // Añadimos un suelo invisible para que las sombras tengan dónde caer? Ya tenemos bloques.
            
            console.log('¡Prototipo listo! Usa WASD para moverte, clic izquierdo destruye, derecho construye.');
        })();
    </script>
</body>
</html>
