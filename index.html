<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ScriptCraft - Crea Juegos con Código</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
        }

        body {
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-dev-container {
            width: 1400px;
            max-width: 100%;
            height: 800px;
            max-height: 90vh;
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* VS Code Title Bar */
        .title-bar {
            background: #3c3c3c;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0e0e0e;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }

        .title-text {
            color: #cccccc;
            font-size: 14px;
            flex: 1;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar - File Explorer */
        .sidebar {
            width: 250px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .explorer-header {
            padding: 10px;
            color: #cccccc;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
        }

        .file-tree {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .file-item {
            padding: 4px 8px;
            color: #cccccc;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-item:hover {
            background: #2a2d2e;
        }

        .file-item.active {
            background: #37373d;
        }

        .file-icon {
            font-size: 16px;
        }

        /* Center Area - Code Editor */
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .editor-tabs {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            padding-left: 10px;
        }

        .tab {
            padding: 8px 16px;
            color: #969696;
            font-size: 13px;
            border-right: 1px solid #3e3e42;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab.active {
            background: #1e1e1e;
            color: white;
            border-bottom: 2px solid #007acc;
        }

        .code-editor {
            flex: 1;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #d4d4d4;
            background: #1e1e1e;
            border: none;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
        }

        .line-numbers {
            float: left;
            text-align: right;
            padding-right: 10px;
            color: #858585;
            user-select: none;
        }

        /* Right Side - Game Preview */
        .preview-area {
            width: 400px;
            background: #252526;
            border-left: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 10px;
            color: #cccccc;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-canvas {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
        }

        #gamePreviewCanvas {
            width: 100%;
            height: auto;
            background: #2d2d2d;
            border-radius: 4px;
            border: 1px solid #3e3e42;
        }

        .console-panel {
            height: 150px;
            background: #1e1e1e;
            border-top: 1px solid #3e3e42;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }

        .console-line {
            color: #cccccc;
            margin: 2px 0;
            border-bottom: 1px solid #2d2d2d;
            padding: 2px 0;
        }

        .console-line.error {
            color: #f48771;
        }

        .console-line.success {
            color: #89d185;
        }

        /* Toolbar */
        .toolbar {
            background: #3c3c3c;
            padding: 8px 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #0e0e0e;
        }

        .toolbar-button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-button:hover {
            background: #1177bb;
        }

        .toolbar-button.secondary {
            background: #3e3e42;
        }

        .toolbar-button.secondary:hover {
            background: #4a4a4a;
        }

        .toolbar-button.danger {
            background: #a1260d;
        }

        .toolbar-button.danger:hover {
            background: #c42b1c;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #252526;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #3e3e42;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 15px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 8px;
            background: #3c3c3c;
            border: 1px solid #0e0e0e;
            color: white;
            border-radius: 4px;
            margin-bottom: 15px;
            font-family: 'Fira Code', monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="game-dev-container">
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="window-controls">
                <div class="window-btn close"></div>
                <div class="window-btn minimize"></div>
                <div class="window-btn maximize"></div>
            </div>
            <span class="title-text">📝 ScriptCraft - Game Development Environment</span>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- File Explorer Sidebar -->
            <div class="sidebar">
                <div class="explorer-header">📁 EXPLORER</div>
                <div class="file-tree" id="fileTree">
                    <div class="file-item active" onclick="loadScript('player')">
                        <span class="file-icon">📄</span>
                        player.js
                    </div>
                    <div class="file-item" onclick="loadScript('enemy')">
                        <span class="file-icon">📄</span>
                        enemy.js
                    </div>
                    <div class="file-item" onclick="loadScript('powerup')">
                        <span class="file-icon">📄</span>
                        powerup.js
                    </div>
                    <div class="file-item" onclick="loadScript('game')">
                        <span class="file-icon">📄</span>
                        game.js
                    </div>
                    <div class="file-item" onclick="loadScript('level')">
                        <span class="file-icon">📄</span>
                        level1.js
                    </div>
                </div>
            </div>

            <!-- Code Editor Area -->
            <div class="center-area">
                <div class="editor-tabs">
                    <div class="tab active" id="currentFileTab">📄 player.js</div>
                </div>
                <textarea class="code-editor" id="codeEditor" spellcheck="false">// Player script
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 5;
        this.color = '#4ecdc4';
        this.size = 30;
    }
    
    update() {
        // Move player with arrow keys
        if (keys.ArrowRight) this.x += this.speed;
        if (keys.ArrowLeft) this.x -= this.speed;
        if (keys.ArrowUp) this.y -= this.speed;
        if (keys.ArrowDown) this.y += this.speed;
        
        // Keep player in bounds
        this.x = Math.max(this.size/2, Math.min(400 - this.size/2, this.x));
        this.y = Math.max(this.size/2, Math.min(400 - this.size/2, this.y));
    }
    
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    }
    
    onCollide(enemy) {
        console.log('Player collided with enemy!');
        return false; // Game over
    }
}</textarea>
            </div>

            <!-- Preview Area -->
            <div class="preview-area">
                <div class="preview-header">
                    <span>🎮 Game Preview</span>
                    <span style="color: #969696; font-size: 11px;">400x400</span>
                </div>
                <div class="preview-canvas">
                    <canvas id="gamePreviewCanvas" width="400" height="400"></canvas>
                </div>
                <div class="console-panel" id="console">
                    <div class="console-line">> ScriptCraft v1.0 ready</div>
                    <div class="console-line">> Click RUN to execute your scripts</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button class="toolbar-button" onclick="runGame()">
                ▶ RUN (Ctrl+R)
            </button>
            <button class="toolbar-button secondary" onclick="stopGame()">
                ⏹ STOP
            </button>
            <button class="toolbar-button secondary" onclick="saveScript()">
                💾 SAVE (Ctrl+S)
            </button>
            <button class="toolbar-button" onclick="showNewScriptModal()">
                📄 NEW SCRIPT
            </button>
            <button class="toolbar-button secondary" onclick="clearConsole()">
                🗑 CLEAR CONSOLE
            </button>
            <button class="toolbar-button danger" onclick="resetGame()">
                ⟲ RESET
            </button>
        </div>
    </div>

    <!-- New Script Modal -->
    <div class="modal" id="newScriptModal">
        <div class="modal-content">
            <h3>📄 Create New Script</h3>
            <input type="text" id="newScriptName" placeholder="script_name.js">
            <select id="newScriptTemplate">
                <option value="empty">Empty Script</option>
                <option value="player">Player Template</option>
                <option value="enemy">Enemy Template</option>
                <option value="powerup">Power-up Template</option>
            </select>
            <div class="modal-buttons">
                <button class="toolbar-button secondary" onclick="closeModal()">Cancel</button>
                <button class="toolbar-button" onclick="createScript()">Create</button>
            </div>
        </div>
    </div>

    <script>
        // Game State
        let gameRunning = false;
        let gameLoop = null;
        let currentFile = 'player';
        let scripts = {
            player: `// Player script
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 5;
        this.color = '#4ecdc4';
        this.size = 30;
    }
    
    update() {
        // Move player with arrow keys
        if (keys.ArrowRight) this.x += this.speed;
        if (keys.ArrowLeft) this.x -= this.speed;
        if (keys.ArrowUp) this.y -= this.speed;
        if (keys.ArrowDown) this.y += this.speed;
        
        // Keep player in bounds
        this.x = Math.max(this.size/2, Math.min(400 - this.size/2, this.x));
        this.y = Math.max(this.size/2, Math.min(400 - this.size/2, this.y));
    }
    
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    }
    
    onCollide(enemy) {
        console.log('Player collided with enemy!');
        return false; // Game over
    }
}`,
            enemy: `// Enemy script
class Enemy {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 2;
        this.color = '#ff6b6b';
        this.size = 25;
    }
    
    update(player) {
        // Chase the player
        if (player.x > this.x) this.x += this.speed;
        if (player.x < this.x) this.x -= this.speed;
        if (player.y > this.y) this.y += this.speed;
        if (player.y < this.y) this.y -= this.speed;
    }
    
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
        ctx.fill();
    }
}`,
            powerup: `// Power-up script
class PowerUp {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.color = '#ffd700';
        this.size = 15;
        this.active = true;
    }
    
    update() {
        // Make power-up rotate or pulse
        this.size = 15 + Math.sin(Date.now() * 0.01) * 2;
    }
    
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    onCollect(player) {
        console.log('Power-up collected!');
        return true; // Remove power-up
    }
}`,
            game: `// Main game script
class Game {
    constructor() {
        this.score = 0;
        this.gameOver = false;
        this.victory = false;
    }
    
    checkCollisions(player, enemies) {
        for (let enemy of enemies) {
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            if (distance < (player.size/2 + enemy.size/2)) {
                return player.onCollide(enemy);
            }
        }
        return true;
    }
    
    updateScore(points) {
        this.score += points;
        console.log('Score: ' + this.score);
    }
}`,
            level: `// Level 1 script
function createLevel1() {
    const player = new Player(200, 200);
    const enemies = [
        new Enemy(100, 100),
        new Enemy(300, 300)
    ];
    const powerUps = [
        new PowerUp(150, 150),
        new PowerUp(250, 250)
    ];
    
    return { player, enemies, powerUps };
}`
        };

        // Canvas and Context
        const canvas = document.getElementById('gamePreviewCanvas');
        const ctx = canvas.getContext('2d');
        const consoleEl = document.getElementById('console');
        const codeEditor = document.getElementById('codeEditor');

        // Keyboard state
        const keys = {};

        // Game objects
        let player = null;
        let enemies = [];
        let powerUps = [];
        let game = null;

        // Initialize
        loadScript('player');

        // Keyboard event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                runGame();
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveScript();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // File management
        function loadScript(filename) {
            currentFile = filename;
            document.getElementById('currentFileTab').innerHTML = `📄 ${filename}.js`;
            codeEditor.value = scripts[filename];
            
            // Update active file in explorer
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function saveScript() {
            scripts[currentFile] = codeEditor.value;
            addToConsole(`✅ Script ${currentFile}.js saved`, 'success');
        }

        function showNewScriptModal() {
            document.getElementById('newScriptModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('newScriptModal').style.display = 'none';
        }

        function createScript() {
            const name = document.getElementById('newScriptName').value;
            const template = document.getElementById('newScriptTemplate').value;
            
            if (!name.endsWith('.js')) {
                alert('Script name must end with .js');
                return;
            }
            
            const baseName = name.replace('.js', '');
            
            // Add to scripts
            if (template === 'empty') {
                scripts[baseName] = '// New script\n';
            } else {
                scripts[baseName] = scripts[template];
            }
            
            // Add to file tree
            const fileTree = document.getElementById('fileTree');
            const newFile = document.createElement('div');
            newFile.className = 'file-item';
            newFile.innerHTML = `<span class="file-icon">📄</span> ${name}`;
            newFile.setAttribute('onclick', `loadScript('${baseName}')`);
            fileTree.appendChild(newFile);
            
            closeModal();
            addToConsole(`📄 Created new script: ${name}`, 'success');
        }

        // Game functions
        function runGame() {
            stopGame();
            
            try {
                // Save current script
                scripts[currentFile] = codeEditor.value;
                
                // Create new Function from scripts
                const scriptCode = `
                    ${scripts.player}
                    ${scripts.enemy}
                    ${scripts.powerup}
                    ${scripts.game}
                    ${scripts.level}
                    
                    return createLevel1();
                `;
                
                const createGame = new Function(scriptCode);
                const gameObjects = createGame();
                
                player = gameObjects.player;
                enemies = gameObjects.enemies;
                powerUps = gameObjects.powerUps;
                game = new Game();
                
                gameRunning = true;
                addToConsole('▶ Game started successfully!', 'success');
                
                // Start game loop
                gameLoop = setInterval(() => {
                    if (!gameRunning) return;
                    
                    // Update
                    if (player) {
                        player.update();
                        
                        // Update enemies
                        enemies.forEach(enemy => enemy.update(player));
                        
                        // Update power-ups
                        powerUps.forEach(powerUp => powerUp.update());
                        
                        // Check collisions with enemies
                        if (!game.checkCollisions(player, enemies)) {
                            gameOver();
                        }
                        
                        // Check collisions with power-ups
                        powerUps = powerUps.filter(powerUp => {
                            const dx = player.x - powerUp.x;
                            const dy = player.y - powerUp.y;
                            const distance = Math.sqrt(dx*dx + dy*dy);
                            
                            if (distance < (player.size/2 + powerUp.size/2)) {
                                game.updateScore(10);
                                return !powerUp.onCollect(player);
                            }
                            return true;
                        });
                    }
                    
                    // Draw
                    ctx.clearRect(0, 0, 400, 400);
                    
                    // Draw grid
                    ctx.strokeStyle = '#3e3e42';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i <= 400; i += 40) {
                        ctx.beginPath();
                        ctx.moveTo(i, 0);
                        ctx.lineTo(i, 400);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(0, i);
                        ctx.lineTo(400, i);
                        ctx.stroke();
                    }
                    
                    // Draw game objects
                    if (player) player.draw(ctx);
                    enemies.forEach(enemy => enemy.draw(ctx));
                    powerUps.forEach(powerUp => powerUp.draw(ctx));
                    
                    // Draw score
                    if (game) {
                        ctx.font = 'bold 14px Fira Code';
                        ctx.fillStyle = '#ffffff';
                        ctx.fillText('Score: ' + game.score, 10, 30);
                    }
                    
                }, 1000/60); // 60 FPS
                
            } catch (error) {
                addToConsole('❌ Error: ' + error.message, 'error');
                console.error(error);
            }
        }

        function stopGame() {
            gameRunning = false;
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            addToConsole('⏹ Game stopped');
        }

        function gameOver() {
            stopGame();
            addToConsole('💀 Game Over!', 'error');
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, 400, 400);
            ctx.font = 'bold 24px Fira Code';
            ctx.fillStyle = '#ff6b6b';
            ctx.fillText('GAME OVER', 80, 200);
        }

        function resetGame() {
            stopGame();
            player = null;
            enemies = [];
            powerUps = [];
            game = null;
            ctx.clearRect(0, 0, 400, 400);
            addToConsole('⟲ Game reset');
        }

        function clearConsole() {
            consoleEl.innerHTML = '<div class="console-line">> Console cleared</div>';
        }

        function addToConsole(message, type = '') {
            const line = document.createElement('div');
            line.className = 'console-line ' + (type || '');
            line.textContent = '> ' + message;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Make functions global
        window.loadScript = loadScript;
        window.runGame = runGame;
        window.stopGame = stopGame;
        window.saveScript = saveScript;
        window.showNewScriptModal = showNewScriptModal;
        window.closeModal = closeModal;
        window.createScript = createScript;
        window.clearConsole = clearConsole;
        window.resetGame = resetGame;
    </script>
</body>
</html>
